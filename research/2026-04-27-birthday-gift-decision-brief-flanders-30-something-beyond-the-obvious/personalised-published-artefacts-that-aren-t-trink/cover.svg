<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" preserveAspectRatio="xMidYMid slice">
  <defs>
    <radialGradient id="bg" cx="50%" cy="55%" r="70%">
      <stop offset="0%" stop-color="#fef3ec"/>
      <stop offset="100%" stop-color="#f0eadb"/>
    </radialGradient>
    <linearGradient id="book" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#c2410c"/>
      <stop offset="100%" stop-color="#78350f"/>
    </linearGradient>
    <linearGradient id="bookSpine" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#9a3309"/>
      <stop offset="100%" stop-color="#5c2a1a"/>
    </linearGradient>
    <radialGradient id="vinyl" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#1a0e0e"/>
      <stop offset="60%" stop-color="#2a1410"/>
      <stop offset="100%" stop-color="#1a0e0e"/>
    </radialGradient>
    <radialGradient id="vinylLabel" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#d97706"/>
      <stop offset="100%" stop-color="#9a3309"/>
    </radialGradient>
    <linearGradient id="frame" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#78350f"/>
      <stop offset="100%" stop-color="#5c2a1a"/>
    </linearGradient>
    <radialGradient id="sky" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#5c2a1a"/>
      <stop offset="100%" stop-color="#1a0e0e"/>
    </radialGradient>
  </defs>

  <!-- Full-bleed background -->
  <rect width="1600" height="900" fill="url(#bg)"/>

  <!-- Soft warm glow behind still-life -->
  <ellipse cx="800" cy="500" rx="700" ry="280" fill="#fbbf24" opacity="0.18"/>

  <!-- Table shadow -->
  <ellipse cx="800" cy="780" rx="560" ry="30" fill="#5c2a1a" opacity="0.18"/>

  <!-- Framed star map (back-left, leaning) -->
  <g transform="translate(380 280) rotate(-6)">
    <rect x="0" y="0" width="340" height="420" fill="url(#frame)" opacity="0.95"/>
    <rect x="22" y="22" width="296" height="376" fill="url(#sky)"/>
    <!-- constellation dots -->
    <circle cx="90" cy="120" r="3.5" fill="#fbbf24"/>
    <circle cx="150" cy="160" r="2.5" fill="#fef3ec"/>
    <circle cx="210" cy="135" r="4" fill="#fbbf24"/>
    <circle cx="260" cy="200" r="2" fill="#fef3ec"/>
    <circle cx="180" cy="230" r="3" fill="#fbbf24"/>
    <circle cx="110" cy="260" r="2.5" fill="#fef3ec"/>
    <circle cx="230" cy="290" r="3.5" fill="#fbbf24"/>
    <circle cx="80" cy="320" r="2" fill="#fef3ec"/>
    <circle cx="170" cy="340" r="2.5" fill="#fbbf24"/>
    <circle cx="250" cy="360" r="3" fill="#fef3ec"/>
    <circle cx="130" cy="200" r="1.8" fill="#fef3ec" opacity="0.7"/>
    <circle cx="200" cy="100" r="1.8" fill="#fef3ec" opacity="0.7"/>
    <!-- constellation lines -->
    <path d="M 90 120 L 150 160 L 210 135 M 150 160 L 180 230 L 230 290 M 180 230 L 110 260" stroke="#fbbf24" stroke-width="0.8" fill="none" opacity="0.45"/>
  </g>

  <!-- Vinyl record (back-right, partially behind book) -->
  <g transform="translate(1120 480)">
    <circle cx="0" cy="0" r="220" fill="url(#vinyl)"/>
    <circle cx="0" cy="0" r="210" fill="none" stroke="#3a1a14" stroke-width="0.6" opacity="0.7"/>
    <circle cx="0" cy="0" r="190" fill="none" stroke="#3a1a14" stroke-width="0.6" opacity="0.7"/>
    <circle cx="0" cy="0" r="170" fill="none" stroke="#3a1a14" stroke-width="0.6" opacity="0.7"/>
    <circle cx="0" cy="0" r="150" fill="none" stroke="#3a1a14" stroke-width="0.6" opacity="0.7"/>
    <circle cx="0" cy="0" r="130" fill="none" stroke="#3a1a14" stroke-width="0.6" opacity="0.7"/>
    <circle cx="0" cy="0" r="110" fill="none" stroke="#3a1a14" stroke-width="0.6" opacity="0.7"/>
    <circle cx="0" cy="0" r="80" fill="url(#vinylLabel)"/>
    <circle cx="0" cy="0" r="78" fill="none" stroke="#78350f" stroke-width="1" opacity="0.6"/>
    <circle cx="0" cy="0" r="6" fill="#1a0e0e"/>
    <!-- highlight sheen -->
    <ellipse cx="-60" cy="-90" rx="80" ry="20" fill="#fef3ec" opacity="0.08" transform="rotate(-30)"/>
  </g>

  <!-- Hero: open book with bookmark (foreground center) -->
  <g transform="translate(800 540)">
    <!-- book shadow -->
    <ellipse cx="0" cy="170" rx="340" ry="20" fill="#5c2a1a" opacity="0.25"/>
    <!-- closed book underneath -->
    <rect x="-300" y="120" width="600" height="60" fill="url(#bookSpine)" rx="3"/>
    <rect x="-300" y="115" width="600" height="10" fill="#faf8f2" opacity="0.85"/>
    <!-- open book pages base -->
    <path d="M -290 110 L -290 -120 Q -290 -135 -270 -138 L -10 -150 L -10 110 Z" fill="#faf8f2"/>
    <path d="M 290 110 L 290 -120 Q 290 -135 270 -138 L 10 -150 L 10 110 Z" fill="#faf8f2"/>
    <!-- page edges (stacked sheets) -->
    <path d="M -288 108 L -10 108 L -10 112 L -288 112 Z" fill="#e8dcc4"/>
    <path d="M 288 108 L 10 108 L 10 112 L 288 112 Z" fill="#e8dcc4"/>
    <!-- spine center crease -->
    <path d="M 0 -148 L 0 110" stroke="#c9bfa5" stroke-width="1.5" opacity="0.8"/>
    <!-- text lines left page -->
    <g fill="#9a3309" opacity="0.55">
      <rect x="-260" y="-100" width="220" height="3" rx="1"/>
      <rect x="-260" y="-80" width="200" height="2" rx="1"/>
      <rect x="-260" y="-65" width="230" height="2" rx="1"/>
      <rect x="-260" y="-50" width="180" height="2" rx="1"/>
      <rect x="-260" y="-35" width="210" height="2" rx="1"/>
      <rect x="-260" y="-20" width="195" height="2" rx="1"/>
      <rect x="-260" y="-5" width="220" height="2" rx="1"/>
      <rect x="-260" y="10" width="170" height="2" rx="1"/>
      <rect x="-260" y="25" width="200" height="2" rx="1"/>
      <rect x="-260" y="40" width="215" height="2" rx="1"/>
      <rect x="-260" y="55" width="160" height="2" rx="1"/>
      <rect x="-260" y="70" width="190" height="2" rx="1"/>
    </g>
    <!-- text lines right page -->
    <g fill="#9a3309" opacity="0.55">
      <rect x="40" y="-100" width="210" height="3" rx="1"/>
      <rect x="40" y="-80" width="225" height="2" rx="1"/>
      <rect x="40" y="-65" width="190" height="2" rx="1"/>
      <rect x="40" y="-50" width="215" height="2" rx="1"/>
      <rect x="40" y="-35" width="175" height="2" rx="1"/>
      <rect x="40" y="-20" width="220" height="2" rx="1"/>
      <rect x="40" y="-5" width="195" height="2" rx="1"/>
      <rect x="40" y="10" width="210" height="2" rx="1"/>
      <rect x="40" y="25" width="180" height="2" rx="1"/>
      <rect x="40" y="40" width="225" height="2" rx="1"/>
      <rect x="40" y="55" width="200" height="2" rx="1"/>
      <rect x="40" y="70" width="170" height="2" rx="1"/>
    </g>
    <!-- ribbon bookmark -->
    <path d="M 120 -150 L 120 180 L 135 165 L 150 180 L 150 -150 Z" fill="#c2410c"/>
    <path d="M 120 -150 L 120 -140 L 150 -140 L 150 -150 Z" fill="#9a3309"/>
  </g>

  <!-- Envelope (front-left, on table) -->
  <g transform="translate(340 720) rotate(-8)">
    <rect x="-120" y="-40" width="240" height="80" fill="#faf8f2" stroke="#c9bfa5" stroke-width="1"/>
    <path d="M -120 -40 L 0 20 L 120 -40" fill="none" stroke="#c9bfa5" stroke-width="1.2"/>
    <!-- wax seal -->
    <circle cx="0" cy="20" r="14" fill="#9a3309"/>
    <circle cx="0" cy="20" r="14" fill="url(#book)" opacity="0.7"/>
  </g>

  <!-- Subtle dust motes in warm light -->
  <g fill="#fbbf24" opacity="0.35">
    <circle cx="1380" cy="220" r="2"/>
    <circle cx="1450" cy="320" r="1.5"/>
    <circle cx="240" cy="180" r="1.8"/>
    <circle cx="180" cy="420" r="1.5"/>
  </g>
</svg>
