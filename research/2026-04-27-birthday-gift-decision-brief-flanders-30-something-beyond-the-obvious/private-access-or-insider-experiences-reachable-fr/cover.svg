<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#fef3ec"/>
      <stop offset="0.55" stop-color="#fbbf24" stop-opacity="0.55"/>
      <stop offset="1" stop-color="#c2410c" stop-opacity="0.35"/>
    </linearGradient>
    <radialGradient id="sun" cx="0.72" cy="0.62" r="0.35">
      <stop offset="0" stop-color="#fbbf24" stop-opacity="0.85"/>
      <stop offset="1" stop-color="#fbbf24" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="balloon" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#d97706"/>
      <stop offset="0.55" stop-color="#c2410c"/>
      <stop offset="1" stop-color="#78350f"/>
    </linearGradient>
    <linearGradient id="balloonShade" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#000" stop-opacity="0.25"/>
      <stop offset="0.5" stop-color="#000" stop-opacity="0"/>
      <stop offset="1" stop-color="#000" stop-opacity="0.18"/>
    </linearGradient>
    <linearGradient id="town" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#5c2a1a"/>
      <stop offset="1" stop-color="#1a0e0e"/>
    </linearGradient>
    <linearGradient id="canal" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#9a3309" stop-opacity="0.55"/>
      <stop offset="1" stop-color="#78350f" stop-opacity="0.85"/>
    </linearGradient>
  </defs>

  <!-- Full-bleed sky -->
  <rect width="1600" height="900" fill="url(#sky)"/>
  <rect width="1600" height="900" fill="url(#sun)"/>

  <!-- Distant town silhouette (canal town skyline) -->
  <g fill="url(#town)" opacity="0.92">
    <path d="M0,720
             L0,640 L70,640 L70,600 L120,600 L120,650 L180,650
             L210,610 L240,650 L290,650 L290,580 L320,580 L320,560 L350,560 L350,580 L380,580 L380,650
             L450,650 L450,600 L470,580 L490,600 L490,560 L520,560 L520,540 L540,540 L540,560 L570,560 L570,650
             L640,650 L640,610 L680,610 L680,560 L710,540 L740,560 L740,610 L800,610
             L800,640 L860,640 L860,600 L900,560 L940,600 L940,640 L1000,640
             L1000,610 L1040,610 L1040,570 L1070,540 L1100,570 L1100,610 L1160,610 L1160,650
             L1230,650 L1230,600 L1260,600 L1260,580 L1290,580 L1290,600 L1330,600 L1330,650
             L1400,650 L1400,610 L1450,610 L1450,640 L1520,640 L1520,620 L1600,620
             L1600,900 L0,900 Z"/>
  </g>

  <!-- Belfry-like spire accent (Ghent/Bruges nod) -->
  <g fill="#1a0e0e" opacity="0.95">
    <path d="M1075,540 L1085,440 L1095,540 Z"/>
    <rect x="1080" y="430" width="10" height="14"/>
  </g>

  <!-- Canal reflection band -->
  <rect x="0" y="720" width="1600" height="180" fill="url(#canal)" opacity="0.7"/>

  <!-- Reflected balloon shimmer -->
  <ellipse cx="800" cy="770" rx="170" ry="14" fill="#fbbf24" opacity="0.35"/>
  <ellipse cx="800" cy="800" rx="120" ry="8" fill="#fef3ec" opacity="0.25"/>

  <!-- Balloon ropes -->
  <g stroke="#1a0e0e" stroke-width="2" opacity="0.7" fill="none">
    <line x1="700" y1="495" x2="765" y2="600"/>
    <line x1="745" y1="510" x2="780" y2="600"/>
    <line x1="855" y1="510" x2="820" y2="600"/>
    <line x1="900" y1="495" x2="835" y2="600"/>
  </g>

  <!-- Hot-air balloon (hero, centered ~800,360) -->
  <g>
    <!-- Envelope -->
    <path d="M800,160
             C 980,160 1010,330 980,440
             C 960,495 880,520 800,520
             C 720,520 640,495 620,440
             C 590,330 620,160 800,160 Z"
          fill="url(#balloon)"/>
    <!-- Vertical gore stripes -->
    <path d="M800,160 C 770,260 770,420 800,520" stroke="#78350f" stroke-width="2" fill="none" opacity="0.55"/>
    <path d="M800,160 C 830,260 830,420 800,520" stroke="#78350f" stroke-width="2" fill="none" opacity="0.55"/>
    <path d="M720,170 C 700,270 700,410 740,510" stroke="#78350f" stroke-width="2" fill="none" opacity="0.45"/>
    <path d="M880,170 C 900,270 900,410 860,510" stroke="#78350f" stroke-width="2" fill="none" opacity="0.45"/>
    <!-- Secondary band (violet would clash; use amber band as accent) -->
    <path d="M625,360 C 660,395 940,395 975,360 L975,395 C 940,425 660,425 625,395 Z"
          fill="#fbbf24" opacity="0.85"/>
    <!-- Shading -->
    <path d="M800,160
             C 980,160 1010,330 980,440
             C 960,495 880,520 800,520
             C 720,520 640,495 620,440
             C 590,330 620,160 800,160 Z"
          fill="url(#balloonShade)"/>
    <!-- Crown -->
    <ellipse cx="800" cy="160" rx="22" ry="8" fill="#78350f"/>
    <!-- Basket -->
    <rect x="765" y="595" width="70" height="40" rx="4" fill="#78350f"/>
    <rect x="765" y="600" width="70" height="6" fill="#9a3309" opacity="0.7"/>
    <rect x="765" y="618" width="70" height="6" fill="#9a3309" opacity="0.7"/>
    <!-- Burner glow -->
    <ellipse cx="800" cy="565" rx="18" ry="10" fill="#fbbf24" opacity="0.7"/>
  </g>

  <!-- A second, distant balloon for depth (outside hero focus, inside safe-ish zone) -->
  <g opacity="0.55">
    <path d="M280,330
             C 330,330 340,390 330,425
             C 322,450 298,460 280,460
             C 262,460 238,450 230,425
             C 220,390 230,330 280,330 Z"
          fill="#9a3309"/>
    <rect x="270" y="475" width="20" height="12" rx="2" fill="#1a0e0e"/>
    <line x1="248" y1="450" x2="270" y2="475" stroke="#1a0e0e" stroke-width="1" opacity="0.7"/>
    <line x1="312" y1="450" x2="290" y2="475" stroke="#1a0e0e" stroke-width="1" opacity="0.7"/>
  </g>
</svg>
