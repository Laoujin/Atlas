<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#fef3ec"/>
      <stop offset="1" stop-color="#f0eadb"/>
    </linearGradient>
    <linearGradient id="boxA" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#d97706"/>
      <stop offset="1" stop-color="#9a3309"/>
    </linearGradient>
    <linearGradient id="boxB" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#c2410c"/>
      <stop offset="1" stop-color="#78350f"/>
    </linearGradient>
    <linearGradient id="ribbon" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#fbbf24"/>
      <stop offset="1" stop-color="#d97706"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.5" r="0.6">
      <stop offset="0" stop-color="#fbbf24" stop-opacity="0.35"/>
      <stop offset="1" stop-color="#fbbf24" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1600" height="900" fill="url(#bg)"/>
  <ellipse cx="800" cy="460" rx="620" ry="380" fill="url(#glow)"/>

  <!-- Back box (larger, tilted left) -->
  <g transform="translate(620 470) rotate(-8)" opacity="0.92">
    <rect x="-280" y="-200" width="560" height="400" rx="8" fill="url(#boxB)"/>
    <rect x="-280" y="-30" width="560" height="60" fill="url(#ribbon)" opacity="0.95"/>
    <rect x="-30" y="-200" width="60" height="400" fill="url(#ribbon)" opacity="0.95"/>
    <path d="M -30 -200 C -120 -290 -200 -240 -120 -200 C -60 -180 -30 -200 -30 -200 Z" fill="#fbbf24" opacity="0.9"/>
    <path d="M 30 -200 C 120 -290 200 -240 120 -200 C 60 -180 30 -200 30 -200 Z" fill="#fbbf24" opacity="0.9"/>
    <circle cx="0" cy="-200" r="14" fill="#9a3309"/>
  </g>

  <!-- Front hero box (smaller, tilted right) -->
  <g transform="translate(990 510) rotate(7)">
    <rect x="-220" y="-160" width="440" height="320" rx="6" fill="url(#boxA)"/>
    <rect x="-220" y="-20" width="440" height="48" fill="url(#ribbon)"/>
    <rect x="-24" y="-160" width="48" height="320" fill="url(#ribbon)"/>
    <path d="M -24 -160 C -110 -240 -180 -195 -110 -160 C -55 -145 -24 -160 -24 -160 Z" fill="#fbbf24"/>
    <path d="M 24 -160 C 110 -240 180 -195 110 -160 C 55 -145 24 -160 24 -160 Z" fill="#fbbf24"/>
    <circle cx="0" cy="-160" r="12" fill="#78350f"/>
  </g>

  <!-- Confetti dots inside safe zone -->
  <circle cx="280" cy="220" r="7" fill="#c2410c" opacity="0.75"/>
  <circle cx="360" cy="320" r="5" fill="#fbbf24" opacity="0.85"/>
  <circle cx="220" cy="640" r="6" fill="#9a3309" opacity="0.7"/>
  <circle cx="1340" cy="240" r="6" fill="#d97706" opacity="0.8"/>
  <circle cx="1420" cy="380" r="5" fill="#fbbf24" opacity="0.85"/>
  <circle cx="1380" cy="700" r="7" fill="#c2410c" opacity="0.75"/>
  <circle cx="1280" cy="180" r="4" fill="#78350f" opacity="0.7"/>
  <circle cx="180" cy="460" r="5" fill="#d97706" opacity="0.8"/>

  <!-- Small spark squares -->
  <rect x="320" y="720" width="10" height="10" fill="#fbbf24" opacity="0.8" transform="rotate(20 325 725)"/>
  <rect x="1300" y="520" width="9" height="9" fill="#c2410c" opacity="0.75" transform="rotate(35 1304 524)"/>
  <rect x="240" y="380" width="8" height="8" fill="#9a3309" opacity="0.7" transform="rotate(15 244 384)"/>
</svg>
