<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#1a0e0e"/>
      <stop offset="1" stop-color="#5c2a1a"/>
    </linearGradient>
    <radialGradient id="spot" cx="0.5" cy="0.15" r="0.7">
      <stop offset="0" stop-color="#fbbf24" stop-opacity="0.55"/>
      <stop offset="0.5" stop-color="#d97706" stop-opacity="0.18"/>
      <stop offset="1" stop-color="#d97706" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="beam" x1="0.5" y1="0" x2="0.5" y2="1">
      <stop offset="0" stop-color="#fbbf24" stop-opacity="0.45"/>
      <stop offset="1" stop-color="#fbbf24" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="mic" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#d97706"/>
      <stop offset="1" stop-color="#9a3309"/>
    </linearGradient>
    <linearGradient id="podium" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#c2410c"/>
      <stop offset="1" stop-color="#78350f"/>
    </linearGradient>
  </defs>

  <!-- full bleed background -->
  <rect width="1600" height="900" fill="url(#bg)"/>

  <!-- spotlight glow on stage -->
  <ellipse cx="800" cy="780" rx="900" ry="220" fill="url(#spot)"/>

  <!-- light beam descending from above onto mic -->
  <polygon points="760,90 840,90 1020,720 580,720" fill="url(#beam)" opacity="0.7"/>

  <!-- back stage horizon line as soft bar -->
  <rect x="125" y="640" width="1350" height="6" fill="#9a3309" opacity="0.35"/>

  <!-- podium block (hero base) -->
  <polygon points="640,720 960,720 1000,820 600,820" fill="url(#podium)" opacity="0.95"/>
  <rect x="600" y="816" width="400" height="10" fill="#78350f" opacity="0.9"/>

  <!-- mic stand vertical -->
  <rect x="796" y="430" width="8" height="290" fill="#78350f" opacity="0.9"/>

  <!-- mic head (hero element, centered ~800,400) -->
  <ellipse cx="800" cy="400" rx="70" ry="92" fill="url(#mic)" opacity="0.95"/>
  <ellipse cx="800" cy="400" rx="70" ry="92" fill="none" stroke="#fbbf24" stroke-width="2" opacity="0.7"/>

  <!-- mic grille slats (subtle, decorative not text) -->
  <line x1="745" y1="370" x2="855" y2="370" stroke="#1a0e0e" stroke-width="1.5" opacity="0.45"/>
  <line x1="740" y1="395" x2="860" y2="395" stroke="#1a0e0e" stroke-width="1.5" opacity="0.45"/>
  <line x1="740" y1="420" x2="860" y2="420" stroke="#1a0e0e" stroke-width="1.5" opacity="0.45"/>
  <line x1="745" y1="445" x2="855" y2="445" stroke="#1a0e0e" stroke-width="1.5" opacity="0.45"/>

  <!-- mic collar -->
  <rect x="780" y="492" width="40" height="14" rx="3" fill="#78350f" opacity="0.95"/>

  <!-- highlight on mic -->
  <ellipse cx="775" cy="370" rx="14" ry="32" fill="#fef3ec" opacity="0.35"/>

  <!-- audience suggestion: faint dotted heads in foreground (decoration, edges) -->
  <circle cx="180" cy="850" r="22" fill="#1a0e0e" opacity="0.7"/>
  <circle cx="260" cy="870" r="26" fill="#1a0e0e" opacity="0.75"/>
  <circle cx="350" cy="855" r="20" fill="#1a0e0e" opacity="0.7"/>
  <circle cx="1250" cy="855" r="20" fill="#1a0e0e" opacity="0.7"/>
  <circle cx="1340" cy="870" r="26" fill="#1a0e0e" opacity="0.75"/>
  <circle cx="1430" cy="850" r="22" fill="#1a0e0e" opacity="0.7"/>
</svg>
