<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#fef3ec"/>
      <stop offset="1" stop-color="#f0eadb"/>
    </linearGradient>
    <linearGradient id="shield" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#d97706"/>
      <stop offset="0.55" stop-color="#c2410c"/>
      <stop offset="1" stop-color="#78350f"/>
    </linearGradient>
    <linearGradient id="paper" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#faf8f2"/>
      <stop offset="1" stop-color="#f0eadb"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#fbbf24" stop-opacity="0.35"/>
      <stop offset="1" stop-color="#fbbf24" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- full-bleed background -->
  <rect width="1600" height="900" fill="url(#bg)"/>
  <ellipse cx="800" cy="460" rx="620" ry="380" fill="url(#glow)"/>

  <!-- decorative corner marks (cropped variably) -->
  <path d="M 60 60 L 60 140 M 60 60 L 140 60" stroke="#c2410c" stroke-width="6" stroke-opacity="0.45" fill="none"/>
  <path d="M 1540 840 L 1540 760 M 1540 840 L 1460 840" stroke="#c2410c" stroke-width="6" stroke-opacity="0.45" fill="none"/>

  <!-- back paper (CFP doc, slightly rotated) -->
  <g transform="translate(900 230) rotate(8)">
    <rect width="380" height="500" rx="8" fill="url(#paper)" stroke="#78350f" stroke-opacity="0.35" stroke-width="2"/>
    <rect x="40" y="60" width="260" height="10" rx="3" fill="#c2410c" opacity="0.55"/>
    <rect x="40" y="100" width="300" height="6" rx="2" fill="#78350f" opacity="0.35"/>
    <rect x="40" y="120" width="280" height="6" rx="2" fill="#78350f" opacity="0.35"/>
    <rect x="40" y="140" width="220" height="6" rx="2" fill="#78350f" opacity="0.35"/>
    <rect x="40" y="180" width="300" height="6" rx="2" fill="#78350f" opacity="0.3"/>
    <rect x="40" y="200" width="260" height="6" rx="2" fill="#78350f" opacity="0.3"/>
    <rect x="40" y="220" width="290" height="6" rx="2" fill="#78350f" opacity="0.3"/>
    <rect x="40" y="240" width="180" height="6" rx="2" fill="#78350f" opacity="0.3"/>
  </g>

  <!-- hero shield -->
  <g transform="translate(800 450)">
    <path d="M 0 -250 L 220 -180 L 220 60 Q 220 200 0 280 Q -220 200 -220 60 L -220 -180 Z"
          fill="url(#shield)" stroke="#78350f" stroke-width="3" opacity="0.95"/>
    <path d="M 0 -250 L 220 -180 L 220 60 Q 220 200 0 280 Q -220 200 -220 60 L -220 -180 Z"
          fill="none" stroke="#fbbf24" stroke-width="2" stroke-opacity="0.55" transform="scale(0.88)"/>
    <!-- keyhole motif inside shield -->
    <circle cx="0" cy="20" r="42" fill="#1a0e0e" opacity="0.65"/>
    <rect x="-14" y="40" width="28" height="80" rx="6" fill="#1a0e0e" opacity="0.65"/>
    <circle cx="0" cy="20" r="18" fill="#fbbf24" opacity="0.85"/>
  </g>
</svg>
