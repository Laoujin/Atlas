<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#fef3ec"/>
      <stop offset="1" stop-color="#f0eadb"/>
    </linearGradient>
    <linearGradient id="top" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#fbbf24"/>
      <stop offset="0.55" stop-color="#d97706"/>
      <stop offset="1" stop-color="#c2410c"/>
    </linearGradient>
    <linearGradient id="bottom" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#9a3309"/>
      <stop offset="1" stop-color="#78350f"/>
    </linearGradient>
    <radialGradient id="shine" cx="0.35" cy="0.3" r="0.6">
      <stop offset="0" stop-color="#fde68a" stop-opacity="0.85"/>
      <stop offset="1" stop-color="#fde68a" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#fbbf24" stop-opacity="0.35"/>
      <stop offset="1" stop-color="#fbbf24" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1600" height="900" fill="url(#bg)"/>
  <ellipse cx="950" cy="470" rx="520" ry="280" fill="url(#glow)"/>

  <g opacity="0.55" stroke="#c2410c" stroke-width="6" stroke-linecap="round" fill="none">
    <line x1="120" y1="360" x2="430" y2="360"/>
    <line x1="80"  y1="450" x2="380" y2="450"/>
    <line x1="140" y1="540" x2="460" y2="540"/>
    <line x1="100" y1="620" x2="360" y2="620"/>
  </g>

  <g transform="translate(950 470)">
    <rect x="-340" y="60" width="680" height="90" rx="22" fill="url(#bottom)" opacity="0.95"/>
    <path d="M -340 60 Q -340 -240 0 -240 Q 340 -240 340 60 Z" fill="url(#top)"/>
    <path d="M -310 50 Q -310 -210 0 -210 Q 310 -210 310 50" fill="url(#shine)"/>
    <ellipse cx="-130" cy="-140" rx="22" ry="9" fill="#faf8f2" opacity="0.85" transform="rotate(-18 -130 -140)"/>
    <ellipse cx="0"    cy="-180" rx="22" ry="9" fill="#faf8f2" opacity="0.85"/>
    <ellipse cx="130"  cy="-140" rx="22" ry="9" fill="#faf8f2" opacity="0.85" transform="rotate(18 130 -140)"/>
    <path d="M -340 60 L 340 60" stroke="#5c2a1a" stroke-width="3" opacity="0.4"/>
  </g>
</svg>
