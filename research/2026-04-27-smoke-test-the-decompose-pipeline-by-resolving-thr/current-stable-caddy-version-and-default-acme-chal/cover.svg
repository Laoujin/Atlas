<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#fef3ec"/>
      <stop offset="1" stop-color="#f0eadb"/>
    </linearGradient>
    <linearGradient id="rust" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#d97706"/>
      <stop offset="1" stop-color="#9a3309"/>
    </linearGradient>
    <linearGradient id="teal" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0e7490"/>
      <stop offset="1" stop-color="#0b4f63"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.5" r="0.6">
      <stop offset="0" stop-color="#fbbf24" stop-opacity="0.35"/>
      <stop offset="1" stop-color="#fbbf24" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1600" height="900" fill="url(#bg)"/>
  <circle cx="800" cy="450" r="420" fill="url(#glow)"/>

  <!-- Left block: rust "plug" with prongs -->
  <g opacity="0.92">
    <rect x="430" y="330" width="320" height="240" rx="14" fill="url(#rust)"/>
    <rect x="450" y="350" width="280" height="200" rx="8" fill="none" stroke="#fbbf24" stroke-width="2" opacity="0.5"/>
    <rect x="730" y="380" width="60" height="40" rx="4" fill="#78350f"/>
    <rect x="730" y="480" width="60" height="40" rx="4" fill="#78350f"/>
    <circle cx="490" cy="390" r="8" fill="#fbbf24" opacity="0.85"/>
  </g>

  <!-- Right block: teal "port" with sockets -->
  <g opacity="0.9">
    <rect x="850" y="330" width="320" height="240" rx="14" fill="url(#teal)"/>
    <rect x="870" y="350" width="280" height="200" rx="8" fill="none" stroke="#67e8f9" stroke-width="2" opacity="0.45"/>
    <rect x="810" y="380" width="60" height="40" rx="4" fill="#0b3a4a"/>
    <rect x="810" y="480" width="60" height="40" rx="4" fill="#0b3a4a"/>
  </g>

  <!-- Spark trail bridging the seam -->
  <g opacity="0.85">
    <circle cx="800" cy="430" r="6" fill="#fbbf24"/>
    <circle cx="800" cy="450" r="9" fill="#fbbf24"/>
    <circle cx="800" cy="470" r="6" fill="#fbbf24"/>
    <circle cx="800" cy="450" r="18" fill="none" stroke="#fbbf24" stroke-width="2" opacity="0.6"/>
  </g>

  <!-- Decorative corner ticks (cropped variably) -->
  <g opacity="0.25" fill="#c2410c">
    <rect x="80" y="80" width="40" height="3"/>
    <rect x="80" y="80" width="3" height="40"/>
    <rect x="1480" y="817" width="40" height="3"/>
    <rect x="1517" y="780" width="3" height="40"/>
  </g>
</svg>
