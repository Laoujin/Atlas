<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#faf8f2"/>
      <stop offset="1" stop-color="#f0eadb"/>
    </linearGradient>
    <linearGradient id="page" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#f0eadb"/>
    </linearGradient>
    <radialGradient id="lens" cx="0.4" cy="0.35" r="0.7">
      <stop offset="0" stop-color="#fef3ec" stop-opacity="0.85"/>
      <stop offset="0.7" stop-color="#fef3ec" stop-opacity="0.35"/>
      <stop offset="1" stop-color="#0e7490" stop-opacity="0.15"/>
    </radialGradient>
    <linearGradient id="ring" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#d97706"/>
      <stop offset="1" stop-color="#9a3309"/>
    </linearGradient>
    <linearGradient id="handle" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#78350f"/>
      <stop offset="1" stop-color="#c2410c"/>
    </linearGradient>
  </defs>

  <!-- full-bleed background -->
  <rect width="1600" height="900" fill="url(#bg)"/>

  <!-- decorative corner accents (safe to crop) -->
  <circle cx="120" cy="100" r="180" fill="#0e7490" opacity="0.06"/>
  <circle cx="1500" cy="820" r="220" fill="#c2410c" opacity="0.07"/>

  <!-- stacked angled pages (hero base) -->
  <g transform="translate(800 470) rotate(-6)">
    <rect x="-340" y="-200" width="640" height="420" rx="10" fill="url(#page)" stroke="#9a3309" stroke-width="2" opacity="0.85"/>
    <!-- faint text-line bars -->
    <rect x="-300" y="-160" width="420" height="14" rx="3" fill="#78350f" opacity="0.18"/>
    <rect x="-300" y="-120" width="520" height="14" rx="3" fill="#78350f" opacity="0.18"/>
    <rect x="-300" y="-80" width="360" height="14" rx="3" fill="#78350f" opacity="0.18"/>
    <!-- the matched line -->
    <rect x="-300" y="-40" width="480" height="20" rx="3" fill="#fbbf24" opacity="0.55"/>
    <rect x="-300" y="-40" width="480" height="20" rx="3" fill="none" stroke="#c2410c" stroke-width="1.5" opacity="0.7"/>
    <rect x="-300" y="10" width="440" height="14" rx="3" fill="#78350f" opacity="0.18"/>
    <rect x="-300" y="50" width="500" height="14" rx="3" fill="#78350f" opacity="0.18"/>
    <rect x="-300" y="90" width="380" height="14" rx="3" fill="#78350f" opacity="0.18"/>
    <rect x="-300" y="130" width="460" height="14" rx="3" fill="#78350f" opacity="0.18"/>
    <rect x="-300" y="170" width="320" height="14" rx="3" fill="#78350f" opacity="0.18"/>
  </g>

  <!-- second page peeking behind -->
  <g transform="translate(820 460) rotate(4)">
    <rect x="-330" y="-210" width="640" height="420" rx="10" fill="#fef3ec" stroke="#9a3309" stroke-width="1.5" opacity="0.55"/>
  </g>

  <!-- magnifier handle -->
  <rect x="1010" y="600" width="46" height="180" rx="22" fill="url(#handle)" transform="rotate(40 1033 690)" opacity="0.95"/>

  <!-- magnifier lens -->
  <circle cx="940" cy="430" r="170" fill="url(#lens)"/>
  <circle cx="940" cy="430" r="170" fill="none" stroke="url(#ring)" stroke-width="22" opacity="0.95"/>
  <!-- inner highlight -->
  <ellipse cx="890" cy="380" rx="55" ry="30" fill="#ffffff" opacity="0.35"/>
</svg>
