<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" preserveAspectRatio="xMidYMid slice">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#5c2a1a"/>
      <stop offset="60%" stop-color="#2a1410"/>
      <stop offset="100%" stop-color="#1a0e0e"/>
    </radialGradient>
    <radialGradient id="lure" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#fbbf24" stop-opacity="0.95"/>
      <stop offset="40%" stop-color="#d97706" stop-opacity="0.85"/>
      <stop offset="100%" stop-color="#9a3309" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="hook" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#78350f"/>
      <stop offset="50%" stop-color="#c2410c"/>
      <stop offset="100%" stop-color="#fbbf24"/>
    </linearGradient>
    <linearGradient id="screen" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#c2410c" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#78350f" stop-opacity="0.15"/>
    </linearGradient>
  </defs>

  <rect width="1600" height="900" fill="url(#bg)"/>

  <!-- distortion ripples (decoration, ok if cropped) -->
  <circle cx="800" cy="470" r="380" fill="none" stroke="#c2410c" stroke-opacity="0.12" stroke-width="2"/>
  <circle cx="800" cy="470" r="500" fill="none" stroke="#c2410c" stroke-opacity="0.08" stroke-width="2"/>
  <circle cx="800" cy="470" r="640" fill="none" stroke="#c2410c" stroke-opacity="0.05" stroke-width="2"/>

  <!-- the lure: glowing screen/portal rectangle -->
  <rect x="540" y="320" width="520" height="320" rx="14" fill="url(#screen)" stroke="#c2410c" stroke-opacity="0.55" stroke-width="2"/>
  <!-- fractured glitch lines suggesting deepfake artifacts -->
  <rect x="560" y="380" width="480" height="6" fill="#fbbf24" fill-opacity="0.18"/>
  <rect x="560" y="430" width="320" height="4" fill="#d97706" fill-opacity="0.22"/>
  <rect x="700" y="470" width="340" height="4" fill="#fbbf24" fill-opacity="0.14"/>
  <rect x="560" y="520" width="200" height="6" fill="#c2410c" fill-opacity="0.28"/>
  <rect x="800" y="560" width="240" height="4" fill="#d97706" fill-opacity="0.18"/>

  <!-- inner radial glow -->
  <circle cx="800" cy="480" r="240" fill="url(#lure)"/>

  <!-- the hook: descending from above into the lure -->
  <!-- shank -->
  <rect x="795" y="140" width="10" height="280" fill="url(#hook)"/>
  <!-- curve of the hook -->
  <path d="M 800 420 Q 800 520 740 520 Q 680 520 680 460" fill="none" stroke="url(#hook)" stroke-width="10" stroke-linecap="round"/>
  <!-- barb -->
  <path d="M 680 460 L 660 480 M 680 460 L 700 480" fill="none" stroke="#fbbf24" stroke-width="6" stroke-linecap="round"/>
  <!-- eye of the hook at top -->
  <circle cx="800" cy="138" r="14" fill="none" stroke="#c2410c" stroke-width="6"/>
  <!-- line trailing up -->
  <line x1="800" y1="124" x2="800" y2="92" stroke="#c2410c" stroke-opacity="0.6" stroke-width="2" stroke-dasharray="4 6"/>

  <!-- subtle highlight glint on the hook -->
  <rect x="797" y="160" width="3" height="200" fill="#fef3ec" fill-opacity="0.4"/>
</svg>
