<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" preserveAspectRatio="xMidYMid slice">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#5c2a1a"/>
      <stop offset="60%" stop-color="#2a1410"/>
      <stop offset="100%" stop-color="#1a0e0e"/>
    </radialGradient>
    <radialGradient id="pupil" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#fbbf24"/>
      <stop offset="40%" stop-color="#d97706"/>
      <stop offset="80%" stop-color="#9a3309"/>
      <stop offset="100%" stop-color="#78350f"/>
    </radialGradient>
    <linearGradient id="shard" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#c2410c" stop-opacity="0.85"/>
      <stop offset="100%" stop-color="#78350f" stop-opacity="0.4"/>
    </linearGradient>
  </defs>

  <!-- full-bleed background -->
  <rect width="1600" height="900" fill="url(#bg)"/>

  <!-- atmospheric outer rings (decoration, partly cropped is fine) -->
  <circle cx="800" cy="450" r="420" fill="none" stroke="#c2410c" stroke-opacity="0.18" stroke-width="2"/>
  <circle cx="800" cy="450" r="360" fill="none" stroke="#d97706" stroke-opacity="0.22" stroke-width="2"/>

  <!-- HERO: concentric trust rings, fractured -->
  <g opacity="0.95">
    <!-- outer ring (eroding) -->
    <circle cx="800" cy="450" r="290" fill="none" stroke="#9a3309" stroke-width="6" stroke-opacity="0.7" stroke-dasharray="180 40 90 30 60 50"/>
    <!-- mid ring -->
    <circle cx="800" cy="450" r="220" fill="none" stroke="#c2410c" stroke-width="5" stroke-opacity="0.85"/>
    <!-- inner ring -->
    <circle cx="800" cy="450" r="155" fill="none" stroke="#d97706" stroke-width="4" stroke-opacity="0.9"/>
  </g>

  <!-- targeting wedges piercing the rings (microtargeting / manipulation vectors) -->
  <g opacity="0.78">
    <polygon points="800,450 1180,300 1240,360" fill="url(#shard)"/>
    <polygon points="800,450 360,560 320,500" fill="url(#shard)"/>
    <polygon points="800,450 920,820 860,810" fill="url(#shard)"/>
  </g>

  <!-- central pupil: the captured attention -->
  <circle cx="800" cy="450" r="92" fill="url(#pupil)"/>
  <circle cx="800" cy="450" r="92" fill="none" stroke="#fbbf24" stroke-width="2" stroke-opacity="0.6"/>

  <!-- catch-light / lens highlight -->
  <ellipse cx="772" cy="420" rx="22" ry="14" fill="#fef3ec" opacity="0.55"/>

  <!-- scattered fragments at safe-zone fringes (broken trust) -->
  <circle cx="180" cy="180" r="6" fill="#d97706" opacity="0.5"/>
  <circle cx="1420" cy="760" r="5" fill="#fbbf24" opacity="0.55"/>
  <circle cx="1380" cy="180" r="4" fill="#c2410c" opacity="0.5"/>
  <circle cx="220" cy="740" r="5" fill="#d97706" opacity="0.5"/>
</svg>
