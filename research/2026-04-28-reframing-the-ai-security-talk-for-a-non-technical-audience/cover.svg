<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" preserveAspectRatio="xMidYMid slice">
  <defs>
    <radialGradient id="bg" cx="50%" cy="55%" r="70%">
      <stop offset="0%" stop-color="#fef3ec"/>
      <stop offset="55%" stop-color="#f0eadb"/>
      <stop offset="100%" stop-color="#e8dfc8"/>
    </radialGradient>
    <linearGradient id="hero" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#d97706"/>
      <stop offset="60%" stop-color="#c2410c"/>
      <stop offset="100%" stop-color="#9a3309"/>
    </linearGradient>
    <linearGradient id="shadow" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#6d28d9" stop-opacity="0.85"/>
      <stop offset="100%" stop-color="#4c1d95" stop-opacity="0.9"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#fbbf24" stop-opacity="0.45"/>
      <stop offset="100%" stop-color="#fbbf24" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Full-bleed background -->
  <rect width="1600" height="900" fill="url(#bg)"/>
  <ellipse cx="820" cy="470" rx="640" ry="380" fill="url(#glow)"/>

  <!-- Decorative corner dots (cropped variably, decorative only) -->
  <circle cx="140" cy="140" r="6" fill="#9a3309" opacity="0.35"/>
  <circle cx="1480" cy="120" r="8" fill="#6d28d9" opacity="0.4"/>
  <circle cx="1500" cy="800" r="5" fill="#9a3309" opacity="0.3"/>
  <circle cx="160" cy="780" r="7" fill="#6d28d9" opacity="0.35"/>

  <!-- Shadow / duplicate bubble (deepfake motif) -->
  <g opacity="0.78">
    <path d="M 620 230
             Q 540 230 540 310
             L 540 560
             Q 540 640 620 640
             L 920 640
             L 970 720
             L 990 640
             L 1100 640
             Q 1180 640 1180 560
             L 1180 310
             Q 1180 230 1100 230
             Z" fill="url(#shadow)"/>
  </g>

  <!-- Hero speech bubble -->
  <g>
    <path d="M 560 200
             Q 470 200 470 290
             L 470 560
             Q 470 650 560 650
             L 860 650
             L 800 760
             L 940 650
             L 1080 650
             Q 1170 650 1170 560
             L 1170 290
             Q 1170 200 1080 200
             Z" fill="url(#hero)"/>

    <!-- Inner abstract "speech" pills (no letters, just rhythm) -->
    <rect x="560" y="310" width="380" height="28" rx="14" fill="#fef3ec" opacity="0.85"/>
    <rect x="560" y="370" width="500" height="28" rx="14" fill="#fef3ec" opacity="0.75"/>
    <rect x="560" y="430" width="280" height="28" rx="14" fill="#fef3ec" opacity="0.65"/>

    <!-- Glitch / hallucination spark on the third (truncated) line -->
    <rect x="850" y="430" width="60" height="28" rx="14" fill="#6d28d9" opacity="0.7"/>
    <circle cx="930" cy="444" r="5" fill="#fbbf24"/>
    <circle cx="955" cy="438" r="3" fill="#fbbf24" opacity="0.7"/>
    <circle cx="975" cy="450" r="4" fill="#fbbf24" opacity="0.55"/>
  </g>

  <!-- Small distrust mark: a single rust dot floating outside the bubble, like a leak -->
  <circle cx="1200" cy="700" r="10" fill="#c2410c" opacity="0.7"/>
  <circle cx="1230" cy="730" r="6" fill="#c2410c" opacity="0.5"/>
  <circle cx="1250" cy="755" r="4" fill="#c2410c" opacity="0.35"/>
</svg>
