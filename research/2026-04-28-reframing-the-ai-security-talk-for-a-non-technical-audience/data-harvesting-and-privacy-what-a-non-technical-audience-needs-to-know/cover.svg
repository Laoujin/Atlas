<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" preserveAspectRatio="xMidYMid slice">
  <defs>
    <radialGradient id="bg" cx="50%" cy="55%" r="70%">
      <stop offset="0%" stop-color="#3a1a14"/>
      <stop offset="60%" stop-color="#1f0e0c"/>
      <stop offset="100%" stop-color="#120808"/>
    </radialGradient>
    <radialGradient id="iris" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#fbbf24"/>
      <stop offset="35%" stop-color="#d97706"/>
      <stop offset="75%" stop-color="#9a3309"/>
      <stop offset="100%" stop-color="#3a1208"/>
    </radialGradient>
    <radialGradient id="pupil" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#1a0808"/>
      <stop offset="70%" stop-color="#0a0303"/>
      <stop offset="100%" stop-color="#000"/>
    </radialGradient>
    <linearGradient id="lid" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#5c2a1a"/>
      <stop offset="100%" stop-color="#2a0f0a"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#fbbf24" stop-opacity="0.35"/>
      <stop offset="60%" stop-color="#c2410c" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#c2410c" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1600" height="900" fill="url(#bg)"/>
  <rect x="200" y="150" width="1200" height="600" fill="url(#glow)"/>

  <!-- swirling data stream pulled into the eye (orbital trails) -->
  <g fill="none" stroke="#6d28d9" stroke-opacity="0.45" stroke-width="1.5">
    <ellipse cx="800" cy="450" rx="520" ry="120" transform="rotate(-12 800 450)"/>
    <ellipse cx="800" cy="450" rx="430" ry="90" transform="rotate(8 800 450)"/>
  </g>
  <g fill="none" stroke="#d97706" stroke-opacity="0.35" stroke-width="1.5">
    <ellipse cx="800" cy="450" rx="600" ry="150" transform="rotate(18 800 450)"/>
    <ellipse cx="800" cy="450" rx="350" ry="70" transform="rotate(-22 800 450)"/>
  </g>

  <!-- data motes being harvested toward the center -->
  <g fill="#fbbf24" fill-opacity="0.85">
    <circle cx="240" cy="430" r="6"/>
    <circle cx="310" cy="380" r="4"/>
    <circle cx="370" cy="500" r="5"/>
    <circle cx="1380" cy="460" r="6"/>
    <circle cx="1310" cy="410" r="4"/>
    <circle cx="1240" cy="510" r="5"/>
    <circle cx="450" cy="350" r="3"/>
    <circle cx="1180" cy="370" r="3"/>
    <circle cx="500" cy="560" r="3"/>
    <circle cx="1110" cy="550" r="3"/>
  </g>
  <g fill="#c2410c" fill-opacity="0.7">
    <circle cx="280" cy="480" r="3"/>
    <circle cx="1340" cy="380" r="3"/>
    <circle cx="420" cy="420" r="2"/>
    <circle cx="1200" cy="480" r="2"/>
  </g>
  <g fill="#6d28d9" fill-opacity="0.7">
    <circle cx="350" cy="440" r="3"/>
    <circle cx="1260" cy="430" r="3"/>
    <circle cx="410" cy="540" r="2"/>
    <circle cx="1170" cy="420" r="2"/>
  </g>

  <!-- the eye: outer almond shape (lid) -->
  <path d="M 360 450 Q 800 130 1240 450 Q 800 770 360 450 Z" fill="url(#lid)" opacity="0.95"/>
  <!-- inner eye-white layer for depth -->
  <path d="M 410 450 Q 800 180 1190 450 Q 800 720 410 450 Z" fill="#1a0808" opacity="0.85"/>

  <!-- iris -->
  <circle cx="800" cy="450" r="200" fill="url(#iris)"/>
  <!-- iris ring detail -->
  <circle cx="800" cy="450" r="200" fill="none" stroke="#78350f" stroke-width="3" opacity="0.6"/>
  <circle cx="800" cy="450" r="170" fill="none" stroke="#fbbf24" stroke-width="1" opacity="0.35"/>

  <!-- pupil with violet glint suggesting AI gaze -->
  <circle cx="800" cy="450" r="78" fill="url(#pupil)"/>
  <circle cx="800" cy="450" r="78" fill="none" stroke="#6d28d9" stroke-width="2" opacity="0.55"/>

  <!-- catchlight -->
  <ellipse cx="772" cy="422" rx="18" ry="11" fill="#fef3ec" opacity="0.85"/>
  <circle cx="822" cy="468" r="4" fill="#fbbf24" opacity="0.7"/>

  <!-- subtle convergence lines: data being drawn in -->
  <g stroke="#fbbf24" stroke-width="1" stroke-opacity="0.4" fill="none">
    <line x1="300" y1="420" x2="620" y2="445"/>
    <line x1="1300" y1="470" x2="980" y2="455"/>
    <line x1="380" y1="510" x2="640" y2="475"/>
    <line x1="1220" y1="395" x2="960" y2="430"/>
  </g>
</svg>
