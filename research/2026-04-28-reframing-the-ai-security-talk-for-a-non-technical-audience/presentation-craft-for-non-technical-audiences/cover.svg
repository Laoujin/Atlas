<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" preserveAspectRatio="xMidYMid slice">
  <defs>
    <radialGradient id="spot" cx="50%" cy="35%" r="55%">
      <stop offset="0%" stop-color="#fbbf24" stop-opacity="0.95"/>
      <stop offset="35%" stop-color="#d97706" stop-opacity="0.55"/>
      <stop offset="70%" stop-color="#78350f" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#1a0e0e" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a0e0e"/>
      <stop offset="100%" stop-color="#5c2a1a"/>
    </linearGradient>
    <linearGradient id="podium" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#c2410c"/>
      <stop offset="100%" stop-color="#78350f"/>
    </linearGradient>
    <linearGradient id="beam" x1="0.5" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="#fbbf24" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#fbbf24" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="floor" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#9a3309" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#1a0e0e" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Full-bleed background -->
  <rect width="1600" height="900" fill="url(#bg)"/>

  <!-- Floor wash suggesting stage -->
  <rect x="0" y="640" width="1600" height="260" fill="url(#floor)" opacity="0.7"/>

  <!-- Light beam coming from above (decoration, exits frame top) -->
  <polygon points="700,0 900,0 1080,720 520,720" fill="url(#beam)" opacity="0.85"/>

  <!-- Spotlight glow (hero radial) -->
  <ellipse cx="800" cy="450" rx="620" ry="380" fill="url(#spot)"/>

  <!-- Audience silhouette dots, lower foreground (decoration, partially cropped on detail view) -->
  <g fill="#0a0606" opacity="0.85">
    <ellipse cx="180" cy="820" rx="70" ry="55"/>
    <ellipse cx="340" cy="840" rx="75" ry="60"/>
    <ellipse cx="510" cy="825" rx="70" ry="55"/>
    <ellipse cx="1090" cy="830" rx="72" ry="58"/>
    <ellipse cx="1260" cy="845" rx="78" ry="62"/>
    <ellipse cx="1430" cy="825" rx="70" ry="55"/>
  </g>

  <!-- Hero: podium / lectern, centered around (800, 520), inside safe zone -->
  <g>
    <!-- Lectern body (trapezoid) -->
    <polygon points="700,520 900,520 940,720 660,720" fill="url(#podium)" opacity="0.95"/>
    <!-- Lectern top slope -->
    <polygon points="690,500 910,500 900,520 700,520" fill="#fbbf24" opacity="0.85"/>
    <!-- Vertical stem above lectern (microphone post) -->
    <rect x="795" y="380" width="10" height="120" fill="#fbbf24" opacity="0.9"/>
    <!-- Microphone head -->
    <circle cx="800" cy="365" r="22" fill="#d97706" opacity="0.95"/>
    <circle cx="800" cy="365" r="22" fill="none" stroke="#fbbf24" stroke-width="3" opacity="0.9"/>
  </g>
</svg>
