<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#fef3ec"/>
      <stop offset="0.45" stop-color="#fbbf24" stop-opacity="0.55"/>
      <stop offset="0.78" stop-color="#d97706" stop-opacity="0.7"/>
      <stop offset="1" stop-color="#9a3309"/>
    </linearGradient>
    <radialGradient id="sun" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#fbbf24"/>
      <stop offset="0.6" stop-color="#d97706"/>
      <stop offset="1" stop-color="#c2410c"/>
    </radialGradient>
    <radialGradient id="halo" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#fbbf24" stop-opacity="0.5"/>
      <stop offset="1" stop-color="#fbbf24" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="sea" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#78350f" stop-opacity="0.85"/>
      <stop offset="1" stop-color="#5c2a1a"/>
    </linearGradient>
    <linearGradient id="shimmer" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#fbbf24" stop-opacity="0.7"/>
      <stop offset="1" stop-color="#fbbf24" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- full-bleed sky -->
  <rect width="1600" height="900" fill="url(#sky)"/>

  <!-- sun halo -->
  <circle cx="800" cy="470" r="360" fill="url(#halo)"/>

  <!-- distant island silhouette (left) -->
  <path d="M 180 555 Q 340 495 460 525 Q 560 545 640 555 L 640 580 L 180 580 Z"
        fill="#9a3309" opacity="0.55"/>

  <!-- distant island silhouette (right) - volcanic profile -->
  <path d="M 980 555 Q 1080 510 1180 535 Q 1280 555 1380 545 Q 1440 540 1480 555 L 1480 580 L 980 580 Z"
        fill="#9a3309" opacity="0.55"/>

  <!-- hero sun -->
  <circle cx="800" cy="470" r="180" fill="url(#sun)"/>

  <!-- sea -->
  <rect x="0" y="580" width="1600" height="320" fill="url(#sea)"/>

  <!-- sun reflection on sea -->
  <path d="M 740 580 L 860 580 L 920 880 L 680 880 Z" fill="url(#shimmer)" opacity="0.75"/>

  <!-- sea highlight bands -->
  <rect x="0" y="618" width="1600" height="3" fill="#d97706" opacity="0.35"/>
  <rect x="0" y="668" width="1600" height="2" fill="#d97706" opacity="0.25"/>
  <rect x="0" y="730" width="1600" height="2" fill="#d97706" opacity="0.18"/>
</svg>
