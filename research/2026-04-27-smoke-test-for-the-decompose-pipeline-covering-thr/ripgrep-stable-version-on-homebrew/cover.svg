<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#faf8f2"/>
      <stop offset="1" stop-color="#f0eadb"/>
    </linearGradient>
    <linearGradient id="rust" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#d97706"/>
      <stop offset="1" stop-color="#9a3309"/>
    </linearGradient>
    <linearGradient id="teal" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0e7490" stop-opacity="0.85"/>
      <stop offset="1" stop-color="#155e75" stop-opacity="0.85"/>
    </linearGradient>
    <linearGradient id="paper" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#fef3ec"/>
      <stop offset="1" stop-color="#f0eadb"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.5" r="0.6">
      <stop offset="0" stop-color="#fbbf24" stop-opacity="0.35"/>
      <stop offset="1" stop-color="#fbbf24" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1600" height="900" fill="url(#bg)"/>
  <ellipse cx="800" cy="450" rx="600" ry="380" fill="url(#glow)"/>

  <!-- Lower stacked package (teal accent) -->
  <g transform="translate(800 480) rotate(-6)">
    <rect x="-360" y="-200" width="720" height="400" rx="14" fill="url(#paper)" opacity="0.95" stroke="#78350f" stroke-opacity="0.18" stroke-width="2"/>
    <rect x="-360" y="-200" width="720" height="58" rx="14" fill="url(#teal)"/>
    <rect x="-360" y="-150" width="720" height="8" fill="#0e7490" opacity="0.4"/>
    <circle cx="-320" cy="-171" r="8" fill="#fbbf24" opacity="0.85"/>
    <circle cx="-290" cy="-171" r="8" fill="#faf8f2" opacity="0.7"/>
    <circle cx="-260" cy="-171" r="8" fill="#faf8f2" opacity="0.4"/>
    <rect x="-310" y="-90" width="420" height="10" rx="3" fill="#78350f" opacity="0.18"/>
    <rect x="-310" y="-60" width="540" height="10" rx="3" fill="#78350f" opacity="0.14"/>
    <rect x="-310" y="-30" width="360" height="10" rx="3" fill="#78350f" opacity="0.18"/>
    <rect x="-310" y="0" width="480" height="10" rx="3" fill="#78350f" opacity="0.14"/>
    <rect x="-310" y="30" width="300" height="10" rx="3" fill="#78350f" opacity="0.18"/>
  </g>

  <!-- Hero: rust package block on top, slightly higher and angled the other way -->
  <g transform="translate(820 410) rotate(4)">
    <rect x="-340" y="-180" width="680" height="360" rx="14" fill="url(#rust)" stroke="#5c2a1a" stroke-opacity="0.35" stroke-width="2"/>
    <rect x="-340" y="-180" width="680" height="52" rx="14" fill="#78350f" opacity="0.75"/>
    <rect x="-340" y="-134" width="680" height="6" fill="#5c2a1a" opacity="0.5"/>

    <!-- magnifier wedge (search motif, abstract) -->
    <circle cx="-160" cy="30" r="78" fill="none" stroke="#fef3ec" stroke-width="10" opacity="0.9"/>
    <circle cx="-160" cy="30" r="78" fill="#fbbf24" opacity="0.18"/>
    <line x1="-108" y1="82" x2="-30" y2="160" stroke="#fef3ec" stroke-width="14" stroke-linecap="round" opacity="0.9"/>

    <!-- version tick: a chevron mark (no letters/numbers) -->
    <path d="M 80 -20 L 150 50 L 280 -80" fill="none" stroke="#fef3ec" stroke-width="14" stroke-linecap="round" stroke-linejoin="round" opacity="0.92"/>
  </g>

  <!-- corner decoration outside safe zone -->
  <circle cx="80" cy="80" r="24" fill="#0e7490" opacity="0.25"/>
  <circle cx="1530" cy="830" r="36" fill="#c2410c" opacity="0.2"/>
</svg>
