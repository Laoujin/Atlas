<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#fef3ec"/>
      <stop offset="1" stop-color="#f0eadb"/>
    </linearGradient>
    <radialGradient id="bunTop" cx="0.4" cy="0.35" r="0.8">
      <stop offset="0" stop-color="#fbbf24"/>
      <stop offset="0.55" stop-color="#d97706"/>
      <stop offset="1" stop-color="#9a3309"/>
    </radialGradient>
    <linearGradient id="bunBase" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#c2410c"/>
      <stop offset="1" stop-color="#78350f"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#fbbf24" stop-opacity="0.45"/>
      <stop offset="1" stop-color="#fbbf24" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1600" height="900" fill="url(#bg)"/>

  <!-- ambient warmth behind hero -->
  <circle cx="800" cy="430" r="520" fill="url(#glow)"/>

  <!-- bun base (lower half — flat plate-like slab) -->
  <path d="M 470 560
           Q 470 520 520 510
           L 1080 510
           Q 1130 520 1130 560
           L 1130 600
           Q 1130 625 1090 625
           L 510 625
           Q 470 625 470 600 Z"
        fill="url(#bunBase)" opacity="0.92"/>

  <!-- crease shadow under dome -->
  <ellipse cx="800" cy="510" rx="310" ry="14" fill="#5c2a1a" opacity="0.35"/>

  <!-- bun dome (hero) -->
  <path d="M 480 510
           Q 480 320 800 300
           Q 1120 320 1120 510 Z"
        fill="url(#bunTop)" opacity="0.95"/>

  <!-- sesame-style highlight specks on dome (decorative, motif-bound) -->
  <ellipse cx="700" cy="400" rx="9" ry="5" fill="#faf8f2" opacity="0.55" transform="rotate(-18 700 400)"/>
  <ellipse cx="820" cy="370" rx="9" ry="5" fill="#faf8f2" opacity="0.6" transform="rotate(8 820 370)"/>
  <ellipse cx="930" cy="420" rx="9" ry="5" fill="#faf8f2" opacity="0.5" transform="rotate(22 930 420)"/>
  <ellipse cx="760" cy="460" rx="8" ry="4" fill="#faf8f2" opacity="0.45" transform="rotate(-5 760 460)"/>
  <ellipse cx="880" cy="455" rx="8" ry="4" fill="#faf8f2" opacity="0.5" transform="rotate(14 880 455)"/>

  <!-- release-cadence timeline beneath hero -->
  <line x1="430" y1="720" x2="1170" y2="720" stroke="#78350f" stroke-width="2" opacity="0.35"/>
  <circle cx="500" cy="720" r="10" fill="#78350f" opacity="0.55"/>
  <circle cx="650" cy="720" r="10" fill="#9a3309" opacity="0.7"/>
  <circle cx="800" cy="720" r="14" fill="#c2410c" opacity="0.95"/>
  <circle cx="800" cy="720" r="22" fill="none" stroke="#0e7490" stroke-width="2" opacity="0.7"/>
  <circle cx="950" cy="720" r="10" fill="#d97706" opacity="0.6"/>
  <circle cx="1100" cy="720" r="10" fill="#d97706" opacity="0.4"/>
</svg>
