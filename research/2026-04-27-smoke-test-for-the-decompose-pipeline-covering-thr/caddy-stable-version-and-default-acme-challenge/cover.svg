<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#fef3ec"/>
      <stop offset="1" stop-color="#f0eadb"/>
    </linearGradient>
    <linearGradient id="shield" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#d97706"/>
      <stop offset="0.55" stop-color="#c2410c"/>
      <stop offset="1" stop-color="#78350f"/>
    </linearGradient>
    <linearGradient id="slab" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0e7490" stop-opacity="0.85"/>
      <stop offset="1" stop-color="#0e7490" stop-opacity="0.55"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.5" r="0.6">
      <stop offset="0" stop-color="#fbbf24" stop-opacity="0.45"/>
      <stop offset="1" stop-color="#fbbf24" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- full-bleed background -->
  <rect width="1600" height="900" fill="url(#bg)"/>
  <circle cx="800" cy="450" r="420" fill="url(#glow)"/>

  <!-- corner decoration (gets cropped variably) -->
  <circle cx="120" cy="120" r="60" fill="#c2410c" opacity="0.12"/>
  <circle cx="1480" cy="780" r="80" fill="#0e7490" opacity="0.10"/>

  <!-- stacked server slabs behind hero (left-rear) -->
  <g opacity="0.85">
    <rect x="380" y="560" width="360" height="56" rx="6" fill="url(#slab)"/>
    <circle cx="408" cy="588" r="6" fill="#fbbf24"/>
    <circle cx="430" cy="588" r="6" fill="#faf8f2" opacity="0.7"/>
    <rect x="500" y="582" width="200" height="12" rx="3" fill="#faf8f2" opacity="0.4"/>

    <rect x="380" y="630" width="360" height="56" rx="6" fill="url(#slab)" opacity="0.85"/>
    <circle cx="408" cy="658" r="6" fill="#fbbf24" opacity="0.6"/>
    <circle cx="430" cy="658" r="6" fill="#faf8f2" opacity="0.7"/>
    <rect x="500" y="652" width="160" height="12" rx="3" fill="#faf8f2" opacity="0.4"/>
  </g>

  <!-- stacked server slabs (right-rear) -->
  <g opacity="0.75">
    <rect x="900" y="600" width="320" height="50" rx="6" fill="url(#slab)"/>
    <circle cx="924" cy="625" r="5" fill="#fbbf24"/>
    <rect x="1000" y="620" width="180" height="10" rx="3" fill="#faf8f2" opacity="0.4"/>
  </g>

  <!-- ACME challenge spark trail (handshake between client and server) -->
  <g stroke="#9a3309" stroke-width="3" fill="none" opacity="0.55" stroke-linecap="round">
    <path d="M 280 280 Q 500 220 720 320" stroke-dasharray="2 14"/>
    <path d="M 1320 280 Q 1100 220 880 320" stroke-dasharray="2 14"/>
  </g>
  <circle cx="280" cy="280" r="10" fill="#9a3309" opacity="0.7"/>
  <circle cx="1320" cy="280" r="10" fill="#9a3309" opacity="0.7"/>

  <!-- HERO: shield with padlock body, centered ~ (800, 430) -->
  <g>
    <!-- shield silhouette -->
    <path d="M 800 180
             L 1020 250
             L 1020 470
             Q 1020 620 800 720
             Q 580 620 580 470
             L 580 250 Z"
          fill="url(#shield)"/>
    <!-- inner shield bevel -->
    <path d="M 800 220
             L 980 278
             L 980 466
             Q 980 596 800 680
             Q 620 596 620 466
             L 620 278 Z"
          fill="none" stroke="#fbbf24" stroke-width="3" opacity="0.5"/>

    <!-- padlock shackle -->
    <path d="M 740 410
             Q 740 340 800 340
             Q 860 340 860 410"
          fill="none" stroke="#faf8f2" stroke-width="22" stroke-linecap="round" opacity="0.95"/>

    <!-- padlock body -->
    <rect x="710" y="410" width="180" height="160" rx="14" fill="#faf8f2" opacity="0.95"/>

    <!-- keyhole -->
    <circle cx="800" cy="475" r="18" fill="#78350f"/>
    <rect x="794" y="478" width="12" height="48" rx="3" fill="#78350f"/>
  </g>

  <!-- subtle teal accent dot on shield (LED / status) -->
  <circle cx="990" cy="260" r="9" fill="#0e7490" opacity="0.85"/>
  <circle cx="990" cy="260" r="4" fill="#fbbf24"/>
</svg>
