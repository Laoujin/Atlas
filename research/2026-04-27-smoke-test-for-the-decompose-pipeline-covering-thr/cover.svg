<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#faf8f2"/>
      <stop offset="1" stop-color="#f0eadb"/>
    </linearGradient>
    <linearGradient id="track" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#78350f" stop-opacity="0.08"/>
      <stop offset="0.5" stop-color="#78350f" stop-opacity="0.18"/>
      <stop offset="1" stop-color="#78350f" stop-opacity="0.08"/>
    </linearGradient>
    <radialGradient id="rust" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#fbbf24"/>
      <stop offset="0.55" stop-color="#d97706"/>
      <stop offset="1" stop-color="#9a3309"/>
    </radialGradient>
    <radialGradient id="teal" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#0e7490" stop-opacity="0.95"/>
      <stop offset="1" stop-color="#0e7490" stop-opacity="0.55"/>
    </radialGradient>
  </defs>

  <!-- full-bleed background -->
  <rect width="1600" height="900" fill="url(#bg)"/>

  <!-- decorative edge ticks (cropped variably; carry no meaning) -->
  <g opacity="0.25" fill="#78350f">
    <rect x="60" y="120" width="2" height="14"/>
    <rect x="60" y="300" width="2" height="14"/>
    <rect x="60" y="480" width="2" height="14"/>
    <rect x="60" y="660" width="2" height="14"/>
    <rect x="60" y="840" width="2" height="14"/>
    <rect x="1538" y="120" width="2" height="14"/>
    <rect x="1538" y="300" width="2" height="14"/>
    <rect x="1538" y="480" width="2" height="14"/>
    <rect x="1538" y="660" width="2" height="14"/>
    <rect x="1538" y="840" width="2" height="14"/>
  </g>

  <!-- three parallel tracks (hero: the lane stack) -->
  <g>
    <!-- track 1 -->
    <rect x="200" y="252" width="1200" height="36" rx="18" fill="url(#track)"/>
    <rect x="200" y="252" width="1200" height="36" rx="18" fill="none" stroke="#78350f" stroke-opacity="0.35" stroke-width="1.5"/>
    <!-- progress fill -->
    <rect x="200" y="252" width="780" height="36" rx="18" fill="#c2410c" opacity="0.85"/>
    <!-- marker -->
    <circle cx="980" cy="270" r="26" fill="url(#rust)"/>
    <circle cx="980" cy="270" r="26" fill="none" stroke="#5c2a1a" stroke-opacity="0.4" stroke-width="1.5"/>

    <!-- track 2 -->
    <rect x="200" y="432" width="1200" height="36" rx="18" fill="url(#track)"/>
    <rect x="200" y="432" width="1200" height="36" rx="18" fill="none" stroke="#78350f" stroke-opacity="0.35" stroke-width="1.5"/>
    <rect x="200" y="432" width="540" height="36" rx="18" fill="#c2410c" opacity="0.85"/>
    <circle cx="740" cy="450" r="26" fill="url(#rust)"/>
    <circle cx="740" cy="450" r="26" fill="none" stroke="#5c2a1a" stroke-opacity="0.4" stroke-width="1.5"/>

    <!-- track 3 -->
    <rect x="200" y="612" width="1200" height="36" rx="18" fill="url(#track)"/>
    <rect x="200" y="612" width="1200" height="36" rx="18" fill="none" stroke="#78350f" stroke-opacity="0.35" stroke-width="1.5"/>
    <rect x="200" y="612" width="1020" height="36" rx="18" fill="#c2410c" opacity="0.85"/>
    <circle cx="1220" cy="630" r="26" fill="url(#rust)"/>
    <circle cx="1220" cy="630" r="26" fill="none" stroke="#5c2a1a" stroke-opacity="0.4" stroke-width="1.5"/>
  </g>

  <!-- left-side teal pipeline spine: three tap-offs feeding the tracks -->
  <g>
    <rect x="148" y="240" width="6" height="420" fill="#0e7490" opacity="0.8"/>
    <circle cx="151" cy="270" r="10" fill="url(#teal)"/>
    <circle cx="151" cy="450" r="10" fill="url(#teal)"/>
    <circle cx="151" cy="630" r="10" fill="url(#teal)"/>
    <rect x="154" y="267" width="46" height="6" fill="#0e7490" opacity="0.7"/>
    <rect x="154" y="447" width="46" height="6" fill="#0e7490" opacity="0.7"/>
    <rect x="154" y="627" width="46" height="6" fill="#0e7490" opacity="0.7"/>
  </g>

  <!-- top-right faint readout dots (decoration, partially cropped on detail) -->
  <g opacity="0.35" fill="#9a3309">
    <circle cx="1480" cy="150" r="4"/>
    <circle cx="1500" cy="150" r="4"/>
    <circle cx="1520" cy="150" r="4"/>
  </g>
</svg>
