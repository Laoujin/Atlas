<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#faf8f2"/>
      <stop offset="1" stop-color="#f0eadb"/>
    </linearGradient>
    <linearGradient id="rust" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#d97706"/>
      <stop offset="1" stop-color="#9a3309"/>
    </linearGradient>
    <linearGradient id="rustTop" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#fbbf24"/>
      <stop offset="1" stop-color="#c2410c"/>
    </linearGradient>
    <linearGradient id="slate" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#475569"/>
      <stop offset="1" stop-color="#334155"/>
    </linearGradient>
    <linearGradient id="slateTop" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#64748b"/>
      <stop offset="1" stop-color="#334155"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#fbbf24" stop-opacity="0.55"/>
      <stop offset="1" stop-color="#fbbf24" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="600" height="400" fill="url(#bg)"/>
  <circle cx="310" cy="210" r="170" fill="url(#glow)" opacity="0.9"/>

  <!-- Back slate cube (outer sandbox wall) -->
  <g opacity="0.85">
    <polygon points="180,260 300,200 420,260 300,320" fill="url(#slateTop)"/>
    <polygon points="180,260 180,330 300,390 300,320" fill="#334155"/>
    <polygon points="420,260 420,330 300,390 300,320" fill="#1e293b"/>
  </g>

  <!-- Hero rust cube (the container) -->
  <g opacity="0.95">
    <polygon points="230,180 320,135 410,180 320,225" fill="url(#rustTop)"/>
    <polygon points="230,180 230,260 320,305 320,225" fill="url(#rust)"/>
    <polygon points="410,180 410,260 320,305 320,225" fill="#78350f"/>
  </g>

  <!-- LED / egress port accent on hero face -->
  <circle cx="270" cy="245" r="5" fill="#fbbf24" opacity="0.95"/>
  <circle cx="290" cy="255" r="5" fill="#fef3ec" opacity="0.7"/>
  <circle cx="310" cy="265" r="5" fill="#fef3ec" opacity="0.7"/>

  <!-- Egress allowlist spark trail leaving the container -->
  <g opacity="0.8" fill="none" stroke="#c2410c" stroke-width="2.5" stroke-linecap="round">
    <path d="M 410 210 Q 470 200 510 170"/>
  </g>
  <circle cx="510" cy="170" r="6" fill="#d97706" opacity="0.9"/>
  <circle cx="478" cy="188" r="3" fill="#d97706" opacity="0.75"/>
  <circle cx="448" cy="202" r="2.5" fill="#d97706" opacity="0.6"/>
</svg>
