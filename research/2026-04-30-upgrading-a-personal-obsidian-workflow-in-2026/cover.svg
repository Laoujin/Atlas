<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" preserveAspectRatio="xMidYMid slice">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#2a1530"/>
      <stop offset="60%" stop-color="#1a0e1e"/>
      <stop offset="100%" stop-color="#0f0810"/>
    </radialGradient>
    <radialGradient id="hub" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#fbbf24"/>
      <stop offset="45%" stop-color="#d97706"/>
      <stop offset="100%" stop-color="#9a3309"/>
    </radialGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#c2410c" stop-opacity="0.55"/>
      <stop offset="60%" stop-color="#6d28d9" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#6d28d9" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="node" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#a78bfa"/>
      <stop offset="100%" stop-color="#6d28d9"/>
    </radialGradient>
    <linearGradient id="edge" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#d97706" stop-opacity="0.85"/>
      <stop offset="100%" stop-color="#6d28d9" stop-opacity="0.6"/>
    </linearGradient>
  </defs>

  <rect width="1600" height="900" fill="url(#bg)"/>
  <circle cx="800" cy="450" r="420" fill="url(#glow)"/>

  <!-- six edges from hub to satellites -->
  <g stroke="url(#edge)" stroke-width="2.5" fill="none" opacity="0.85">
    <line x1="800" y1="450" x2="430" y2="230"/>
    <line x1="800" y1="450" x2="1170" y2="230"/>
    <line x1="800" y1="450" x2="320" y2="450"/>
    <line x1="800" y1="450" x2="1280" y2="450"/>
    <line x1="800" y1="450" x2="430" y2="670"/>
    <line x1="800" y1="450" x2="1170" y2="670"/>
  </g>

  <!-- secondary edges between satellites (graph density) -->
  <g stroke="#6d28d9" stroke-width="1.5" fill="none" opacity="0.35">
    <line x1="430" y1="230" x2="320" y2="450"/>
    <line x1="320" y1="450" x2="430" y2="670"/>
    <line x1="1170" y1="230" x2="1280" y2="450"/>
    <line x1="1280" y1="450" x2="1170" y2="670"/>
    <line x1="430" y1="230" x2="1170" y2="230"/>
    <line x1="430" y1="670" x2="1170" y2="670"/>
  </g>

  <!-- six satellite nodes (hexagonal knowledge tiles) -->
  <g opacity="0.92">
    <polygon points="430,200 456,215 456,245 430,260 404,245 404,215" fill="url(#node)" stroke="#a78bfa" stroke-width="1.5"/>
    <polygon points="1170,200 1196,215 1196,245 1170,260 1144,245 1144,215" fill="url(#node)" stroke="#a78bfa" stroke-width="1.5"/>
    <polygon points="320,420 346,435 346,465 320,480 294,465 294,435" fill="url(#node)" stroke="#a78bfa" stroke-width="1.5"/>
    <polygon points="1280,420 1306,435 1306,465 1280,480 1254,465 1254,435" fill="url(#node)" stroke="#a78bfa" stroke-width="1.5"/>
    <polygon points="430,640 456,655 456,685 430,700 404,685 404,655" fill="url(#node)" stroke="#a78bfa" stroke-width="1.5"/>
    <polygon points="1170,640 1196,655 1196,685 1170,700 1144,685 1144,655" fill="url(#node)" stroke="#a78bfa" stroke-width="1.5"/>
  </g>

  <!-- central hub: rust hexagonal knowledge tile -->
  <polygon points="800,360 878,405 878,495 800,540 722,495 722,405"
           fill="url(#hub)" stroke="#fbbf24" stroke-width="2.5" opacity="0.95"/>
  <polygon points="800,395 848,422 848,478 800,505 752,478 752,422"
           fill="none" stroke="#fef3ec" stroke-width="1.5" opacity="0.55"/>
  <circle cx="800" cy="450" r="9" fill="#fef3ec" opacity="0.9"/>

  <!-- atmospheric corner specks (cropped variably; pure decoration) -->
  <g fill="#a78bfa" opacity="0.5">
    <circle cx="120" cy="110" r="2"/>
    <circle cx="180" cy="80" r="1.5"/>
    <circle cx="1480" cy="120" r="2"/>
    <circle cx="1530" cy="170" r="1.5"/>
    <circle cx="90" cy="800" r="2"/>
    <circle cx="1510" cy="820" r="2"/>
    <circle cx="1450" cy="850" r="1.5"/>
  </g>
</svg>
