<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#faf8f2"/>
      <stop offset="1" stop-color="#f0eadb"/>
    </linearGradient>
    <linearGradient id="vault" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#d97706"/>
      <stop offset="1" stop-color="#9a3309"/>
    </linearGradient>
    <linearGradient id="capture" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#fbbf24" stop-opacity="0.85"/>
      <stop offset="1" stop-color="#c2410c" stop-opacity="0.9"/>
    </linearGradient>
    <radialGradient id="aiGlow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#6d28d9" stop-opacity="0.55"/>
      <stop offset="1" stop-color="#6d28d9" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Full-bleed background -->
  <rect width="1600" height="900" fill="url(#bg)"/>

  <!-- Subtle violet AI ambience behind the hub -->
  <circle cx="800" cy="450" r="340" fill="url(#aiGlow)"/>

  <!-- Four converging capture streams (funnels into the vault) -->
  <!-- Top-left stream -->
  <polygon points="320,180 560,200 760,420 720,470" fill="url(#capture)" opacity="0.78"/>
  <!-- Top-right stream -->
  <polygon points="1280,180 1040,200 840,420 880,470" fill="url(#capture)" opacity="0.85"/>
  <!-- Bottom-left stream -->
  <polygon points="320,720 560,700 760,480 720,430" fill="url(#capture)" opacity="0.7"/>
  <!-- Bottom-right stream -->
  <polygon points="1280,720 1040,700 840,480 880,430" fill="url(#capture)" opacity="0.82"/>

  <!-- Source nodes at outer ends of streams -->
  <circle cx="330" cy="190" r="26" fill="#78350f" opacity="0.85"/>
  <circle cx="1270" cy="190" r="26" fill="#78350f" opacity="0.85"/>
  <circle cx="330" cy="710" r="26" fill="#78350f" opacity="0.85"/>
  <circle cx="1270" cy="710" r="26" fill="#78350f" opacity="0.85"/>

  <!-- Central vault: a rounded note card (hero) -->
  <rect x="690" y="340" width="220" height="220" rx="22" fill="url(#vault)"/>
  <!-- Faint internal "lines" suggesting note content (no letters) -->
  <rect x="720" y="380" width="160" height="8" rx="4" fill="#fef3ec" opacity="0.55"/>
  <rect x="720" y="408" width="130" height="8" rx="4" fill="#fef3ec" opacity="0.45"/>
  <rect x="720" y="436" width="150" height="8" rx="4" fill="#fef3ec" opacity="0.5"/>
  <rect x="720" y="464" width="110" height="8" rx="4" fill="#fef3ec" opacity="0.4"/>
  <rect x="720" y="492" width="140" height="8" rx="4" fill="#fef3ec" opacity="0.45"/>
  <rect x="720" y="520" width="95" height="8" rx="4" fill="#fef3ec" opacity="0.4"/>

  <!-- Violet AI spark — backfill accent — orbiting the vault -->
  <circle cx="800" cy="450" r="160" fill="none" stroke="#6d28d9" stroke-opacity="0.35" stroke-width="2"/>
  <circle cx="940" cy="370" r="14" fill="#6d28d9" opacity="0.9"/>
  <circle cx="660" cy="530" r="10" fill="#6d28d9" opacity="0.75"/>
</svg>
