<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#faf8f2"/>
      <stop offset="1" stop-color="#f0eadb"/>
    </linearGradient>
    <linearGradient id="page" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#fef3ec"/>
      <stop offset="1" stop-color="#f0eadb"/>
    </linearGradient>
    <linearGradient id="rust" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#d97706"/>
      <stop offset="1" stop-color="#9a3309"/>
    </linearGradient>
    <radialGradient id="public" cx="0.5" cy="0.5" r="0.6">
      <stop offset="0" stop-color="#0e7490" stop-opacity="0.28"/>
      <stop offset="1" stop-color="#0e7490" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1600" height="900" fill="url(#bg)"/>

  <!-- public-zone glow on the right -->
  <circle cx="1180" cy="450" r="380" fill="url(#public)"/>

  <!-- private stack of notes on the left (cropped/unselected) -->
  <g opacity="0.85">
    <rect x="260" y="290" width="320" height="400" rx="6" fill="url(#page)" stroke="#c2410c" stroke-opacity="0.25" stroke-width="2" transform="rotate(-7 420 490)"/>
    <line x1="295" y1="370" x2="520" y2="342" stroke="#78350f" stroke-opacity="0.25" stroke-width="3" transform="rotate(-7 420 490)"/>
    <line x1="295" y1="410" x2="540" y2="382" stroke="#78350f" stroke-opacity="0.2" stroke-width="3" transform="rotate(-7 420 490)"/>
    <line x1="295" y1="450" x2="500" y2="422" stroke="#78350f" stroke-opacity="0.2" stroke-width="3" transform="rotate(-7 420 490)"/>
    <line x1="295" y1="490" x2="530" y2="462" stroke="#78350f" stroke-opacity="0.18" stroke-width="3" transform="rotate(-7 420 490)"/>
    <line x1="295" y1="530" x2="480" y2="502" stroke="#78350f" stroke-opacity="0.18" stroke-width="3" transform="rotate(-7 420 490)"/>
  </g>
  <g opacity="0.92">
    <rect x="300" y="270" width="320" height="400" rx="6" fill="url(#page)" stroke="#c2410c" stroke-opacity="0.35" stroke-width="2" transform="rotate(-2 460 470)"/>
    <line x1="335" y1="350" x2="580" y2="340" stroke="#78350f" stroke-opacity="0.3" stroke-width="3" transform="rotate(-2 460 470)"/>
    <line x1="335" y1="390" x2="560" y2="380" stroke="#78350f" stroke-opacity="0.25" stroke-width="3" transform="rotate(-2 460 470)"/>
    <line x1="335" y1="430" x2="580" y2="420" stroke="#78350f" stroke-opacity="0.25" stroke-width="3" transform="rotate(-2 460 470)"/>
    <line x1="335" y1="470" x2="540" y2="460" stroke="#78350f" stroke-opacity="0.22" stroke-width="3" transform="rotate(-2 460 470)"/>
    <line x1="335" y1="510" x2="570" y2="500" stroke="#78350f" stroke-opacity="0.22" stroke-width="3" transform="rotate(-2 460 470)"/>
    <line x1="335" y1="550" x2="510" y2="540" stroke="#78350f" stroke-opacity="0.2" stroke-width="3" transform="rotate(-2 460 470)"/>
  </g>

  <!-- the gate/filter: vertical bar with a slot -->
  <g>
    <rect x="780" y="160" width="14" height="240" fill="#5c2a1a" opacity="0.85"/>
    <rect x="780" y="500" width="14" height="240" fill="#5c2a1a" opacity="0.85"/>
    <circle cx="787" cy="160" r="10" fill="#78350f"/>
    <circle cx="787" cy="740" r="10" fill="#78350f"/>
  </g>

  <!-- flow trails through the gate -->
  <path d="M 620 410 Q 720 405 787 420" stroke="#0e7490" stroke-opacity="0.45" stroke-width="2.5" fill="none" stroke-dasharray="6 6"/>
  <path d="M 620 480 Q 720 478 787 470" stroke="#0e7490" stroke-opacity="0.45" stroke-width="2.5" fill="none" stroke-dasharray="6 6"/>

  <!-- selected note passing through (hero) -->
  <g>
    <rect x="850" y="330" width="340" height="240" rx="8" fill="url(#page)" stroke="#c2410c" stroke-width="2.5" opacity="0.95"/>
    <rect x="850" y="330" width="340" height="36" rx="8" fill="url(#rust)"/>
    <rect x="850" y="358" width="340" height="8" fill="url(#rust)"/>
    <line x1="880" y1="400" x2="1140" y2="400" stroke="#78350f" stroke-opacity="0.4" stroke-width="3"/>
    <line x1="880" y1="430" x2="1100" y2="430" stroke="#78350f" stroke-opacity="0.32" stroke-width="3"/>
    <line x1="880" y1="460" x2="1140" y2="460" stroke="#78350f" stroke-opacity="0.32" stroke-width="3"/>
    <line x1="880" y1="490" x2="1080" y2="490" stroke="#78350f" stroke-opacity="0.28" stroke-width="3"/>
    <line x1="880" y1="520" x2="1130" y2="520" stroke="#78350f" stroke-opacity="0.28" stroke-width="3"/>
    <!-- publish marker dot -->
    <circle cx="1160" cy="348" r="8" fill="#0e7490" opacity="0.9"/>
  </g>

  <!-- second selected note, slightly behind/offset -->
  <g opacity="0.85">
    <rect x="1230" y="500" width="200" height="160" rx="6" fill="url(#page)" stroke="#c2410c" stroke-width="2" transform="rotate(6 1330 580)"/>
    <rect x="1230" y="500" width="200" height="22" rx="6" fill="url(#rust)" transform="rotate(6 1330 580)"/>
    <line x1="1250" y1="555" x2="1410" y2="555" stroke="#78350f" stroke-opacity="0.3" stroke-width="2.5" transform="rotate(6 1330 580)"/>
    <line x1="1250" y1="585" x2="1390" y2="585" stroke="#78350f" stroke-opacity="0.25" stroke-width="2.5" transform="rotate(6 1330 580)"/>
    <line x1="1250" y1="615" x2="1410" y2="615" stroke="#78350f" stroke-opacity="0.25" stroke-width="2.5" transform="rotate(6 1330 580)"/>
  </g>

  <!-- teal accent dots: published surface -->
  <circle cx="1340" cy="280" r="5" fill="#0e7490" opacity="0.7"/>
  <circle cx="1390" cy="320" r="3" fill="#0e7490" opacity="0.55"/>
  <circle cx="1290" cy="240" r="3" fill="#0e7490" opacity="0.5"/>
</svg>
