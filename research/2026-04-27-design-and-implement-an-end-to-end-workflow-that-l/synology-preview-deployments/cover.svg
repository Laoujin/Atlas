<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#faf8f2"/>
      <stop offset="1" stop-color="#f0eadb"/>
    </linearGradient>
    <linearGradient id="chassis" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#3f4a5c"/>
      <stop offset="1" stop-color="#1f2937"/>
    </linearGradient>
    <linearGradient id="chassisTop" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#475569"/>
      <stop offset="1" stop-color="#334155"/>
    </linearGradient>
    <linearGradient id="rust" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#d97706"/>
      <stop offset="0.55" stop-color="#c2410c"/>
      <stop offset="1" stop-color="#78350f"/>
    </linearGradient>
    <linearGradient id="rustTop" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#fbbf24"/>
      <stop offset="1" stop-color="#d97706"/>
    </linearGradient>
    <radialGradient id="led" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#fde68a"/>
      <stop offset="0.5" stop-color="#fbbf24"/>
      <stop offset="1" stop-color="#c2410c" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- full-bleed background -->
  <rect width="1600" height="900" fill="url(#bg)"/>

  <!-- subtle grid hint, decorative, gets cropped -->
  <g stroke="#334155" stroke-opacity="0.06" stroke-width="1">
    <line x1="0" y1="180" x2="1600" y2="180"/>
    <line x1="0" y1="720" x2="1600" y2="720"/>
  </g>

  <!-- Isometric stacked chassis. dx=110, dy=-55 per layer.
       Base layer center near (800, 620). Three slate layers + one rust hero on top.
       Hero stays inside x:125-1475, y:90-810 -->

  <!-- LAYER 1 (bottom slate) -->
  <g opacity="0.92">
    <!-- left face -->
    <polygon points="500,640 800,790 800,700 500,550" fill="#1f2937"/>
    <!-- right face -->
    <polygon points="800,790 1100,640 1100,550 800,700" fill="#2a3445"/>
    <!-- top -->
    <polygon points="500,550 800,700 1100,550 800,400" fill="url(#chassisTop)"/>
    <!-- drive bay slits on left face -->
    <g stroke="#0f172a" stroke-width="2" opacity="0.5">
      <line x1="560" y1="600" x2="780" y2="710"/>
      <line x1="560" y1="620" x2="780" y2="730"/>
      <line x1="560" y1="640" x2="780" y2="750"/>
    </g>
  </g>

  <!-- LAYER 2 (middle slate) -->
  <g opacity="0.9" transform="translate(0,-95)">
    <polygon points="500,640 800,790 800,700 500,550" fill="url(#chassis)"/>
    <polygon points="800,790 1100,640 1100,550 800,700" fill="#334155"/>
    <polygon points="500,550 800,700 1100,550 800,400" fill="url(#chassisTop)"/>
    <g stroke="#0f172a" stroke-width="2" opacity="0.45">
      <line x1="560" y1="600" x2="780" y2="710"/>
      <line x1="560" y1="620" x2="780" y2="730"/>
      <line x1="560" y1="640" x2="780" y2="750"/>
    </g>
  </g>

  <!-- LAYER 3 (upper slate) -->
  <g opacity="0.88" transform="translate(0,-190)">
    <polygon points="500,640 800,790 800,700 500,550" fill="url(#chassis)"/>
    <polygon points="800,790 1100,640 1100,550 800,700" fill="#3f4a5c"/>
    <polygon points="500,550 800,700 1100,550 800,400" fill="url(#chassisTop)"/>
    <g stroke="#0f172a" stroke-width="2" opacity="0.4">
      <line x1="560" y1="600" x2="780" y2="710"/>
      <line x1="560" y1="620" x2="780" y2="730"/>
      <line x1="560" y1="640" x2="780" y2="750"/>
    </g>
  </g>

  <!-- HERO: rust preview chassis on top -->
  <g opacity="0.95" transform="translate(0,-285)">
    <polygon points="500,640 800,790 800,700 500,550" fill="url(#rust)"/>
    <polygon points="800,790 1100,640 1100,550 800,700" fill="#9a3309"/>
    <polygon points="500,550 800,700 1100,550 800,400" fill="url(#rustTop)"/>
    <!-- glowing LED dot, motif accent -->
    <circle cx="555" cy="585" r="22" fill="url(#led)"/>
    <circle cx="555" cy="585" r="7" fill="#fef3ec"/>
  </g>

  <!-- Branch / preview stream: a rust spark trail emerging from hero LED, off to the right -->
  <g fill="none" stroke="#c2410c" stroke-width="3" opacity="0.55" stroke-linecap="round">
    <path d="M 580 295 Q 780 240 980 285 T 1380 260" stroke-dasharray="2 14"/>
  </g>
  <g fill="#fbbf24" opacity="0.85">
    <circle cx="1380" cy="260" r="6"/>
    <circle cx="1240" cy="270" r="3"/>
    <circle cx="1100" cy="280" r="3"/>
  </g>
</svg>
