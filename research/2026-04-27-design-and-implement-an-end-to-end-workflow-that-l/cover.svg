<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#faf8f2"/>
      <stop offset="1" stop-color="#f0eadb"/>
    </linearGradient>
    <linearGradient id="bubble" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#7c3aed" stop-opacity="0.92"/>
      <stop offset="1" stop-color="#6d28d9" stop-opacity="0.88"/>
    </linearGradient>
    <linearGradient id="rust" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#d97706"/>
      <stop offset="1" stop-color="#9a3309"/>
    </linearGradient>
    <linearGradient id="rustHi" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#fbbf24" stop-opacity="0.85"/>
      <stop offset="1" stop-color="#c2410c" stop-opacity="0.95"/>
    </linearGradient>
    <linearGradient id="stack" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#78350f" stop-opacity="0.92"/>
      <stop offset="1" stop-color="#5c2a1a" stop-opacity="0.9"/>
    </linearGradient>
    <radialGradient id="spark" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#fbbf24" stop-opacity="0.95"/>
      <stop offset="1" stop-color="#fbbf24" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- full-bleed background -->
  <rect width="1600" height="900" fill="url(#bg)"/>

  <!-- decorative corner washes (safely outside hero zone) -->
  <circle cx="120" cy="120" r="220" fill="#6d28d9" opacity="0.06"/>
  <circle cx="1480" cy="780" r="260" fill="#c2410c" opacity="0.08"/>

  <!-- LEFT: chat bubble (Slack origin) -->
  <g transform="translate(290 320)">
    <path d="M0,40 Q0,0 40,0 L360,0 Q400,0 400,40 L400,220 Q400,260 360,260 L120,260 L60,310 L80,260 L40,260 Q0,260 0,220 Z"
          fill="url(#bubble)"/>
    <!-- faint message lines inside bubble -->
    <rect x="40" y="60" width="240" height="14" rx="7" fill="#faf8f2" opacity="0.55"/>
    <rect x="40" y="100" width="300" height="14" rx="7" fill="#faf8f2" opacity="0.4"/>
    <rect x="40" y="140" width="180" height="14" rx="7" fill="#faf8f2" opacity="0.45"/>
    <rect x="40" y="190" width="120" height="22" rx="11" fill="#fbbf24" opacity="0.85"/>
  </g>

  <!-- CENTER: rust hero — orchestration hub with spark trail -->
  <g>
    <!-- spark trail flowing left to right through the hub -->
    <path d="M 700,460 Q 800,380 900,460 T 1100,460"
          fill="none" stroke="url(#rustHi)" stroke-width="6" opacity="0.7" stroke-linecap="round"/>
    <circle cx="720" cy="448" r="40" fill="url(#spark)"/>
    <circle cx="1080" cy="472" r="40" fill="url(#spark)"/>

    <!-- hub: rotated rust square (diamond) representing the orchestrator -->
    <g transform="translate(800 460) rotate(45)">
      <rect x="-95" y="-95" width="190" height="190" rx="18" fill="url(#rust)"/>
      <rect x="-95" y="-95" width="190" height="95" rx="18" fill="url(#rustHi)" opacity="0.55"/>
    </g>
    <!-- inner port slot on hub -->
    <rect x="780" y="445" width="40" height="30" rx="4" fill="#1a0e0e" opacity="0.55"/>
    <circle cx="800" cy="460" r="6" fill="#fbbf24"/>
  </g>

  <!-- RIGHT: stacked deployment chassis (per-feature preview slots) -->
  <g transform="translate(1080 270)">
    <!-- back slab -->
    <rect x="40" y="40" width="280" height="80" rx="8" fill="url(#stack)" opacity="0.7"/>
    <!-- middle slab -->
    <rect x="20" y="140" width="300" height="90" rx="8" fill="url(#stack)" opacity="0.85"/>
    <circle cx="50" cy="185" r="6" fill="#fbbf24"/>
    <rect x="80" y="178" width="180" height="14" rx="7" fill="#faf8f2" opacity="0.35"/>
    <!-- front slab (active preview) -->
    <rect x="0" y="250" width="320" height="100" rx="10" fill="url(#rust)"/>
    <circle cx="32" cy="300" r="8" fill="#fbbf24"/>
    <circle cx="58" cy="300" r="8" fill="#faf8f2" opacity="0.5"/>
    <rect x="90" y="292" width="200" height="16" rx="8" fill="#faf8f2" opacity="0.55"/>
  </g>
</svg>
