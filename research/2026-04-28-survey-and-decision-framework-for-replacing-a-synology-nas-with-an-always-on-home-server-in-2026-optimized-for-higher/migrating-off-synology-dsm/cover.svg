<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#fef3ec"/>
      <stop offset="1" stop-color="#f0eadb"/>
    </linearGradient>
    <linearGradient id="src" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#475569"/>
      <stop offset="1" stop-color="#334155"/>
    </linearGradient>
    <linearGradient id="dst" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#d97706"/>
      <stop offset="1" stop-color="#9a3309"/>
    </linearGradient>
    <linearGradient id="drive" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#fbbf24"/>
      <stop offset="1" stop-color="#c2410c"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#fbbf24" stop-opacity="0.45"/>
      <stop offset="1" stop-color="#fbbf24" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1600" height="900" fill="url(#bg)"/>
  <ellipse cx="800" cy="470" rx="520" ry="180" fill="url(#glow)"/>

  <!-- SOURCE chassis (left, slate — Synology) -->
  <g opacity="0.92">
    <rect x="220" y="300" width="360" height="320" rx="10" fill="url(#src)"/>
    <rect x="220" y="300" width="360" height="36" rx="10" fill="#1e293b" opacity="0.75"/>
    <!-- drive bays (3 visible, 1 empty/pulled) -->
    <rect x="248" y="360" width="304" height="56" rx="4" fill="#1e293b" opacity="0.7"/>
    <rect x="258" y="370" width="60" height="36" rx="2" fill="#0f172a"/>
    <circle cx="538" cy="388" r="4" fill="#fbbf24"/>
    <rect x="248" y="430" width="304" height="56" rx="4" fill="#1e293b" opacity="0.7"/>
    <rect x="258" y="440" width="60" height="36" rx="2" fill="#0f172a"/>
    <circle cx="538" cy="458" r="4" fill="#fbbf24"/>
    <!-- pulled bay (empty slot, drive in transit) -->
    <rect x="248" y="500" width="304" height="56" rx="4" fill="#0b1220" opacity="0.85"/>
    <rect x="258" y="510" width="60" height="36" rx="2" fill="#020617" opacity="0.9"/>
    <rect x="248" y="570" width="304" height="36" rx="4" fill="#1e293b" opacity="0.6"/>
  </g>

  <!-- DESTINATION chassis (right, rust) -->
  <g opacity="0.94">
    <rect x="1020" y="300" width="360" height="320" rx="10" fill="url(#dst)"/>
    <rect x="1020" y="300" width="360" height="36" rx="10" fill="#78350f" opacity="0.85"/>
    <rect x="1048" y="360" width="304" height="56" rx="4" fill="#78350f" opacity="0.55"/>
    <rect x="1058" y="370" width="60" height="36" rx="2" fill="#451a03"/>
    <circle cx="1338" cy="388" r="4" fill="#fef3ec"/>
    <rect x="1048" y="430" width="304" height="56" rx="4" fill="#78350f" opacity="0.55"/>
    <rect x="1058" y="440" width="60" height="36" rx="2" fill="#451a03"/>
    <circle cx="1338" cy="458" r="4" fill="#fef3ec"/>
    <rect x="1048" y="500" width="304" height="56" rx="4" fill="#78350f" opacity="0.55"/>
    <rect x="1058" y="510" width="60" height="36" rx="2" fill="#451a03"/>
    <circle cx="1338" cy="528" r="4" fill="#fbbf24"/>
    <rect x="1048" y="570" width="304" height="36" rx="4" fill="#78350f" opacity="0.45"/>
  </g>

  <!-- transiting drive (mid-air, between chassis) -->
  <g transform="translate(720,415) rotate(-6)">
    <rect x="0" y="0" width="160" height="70" rx="6" fill="url(#drive)" opacity="0.95"/>
    <rect x="10" y="10" width="140" height="50" rx="3" fill="#7c2d12" opacity="0.55"/>
    <circle cx="135" cy="35" r="5" fill="#fef3ec"/>
    <rect x="20" y="22" width="80" height="4" rx="1" fill="#fef3ec" opacity="0.6"/>
    <rect x="20" y="34" width="60" height="4" rx="1" fill="#fef3ec" opacity="0.45"/>
    <rect x="20" y="46" width="70" height="4" rx="1" fill="#fef3ec" opacity="0.55"/>
  </g>

  <!-- arrow / data-flow arc from source to destination -->
  <path d="M 600 450 Q 800 360 1000 450" stroke="#c2410c" stroke-width="6" fill="none" stroke-linecap="round" opacity="0.85" stroke-dasharray="2 14"/>
  <path d="M 980 438 L 1010 450 L 980 462 Z" fill="#c2410c" opacity="0.9"/>

  <!-- subtle base shadows -->
  <ellipse cx="400" cy="640" rx="190" ry="10" fill="#78350f" opacity="0.18"/>
  <ellipse cx="1200" cy="640" rx="190" ry="10" fill="#78350f" opacity="0.22"/>
</svg>
