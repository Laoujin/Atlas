<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#faf8f2"/>
      <stop offset="1" stop-color="#f0eadb"/>
    </linearGradient>
    <linearGradient id="chassis" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#334155"/>
      <stop offset="1" stop-color="#1e293b"/>
    </linearGradient>
    <linearGradient id="rust" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#d97706"/>
      <stop offset="0.55" stop-color="#c2410c"/>
      <stop offset="1" stop-color="#78350f"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#fbbf24" stop-opacity="0.55"/>
      <stop offset="0.6" stop-color="#c2410c" stop-opacity="0.15"/>
      <stop offset="1" stop-color="#c2410c" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1600" height="900" fill="url(#bg)"/>

  <!-- ambient orbital rings (decoration; mesh peers metaphor) -->
  <g fill="none" stroke="#334155" stroke-opacity="0.18">
    <ellipse cx="800" cy="450" rx="560" ry="240" stroke-width="1.5"/>
    <ellipse cx="800" cy="450" rx="420" ry="170" stroke-width="1.2"/>
    <ellipse cx="800" cy="450" rx="290" ry="110" stroke-width="1"/>
  </g>

  <!-- peer nodes on rings -->
  <g fill="#334155" fill-opacity="0.7">
    <circle cx="240" cy="450" r="9"/>
    <circle cx="1360" cy="450" r="9"/>
    <circle cx="520" cy="285" r="7"/>
    <circle cx="1080" cy="615" r="7"/>
    <circle cx="1090" cy="285" r="7"/>
    <circle cx="510" cy="615" r="7"/>
  </g>

  <!-- one peer flagged as public tunnel exit -->
  <circle cx="1360" cy="450" r="14" fill="#c2410c" fill-opacity="0.85"/>

  <!-- ambient glow behind hub -->
  <circle cx="800" cy="450" r="320" fill="url(#glow)"/>

  <!-- HERO: server chassis (slate) with rust port-block interlocked -->
  <g>
    <!-- chassis body -->
    <rect x="540" y="330" width="520" height="240" rx="14" fill="url(#chassis)"/>
    <!-- chassis vent slats -->
    <g stroke="#0f172a" stroke-opacity="0.55" stroke-width="3">
      <line x1="580" y1="370" x2="780" y2="370"/>
      <line x1="580" y1="390" x2="780" y2="390"/>
      <line x1="580" y1="410" x2="780" y2="410"/>
      <line x1="580" y1="430" x2="780" y2="430"/>
    </g>
    <!-- status LEDs (rust accents on the slate, always-on cue) -->
    <circle cx="600" cy="525" r="7" fill="#fbbf24"/>
    <circle cx="630" cy="525" r="7" fill="#c2410c"/>
    <circle cx="660" cy="525" r="7" fill="#334155" stroke="#0f172a" stroke-width="1"/>

    <!-- rust "port" block interlocking from the right -->
    <rect x="900" y="370" width="260" height="160" rx="10" fill="url(#rust)"/>
    <!-- port slot bites (negative space) -->
    <rect x="930" y="410" width="60" height="22" rx="3" fill="#1a0e0e" fill-opacity="0.55"/>
    <rect x="1010" y="410" width="60" height="22" rx="3" fill="#1a0e0e" fill-opacity="0.55"/>
    <rect x="930" y="450" width="60" height="22" rx="3" fill="#1a0e0e" fill-opacity="0.55"/>
    <rect x="1010" y="450" width="60" height="22" rx="3" fill="#1a0e0e" fill-opacity="0.55"/>

    <!-- tunnel/cable arcing out from rust block toward the flagged exit node -->
    <path d="M1160 450 Q1260 430 1346 450" fill="none" stroke="#c2410c" stroke-width="5" stroke-linecap="round" stroke-opacity="0.85"/>
    <path d="M1160 450 Q1260 430 1346 450" fill="none" stroke="#fbbf24" stroke-width="1.5" stroke-linecap="round" stroke-opacity="0.9"/>

    <!-- mesh links from chassis to a couple peers (subtle) -->
    <g stroke="#334155" stroke-opacity="0.45" stroke-width="2" fill="none">
      <path d="M540 450 Q390 450 240 450"/>
      <path d="M620 330 Q570 305 520 285"/>
      <path d="M980 570 Q1030 595 1080 615"/>
    </g>
  </g>

  <!-- power/UPS pulse: small bolt-like accent below hero, inside safe zone -->
  <path d="M780 720 L808 690 L796 712 L820 712 L792 752 L804 728 Z" fill="#fbbf24" fill-opacity="0.85"/>
</svg>
