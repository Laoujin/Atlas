<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#faf8f2"/>
      <stop offset="1" stop-color="#f0eadb"/>
    </linearGradient>
    <linearGradient id="rust" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#d97706"/>
      <stop offset="1" stop-color="#9a3309"/>
    </linearGradient>
    <linearGradient id="rustTop" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#fbbf24"/>
      <stop offset="1" stop-color="#c2410c"/>
    </linearGradient>
    <linearGradient id="slate" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#475569"/>
      <stop offset="1" stop-color="#334155"/>
    </linearGradient>
    <linearGradient id="slateTop" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#64748b"/>
      <stop offset="1" stop-color="#334155"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.5" r="0.6">
      <stop offset="0" stop-color="#fbbf24" stop-opacity="0.35"/>
      <stop offset="1" stop-color="#fbbf24" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Full-bleed background -->
  <rect width="1600" height="900" fill="url(#bg)"/>
  <ellipse cx="800" cy="500" rx="700" ry="380" fill="url(#glow)"/>

  <!-- Decoration: faint baseline grid lines (cropped freely) -->
  <g stroke="#78350f" stroke-opacity="0.08" stroke-width="1">
    <line x1="0" y1="720" x2="1600" y2="720"/>
    <line x1="0" y1="760" x2="1600" y2="760"/>
    <line x1="0" y1="800" x2="1600" y2="800"/>
  </g>

  <!-- Hero: three isometric stacked chassis, centered ~(800, 450) -->
  <!-- Iso projection: x' = x + 0.5*y, with skew for top/side faces -->

  <!-- BOTTOM CHASSIS (slate, large NAS) -->
  <g opacity="0.95">
    <!-- top face (parallelogram) -->
    <polygon points="540,640 1140,640 1240,580 640,580" fill="url(#slateTop)"/>
    <!-- front face -->
    <polygon points="540,640 1140,640 1140,720 540,720" fill="url(#slate)"/>
    <!-- side face -->
    <polygon points="1140,640 1240,580 1240,660 1140,720" fill="#1e293b"/>
    <!-- drive bay slots on front -->
    <g fill="#0f172a" opacity="0.85">
      <rect x="570" y="655" width="130" height="50" rx="3"/>
      <rect x="710" y="655" width="130" height="50" rx="3"/>
      <rect x="850" y="655" width="130" height="50" rx="3"/>
      <rect x="990" y="655" width="130" height="50" rx="3"/>
    </g>
    <!-- LED accents -->
    <circle cx="585" cy="668" r="3" fill="#fbbf24"/>
    <circle cx="725" cy="668" r="3" fill="#fbbf24"/>
    <circle cx="865" cy="668" r="3" fill="#fbbf24"/>
    <circle cx="1005" cy="668" r="3" fill="#c2410c"/>
  </g>

  <!-- MIDDLE CHASSIS (rust, mid-size) -->
  <g opacity="0.95">
    <polygon points="600,540 1080,540 1180,480 700,480" fill="url(#rustTop)"/>
    <polygon points="600,540 1080,540 1080,600 600,600" fill="url(#rust)"/>
    <polygon points="1080,540 1180,480 1180,540 1080,600" fill="#78350f"/>
    <!-- vent slits -->
    <g stroke="#451a03" stroke-width="2" opacity="0.7">
      <line x1="630" y1="558" x2="1040" y2="558"/>
      <line x1="630" y1="572" x2="1040" y2="572"/>
      <line x1="630" y1="586" x2="1040" y2="586"/>
    </g>
    <!-- front power dot -->
    <circle cx="1055" cy="570" r="5" fill="#fbbf24"/>
  </g>

  <!-- TOP CHASSIS (mini-PC cube, rust hero) -->
  <g opacity="0.95">
    <polygon points="680,440 980,440 1080,380 780,380" fill="url(#rustTop)"/>
    <polygon points="680,440 980,440 980,490 680,490" fill="url(#rust)"/>
    <polygon points="980,440 1080,380 1080,430 980,490" fill="#78350f"/>
    <!-- single port slot -->
    <rect x="710" y="460" width="60" height="14" rx="2" fill="#1a0e0e" opacity="0.7"/>
    <circle cx="950" cy="467" r="4" fill="#fbbf24"/>
  </g>

  <!-- Idle-wattage gauge arc (top-left of safe zone, decorative but motivated) -->
  <g transform="translate(310, 280)" opacity="0.85">
    <!-- gauge track -->
    <path d="M -70 0 A 70 70 0 0 1 70 0" fill="none" stroke="#78350f" stroke-opacity="0.25" stroke-width="10" stroke-linecap="round"/>
    <!-- gauge fill (low wattage = ~30%) -->
    <path d="M -70 0 A 70 70 0 0 1 -28 -64" fill="none" stroke="url(#rust)" stroke-width="10" stroke-linecap="round"/>
    <!-- needle -->
    <line x1="0" y1="0" x2="-30" y2="-50" stroke="#c2410c" stroke-width="3" stroke-linecap="round"/>
    <circle cx="0" cy="0" r="6" fill="#9a3309"/>
  </g>

  <!-- Small SBC accent (bottom-right area, inside safe zone) -->
  <g transform="translate(1280, 540)" opacity="0.8">
    <rect x="-50" y="-32" width="100" height="64" rx="4" fill="#334155"/>
    <rect x="-42" y="-24" width="20" height="20" fill="#0f172a"/>
    <circle cx="20" cy="-15" r="3" fill="#fbbf24"/>
    <circle cx="32" cy="-15" r="3" fill="#fbbf24"/>
    <rect x="-42" y="10" width="84" height="6" fill="#1e293b"/>
  </g>
</svg>
