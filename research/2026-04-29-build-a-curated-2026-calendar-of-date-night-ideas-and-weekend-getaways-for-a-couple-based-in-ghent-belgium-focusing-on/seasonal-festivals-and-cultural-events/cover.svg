<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" preserveAspectRatio="xMidYMid slice">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="65%">
      <stop offset="0%" stop-color="#fef3ec"/>
      <stop offset="100%" stop-color="#f0eadb"/>
    </radialGradient>
    <radialGradient id="petalA" cx="50%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#fbbf24"/>
      <stop offset="100%" stop-color="#c2410c"/>
    </radialGradient>
    <radialGradient id="petalB" cx="50%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#d97706"/>
      <stop offset="100%" stop-color="#78350f"/>
    </radialGradient>
    <radialGradient id="petalC" cx="50%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#be185d"/>
      <stop offset="100%" stop-color="#9a3309"/>
    </radialGradient>
    <radialGradient id="core" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#fbbf24"/>
      <stop offset="60%" stop-color="#d97706"/>
      <stop offset="100%" stop-color="#9a3309"/>
    </radialGradient>
  </defs>

  <rect width="1600" height="900" fill="url(#bg)"/>

  <!-- corner sprigs (decoration, croppable) -->
  <g opacity="0.35" fill="#9a3309">
    <circle cx="120" cy="120" r="14"/>
    <circle cx="160" cy="80" r="9"/>
    <circle cx="80" cy="170" r="7"/>
    <circle cx="1480" cy="780" r="14"/>
    <circle cx="1520" cy="820" r="9"/>
    <circle cx="1440" cy="830" r="7"/>
    <circle cx="1500" cy="120" r="10"/>
    <circle cx="100" cy="800" r="10"/>
  </g>

  <!-- floral medallion centered at (800, 450) -->
  <g transform="translate(800 450)">
    <!-- outer ring of 12 large petals -->
    <g opacity="0.85">
      <g transform="rotate(0)"><ellipse cx="0" cy="-260" rx="48" ry="110" fill="url(#petalA)"/></g>
      <g transform="rotate(30)"><ellipse cx="0" cy="-260" rx="48" ry="110" fill="url(#petalB)"/></g>
      <g transform="rotate(60)"><ellipse cx="0" cy="-260" rx="48" ry="110" fill="url(#petalA)"/></g>
      <g transform="rotate(90)"><ellipse cx="0" cy="-260" rx="48" ry="110" fill="url(#petalB)"/></g>
      <g transform="rotate(120)"><ellipse cx="0" cy="-260" rx="48" ry="110" fill="url(#petalA)"/></g>
      <g transform="rotate(150)"><ellipse cx="0" cy="-260" rx="48" ry="110" fill="url(#petalB)"/></g>
      <g transform="rotate(180)"><ellipse cx="0" cy="-260" rx="48" ry="110" fill="url(#petalA)"/></g>
      <g transform="rotate(210)"><ellipse cx="0" cy="-260" rx="48" ry="110" fill="url(#petalB)"/></g>
      <g transform="rotate(240)"><ellipse cx="0" cy="-260" rx="48" ry="110" fill="url(#petalA)"/></g>
      <g transform="rotate(270)"><ellipse cx="0" cy="-260" rx="48" ry="110" fill="url(#petalB)"/></g>
      <g transform="rotate(300)"><ellipse cx="0" cy="-260" rx="48" ry="110" fill="url(#petalA)"/></g>
      <g transform="rotate(330)"><ellipse cx="0" cy="-260" rx="48" ry="110" fill="url(#petalB)"/></g>
    </g>

    <!-- inner ring of 8 medium petals (rose accent) -->
    <g opacity="0.9">
      <g transform="rotate(22.5)"><ellipse cx="0" cy="-150" rx="38" ry="80" fill="url(#petalC)"/></g>
      <g transform="rotate(67.5)"><ellipse cx="0" cy="-150" rx="38" ry="80" fill="url(#petalC)"/></g>
      <g transform="rotate(112.5)"><ellipse cx="0" cy="-150" rx="38" ry="80" fill="url(#petalC)"/></g>
      <g transform="rotate(157.5)"><ellipse cx="0" cy="-150" rx="38" ry="80" fill="url(#petalC)"/></g>
      <g transform="rotate(202.5)"><ellipse cx="0" cy="-150" rx="38" ry="80" fill="url(#petalC)"/></g>
      <g transform="rotate(247.5)"><ellipse cx="0" cy="-150" rx="38" ry="80" fill="url(#petalC)"/></g>
      <g transform="rotate(292.5)"><ellipse cx="0" cy="-150" rx="38" ry="80" fill="url(#petalC)"/></g>
      <g transform="rotate(337.5)"><ellipse cx="0" cy="-150" rx="38" ry="80" fill="url(#petalC)"/></g>
    </g>

    <!-- core hub -->
    <circle r="95" fill="url(#core)" opacity="0.95"/>
    <circle r="55" fill="#78350f" opacity="0.7"/>
    <circle r="22" fill="#fbbf24" opacity="0.9"/>
  </g>
</svg>
