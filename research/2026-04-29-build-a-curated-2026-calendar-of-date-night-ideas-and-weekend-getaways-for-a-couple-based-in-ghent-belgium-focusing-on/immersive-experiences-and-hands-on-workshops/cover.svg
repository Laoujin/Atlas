<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" preserveAspectRatio="xMidYMid slice">
  <defs>
    <radialGradient id="bg" cx="50%" cy="55%" r="70%">
      <stop offset="0%" stop-color="#fef3ec"/>
      <stop offset="60%" stop-color="#f7e9d4"/>
      <stop offset="100%" stop-color="#ead7b8"/>
    </radialGradient>
    <radialGradient id="wheel" cx="50%" cy="40%" r="70%">
      <stop offset="0%" stop-color="#9a3309"/>
      <stop offset="60%" stop-color="#78350f"/>
      <stop offset="100%" stop-color="#3d1c08"/>
    </radialGradient>
    <linearGradient id="vessel" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#5c2a1a"/>
      <stop offset="35%" stop-color="#c2410c"/>
      <stop offset="65%" stop-color="#d97706"/>
      <stop offset="100%" stop-color="#78350f"/>
    </linearGradient>
    <linearGradient id="hand" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#fbbf24" stop-opacity="0.85"/>
      <stop offset="100%" stop-color="#d97706" stop-opacity="0.95"/>
    </linearGradient>
    <radialGradient id="rim" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#fbbf24" stop-opacity="0"/>
      <stop offset="85%" stop-color="#fbbf24" stop-opacity="0.0"/>
      <stop offset="100%" stop-color="#fbbf24" stop-opacity="0.6"/>
    </radialGradient>
  </defs>

  <!-- Full-bleed background -->
  <rect width="1600" height="900" fill="url(#bg)"/>

  <!-- Soft warm glow behind hero -->
  <ellipse cx="800" cy="500" rx="620" ry="340" fill="#fbbf24" opacity="0.18"/>

  <!-- Pottery wheel base shadow -->
  <ellipse cx="800" cy="755" rx="430" ry="48" fill="#3d1c08" opacity="0.25"/>

  <!-- Pottery wheel disc (perspective ellipse) -->
  <ellipse cx="800" cy="720" rx="420" ry="100" fill="url(#wheel)"/>
  <ellipse cx="800" cy="712" rx="420" ry="100" fill="none" stroke="#c2410c" stroke-width="3" opacity="0.7"/>

  <!-- Concentric motion rings on wheel -->
  <ellipse cx="800" cy="720" rx="320" ry="76" fill="none" stroke="#c2410c" stroke-width="2" opacity="0.55"/>
  <ellipse cx="800" cy="720" rx="220" ry="52" fill="none" stroke="#d97706" stroke-width="2" opacity="0.6"/>
  <ellipse cx="800" cy="720" rx="130" ry="31" fill="none" stroke="#fbbf24" stroke-width="1.5" opacity="0.7"/>

  <!-- Wet clay puddle on wheel -->
  <ellipse cx="800" cy="720" rx="115" ry="27" fill="#5c2a1a" opacity="0.85"/>

  <!-- Vessel body — tapered urn rising from the wheel -->
  <path d="M 700 720
           C 700 660, 660 620, 670 540
           C 680 470, 730 430, 740 370
           C 745 320, 735 280, 760 250
           C 780 230, 820 230, 840 250
           C 865 280, 855 320, 860 370
           C 870 430, 920 470, 930 540
           C 940 620, 900 660, 900 720
           Z"
        fill="url(#vessel)"/>

  <!-- Vessel highlight stripe -->
  <path d="M 745 700
           C 740 640, 712 600, 720 530
           C 728 470, 770 430, 778 380
           C 782 340, 775 305, 790 285"
        fill="none" stroke="#fbbf24" stroke-width="6" stroke-linecap="round" opacity="0.55"/>

  <!-- Vessel rim (top opening ellipse) -->
  <ellipse cx="800" cy="248" rx="42" ry="11" fill="#3d1c08"/>
  <ellipse cx="800" cy="246" rx="42" ry="11" fill="none" stroke="#fbbf24" stroke-width="2" opacity="0.8"/>

  <!-- Left hand cradling the vessel -->
  <path d="M 555 560
           C 540 540, 545 510, 575 500
           C 600 492, 625 500, 650 520
           C 670 535, 685 560, 695 590
           C 705 620, 700 645, 685 650
           C 665 655, 645 640, 630 620
           C 615 600, 600 585, 585 580
           C 570 575, 560 568, 555 560 Z"
        fill="url(#hand)" opacity="0.92"/>
  <!-- Left thumb -->
  <path d="M 660 530
           C 678 522, 696 528, 704 545
           C 710 560, 705 575, 690 578
           C 678 580, 668 570, 662 555 Z"
        fill="url(#hand)" opacity="0.92"/>

  <!-- Right hand cradling the vessel (mirrored) -->
  <path d="M 1045 560
           C 1060 540, 1055 510, 1025 500
           C 1000 492, 975 500, 950 520
           C 930 535, 915 560, 905 590
           C 895 620, 900 645, 915 650
           C 935 655, 955 640, 970 620
           C 985 600, 1000 585, 1015 580
           C 1030 575, 1040 568, 1045 560 Z"
        fill="url(#hand)" opacity="0.92"/>
  <!-- Right thumb -->
  <path d="M 940 530
           C 922 522, 904 528, 896 545
           C 890 560, 895 575, 910 578
           C 922 580, 932 570, 938 555 Z"
        fill="url(#hand)" opacity="0.92"/>

  <!-- Subtle clay-flecks / motion specks (decoration, low count) -->
  <circle cx="500" cy="690" r="4" fill="#78350f" opacity="0.5"/>
  <circle cx="1110" cy="700" r="5" fill="#78350f" opacity="0.5"/>
  <circle cx="540" cy="740" r="3" fill="#9a3309" opacity="0.6"/>
  <circle cx="1080" cy="745" r="3" fill="#9a3309" opacity="0.6"/>

  <!-- Edge vignette (cropped on both surfaces, atmosphere only) -->
  <rect width="1600" height="900" fill="url(#rim)" opacity="0.35"/>
</svg>
