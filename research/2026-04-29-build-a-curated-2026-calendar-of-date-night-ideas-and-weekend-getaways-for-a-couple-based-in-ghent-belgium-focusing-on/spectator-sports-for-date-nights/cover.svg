<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" preserveAspectRatio="xMidYMid slice">
  <defs>
    <radialGradient id="sky" cx="50%" cy="20%" r="80%">
      <stop offset="0%" stop-color="#5c2a1a"/>
      <stop offset="55%" stop-color="#2a1410"/>
      <stop offset="100%" stop-color="#1a0e0e"/>
    </radialGradient>
    <radialGradient id="lamp" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#fbbf24" stop-opacity="0.9"/>
      <stop offset="40%" stop-color="#d97706" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#d97706" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="track" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#d97706"/>
      <stop offset="50%" stop-color="#c2410c"/>
      <stop offset="100%" stop-color="#78350f"/>
    </linearGradient>
    <linearGradient id="trackShade" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#9a3309" stop-opacity="0.0"/>
      <stop offset="100%" stop-color="#1a0e0e" stop-opacity="0.7"/>
    </linearGradient>
    <linearGradient id="infield" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#3a1a12"/>
      <stop offset="100%" stop-color="#1a0e0e"/>
    </linearGradient>
  </defs>

  <!-- Full-bleed nocturnal background -->
  <rect width="1600" height="900" fill="url(#sky)"/>

  <!-- Stadium light glows (decoration; safe inside hero zone vertically) -->
  <circle cx="430" cy="170" r="180" fill="url(#lamp)"/>
  <circle cx="1170" cy="170" r="180" fill="url(#lamp)"/>
  <circle cx="430" cy="170" r="14" fill="#fbbf24" opacity="0.95"/>
  <circle cx="1170" cy="170" r="14" fill="#fbbf24" opacity="0.95"/>

  <!-- Velodrome banking curve (hero) -->
  <!-- Outer banking edge -->
  <path d="M 180 720 Q 800 240 1420 720 L 1420 760 Q 800 290 180 760 Z" fill="url(#track)" opacity="0.95"/>
  <!-- Track surface, banked -->
  <path d="M 200 760 Q 800 300 1400 760 L 1400 820 Q 800 380 200 820 Z" fill="url(#track)" opacity="0.9"/>
  <!-- Lower track shadow band -->
  <path d="M 200 760 Q 800 300 1400 760 L 1400 820 Q 800 380 200 820 Z" fill="url(#trackShade)" opacity="0.7"/>
  <!-- Plank lines suggesting wooden boards of 't Kuipke -->
  <path d="M 230 740 Q 800 290 1370 740" fill="none" stroke="#fbbf24" stroke-width="1.2" opacity="0.35"/>
  <path d="M 250 770 Q 800 320 1350 770" fill="none" stroke="#fbbf24" stroke-width="1.2" opacity="0.3"/>
  <path d="M 270 800 Q 800 350 1330 800" fill="none" stroke="#fbbf24" stroke-width="1.2" opacity="0.25"/>

  <!-- Inner track edge (white pursuit line) -->
  <path d="M 220 760 Q 800 310 1380 760" fill="none" stroke="#faf8f2" stroke-width="2" opacity="0.7"/>

  <!-- Infield apron -->
  <path d="M 200 820 Q 800 380 1400 820 L 1400 900 L 200 900 Z" fill="url(#infield)"/>

  <!-- Subtle ambient haze across infield -->
  <ellipse cx="800" cy="850" rx="700" ry="60" fill="#c2410c" opacity="0.12"/>
</svg>
