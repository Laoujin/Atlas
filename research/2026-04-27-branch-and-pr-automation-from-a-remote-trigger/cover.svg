<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#fef3ec"/>
      <stop offset="1" stop-color="#f0eadb"/>
    </linearGradient>
    <linearGradient id="rust" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#d97706"/>
      <stop offset="1" stop-color="#9a3309"/>
    </linearGradient>
    <linearGradient id="bolt" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#fbbf24"/>
      <stop offset="1" stop-color="#c2410c"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#fbbf24" stop-opacity="0.55"/>
      <stop offset="1" stop-color="#fbbf24" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="slate" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#475569"/>
      <stop offset="1" stop-color="#334155"/>
    </linearGradient>
  </defs>

  <!-- Full-bleed background -->
  <rect width="1600" height="900" fill="url(#bg)"/>

  <!-- Soft glow behind hero -->
  <circle cx="800" cy="470" r="420" fill="url(#glow)"/>

  <!-- Cloud (remote source), upper-left of safe zone -->
  <g opacity="0.92">
    <path d="M 280 270
             q -55 0 -65 50
             q -45 5 -45 50
             q 0 50 60 50
             l 230 0
             q 55 0 55 -50
             q 0 -45 -50 -55
             q -10 -50 -70 -50
             q -55 0 -75 30
             q -20 -25 -40 -25 z"
          fill="url(#slate)" opacity="0.85"/>
  </g>

  <!-- Lightning bolt from cloud into the graph -->
  <path d="M 360 360 L 470 360 L 420 460 L 530 460 L 410 640 L 460 520 L 360 520 Z"
        fill="url(#bolt)" opacity="0.95"/>

  <!-- Git graph: main line (horizontal) -->
  <line x1="500" y1="700" x2="1380" y2="700" stroke="#78350f" stroke-width="10" opacity="0.55" stroke-linecap="round"/>

  <!-- Branch line: rises from main, runs parallel, merges back -->
  <path d="M 640 700 C 700 700, 720 480, 820 480 L 1180 480 C 1280 480, 1300 700, 1360 700"
        stroke="url(#rust)" stroke-width="14" fill="none" stroke-linecap="round"/>

  <!-- Commit nodes on main -->
  <circle cx="540" cy="700" r="18" fill="#78350f" opacity="0.7"/>
  <circle cx="640" cy="700" r="22" fill="#78350f" opacity="0.85"/>
  <circle cx="900" cy="700" r="18" fill="#78350f" opacity="0.55"/>
  <circle cx="1100" cy="700" r="18" fill="#78350f" opacity="0.55"/>

  <!-- Commit nodes on branch -->
  <circle cx="860" cy="480" r="22" fill="#c2410c"/>
  <circle cx="1020" cy="480" r="22" fill="#c2410c"/>

  <!-- Pull request hero marker: merge node with arrow -->
  <circle cx="1180" cy="480" r="38" fill="url(#rust)"/>
  <circle cx="1180" cy="480" r="38" fill="none" stroke="#fbbf24" stroke-width="4" opacity="0.8"/>
  <!-- arrow from branch node into main, suggesting PR merge -->
  <path d="M 1180 520 C 1230 560, 1300 620, 1340 680"
        stroke="#9a3309" stroke-width="10" fill="none" stroke-linecap="round" opacity="0.85"/>
  <path d="M 1320 660 L 1350 690 L 1310 698 Z" fill="#9a3309" opacity="0.9"/>

  <!-- Spark accents along the bolt -> branch path -->
  <circle cx="600" cy="600" r="6" fill="#fbbf24" opacity="0.85"/>
  <circle cx="660" cy="560" r="4" fill="#fbbf24" opacity="0.7"/>
  <circle cx="720" cy="520" r="5" fill="#fbbf24" opacity="0.75"/>

  <!-- Edge decoration: faint corner ticks (croppable) -->
  <rect x="0" y="0" width="1600" height="6" fill="#c2410c" opacity="0.35"/>
  <rect x="0" y="894" width="1600" height="6" fill="#78350f" opacity="0.35"/>
</svg>
