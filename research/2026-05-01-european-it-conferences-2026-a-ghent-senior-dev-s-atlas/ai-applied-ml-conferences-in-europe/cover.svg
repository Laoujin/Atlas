<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#faf8f2"/>
      <stop offset="1" stop-color="#fef3ec"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.5" r="0.6">
      <stop offset="0" stop-color="#fbbf24" stop-opacity="0.35"/>
      <stop offset="1" stop-color="#fbbf24" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="hub" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#d97706"/>
      <stop offset="1" stop-color="#9a3309"/>
    </linearGradient>
    <linearGradient id="cell" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.9"/>
      <stop offset="1" stop-color="#f0eadb" stop-opacity="0.85"/>
    </linearGradient>
  </defs>

  <rect width="1600" height="900" fill="url(#bg)"/>
  <circle cx="800" cy="450" r="520" fill="url(#glow)"/>

  <!-- Calendar grid (hero), centered around (800, 450), 4 cols x 3 rows of cells -->
  <g transform="translate(440 220)" opacity="0.95">
    <!-- grid frame -->
    <rect x="0" y="0" width="720" height="460" rx="14" fill="url(#cell)" stroke="#78350f" stroke-width="2.5" opacity="0.85"/>
    <!-- header strip -->
    <rect x="0" y="0" width="720" height="60" rx="14" fill="#78350f" opacity="0.92"/>
    <rect x="0" y="46" width="720" height="14" fill="#78350f" opacity="0.92"/>

    <!-- header dots (months) -->
    <circle cx="90" cy="30" r="6" fill="#fbbf24"/>
    <circle cx="270" cy="30" r="6" fill="#fbbf24"/>
    <circle cx="450" cy="30" r="6" fill="#fbbf24"/>
    <circle cx="630" cy="30" r="6" fill="#fbbf24"/>

    <!-- vertical dividers -->
    <line x1="180" y1="60" x2="180" y2="460" stroke="#c2410c" stroke-width="1.2" opacity="0.35"/>
    <line x1="360" y1="60" x2="360" y2="460" stroke="#c2410c" stroke-width="1.2" opacity="0.35"/>
    <line x1="540" y1="60" x2="540" y2="460" stroke="#c2410c" stroke-width="1.2" opacity="0.35"/>
    <!-- horizontal dividers -->
    <line x1="0" y1="193" x2="720" y2="193" stroke="#c2410c" stroke-width="1.2" opacity="0.35"/>
    <line x1="0" y1="326" x2="720" y2="326" stroke="#c2410c" stroke-width="1.2" opacity="0.35"/>

    <!-- conference markers as filled circles in cells (hub-color hero markers) -->
    <circle cx="90" cy="126" r="18" fill="url(#hub)"/>
    <circle cx="450" cy="126" r="14" fill="#6d28d9" opacity="0.85"/>
    <circle cx="630" cy="126" r="12" fill="#c2410c" opacity="0.85"/>

    <circle cx="270" cy="259" r="22" fill="url(#hub)"/>
    <circle cx="540" cy="259" r="13" fill="#6d28d9" opacity="0.8"/>
    <circle cx="90" cy="259" r="10" fill="#d97706" opacity="0.85"/>

    <circle cx="180" cy="392" r="14" fill="#c2410c" opacity="0.85"/>
    <circle cx="450" cy="392" r="20" fill="url(#hub)"/>
    <circle cx="630" cy="392" r="11" fill="#6d28d9" opacity="0.8"/>

    <!-- connecting node-network lines tying markers across the calendar (AI circuit) -->
    <g stroke="#6d28d9" stroke-width="1.4" fill="none" opacity="0.55">
      <path d="M90 126 L270 259 L450 126"/>
      <path d="M270 259 L450 392 L630 392"/>
      <path d="M450 126 L540 259 L630 126"/>
      <path d="M180 392 L450 392"/>
      <path d="M90 259 L180 392"/>
    </g>
  </g>

  <!-- Decorative corner accents (outside safe zone) -->
  <circle cx="80" cy="80" r="40" fill="#9a3309" opacity="0.18"/>
  <circle cx="1520" cy="820" r="60" fill="#6d28d9" opacity="0.15"/>
  <circle cx="1540" cy="60" r="22" fill="#d97706" opacity="0.35"/>
</svg>
