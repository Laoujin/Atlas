<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#faf8f2"/>
      <stop offset="1" stop-color="#f0eadb"/>
    </linearGradient>
    <linearGradient id="screen" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#c2410c"/>
      <stop offset="1" stop-color="#78350f"/>
    </linearGradient>
    <linearGradient id="slideBack" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#fef3ec"/>
      <stop offset="1" stop-color="#f0eadb"/>
    </linearGradient>
    <linearGradient id="slideMid" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#fbbf24" stop-opacity="0.85"/>
      <stop offset="1" stop-color="#d97706" stop-opacity="0.9"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.55" r="0.6">
      <stop offset="0" stop-color="#fbbf24" stop-opacity="0.35"/>
      <stop offset="1" stop-color="#fbbf24" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- full-bleed background -->
  <rect width="1600" height="900" fill="url(#bg)"/>
  <rect width="1600" height="900" fill="url(#glow)"/>

  <!-- audience tier suggestions, full-bleed decoration -->
  <path d="M 0 820 L 1600 820 L 1600 900 L 0 900 Z" fill="#0e7490" opacity="0.08"/>
  <path d="M 0 760 L 1600 760 L 1600 790 L 0 790 Z" fill="#0e7490" opacity="0.06"/>
  <path d="M 0 720 L 1600 720 L 1600 740 L 0 740 Z" fill="#0e7490" opacity="0.05"/>

  <!-- back slide (deepest in stack) -->
  <g transform="translate(540 230) skewY(-6)">
    <rect x="0" y="0" width="560" height="340" rx="8" fill="url(#slideBack)" stroke="#9a3309" stroke-opacity="0.25" stroke-width="2"/>
    <rect x="40" y="50" width="280" height="14" rx="3" fill="#78350f" opacity="0.35"/>
    <rect x="40" y="90" width="420" height="8" rx="2" fill="#78350f" opacity="0.2"/>
    <rect x="40" y="110" width="380" height="8" rx="2" fill="#78350f" opacity="0.2"/>
    <rect x="40" y="130" width="350" height="8" rx="2" fill="#78350f" opacity="0.2"/>
    <rect x="40" y="170" width="180" height="8" rx="2" fill="#0e7490" opacity="0.3"/>
    <rect x="40" y="190" width="210" height="8" rx="2" fill="#0e7490" opacity="0.3"/>
  </g>

  <!-- middle slide -->
  <g transform="translate(640 280) skewY(-3)">
    <rect x="0" y="0" width="560" height="340" rx="8" fill="url(#slideMid)" opacity="0.92"/>
    <rect x="40" y="50" width="240" height="14" rx="3" fill="#78350f" opacity="0.5"/>
    <rect x="40" y="90" width="400" height="8" rx="2" fill="#78350f" opacity="0.3"/>
    <rect x="40" y="110" width="360" height="8" rx="2" fill="#78350f" opacity="0.3"/>
    <rect x="40" y="170" width="120" height="60" rx="4" fill="#0e7490" opacity="0.4"/>
    <rect x="180" y="170" width="120" height="60" rx="4" fill="#0e7490" opacity="0.3"/>
    <rect x="320" y="170" width="120" height="60" rx="4" fill="#0e7490" opacity="0.35"/>
  </g>

  <!-- hero slide (front, rust) -->
  <g transform="translate(420 200)">
    <rect x="0" y="0" width="640" height="400" rx="10" fill="url(#screen)"/>
    <rect x="0" y="0" width="640" height="400" rx="10" fill="none" stroke="#fbbf24" stroke-opacity="0.4" stroke-width="2"/>
    <!-- track bars on hero, suggesting categorized agenda -->
    <rect x="50" y="70" width="220" height="18" rx="4" fill="#fbbf24" opacity="0.95"/>
    <rect x="50" y="120" width="540" height="10" rx="3" fill="#faf8f2" opacity="0.6"/>
    <rect x="50" y="142" width="480" height="10" rx="3" fill="#faf8f2" opacity="0.45"/>
    <rect x="50" y="164" width="510" height="10" rx="3" fill="#faf8f2" opacity="0.45"/>

    <rect x="50" y="220" width="120" height="120" rx="6" fill="#fbbf24" opacity="0.85"/>
    <rect x="190" y="220" width="120" height="120" rx="6" fill="#faf8f2" opacity="0.25"/>
    <rect x="330" y="220" width="120" height="120" rx="6" fill="#faf8f2" opacity="0.18"/>
    <rect x="470" y="220" width="120" height="120" rx="6" fill="#0e7490" opacity="0.55"/>

    <!-- accent dot, like a live indicator -->
    <circle cx="590" cy="60" r="8" fill="#fbbf24"/>
    <circle cx="590" cy="60" r="14" fill="#fbbf24" opacity="0.3"/>
  </g>

  <!-- podium base shadow -->
  <ellipse cx="800" cy="640" rx="380" ry="18" fill="#78350f" opacity="0.18"/>
</svg>
