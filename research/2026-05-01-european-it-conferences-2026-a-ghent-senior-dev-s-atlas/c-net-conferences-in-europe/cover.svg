<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#fef3ec"/>
      <stop offset="1" stop-color="#f0eadb"/>
    </linearGradient>
    <radialGradient id="hub" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#fbbf24"/>
      <stop offset="0.5" stop-color="#d97706"/>
      <stop offset="1" stop-color="#9a3309"/>
    </radialGradient>
    <radialGradient id="halo" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#d97706" stop-opacity="0.35"/>
      <stop offset="1" stop-color="#d97706" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="ring" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#c2410c"/>
      <stop offset="1" stop-color="#78350f"/>
    </linearGradient>
  </defs>

  <!-- Full-bleed background -->
  <rect width="1600" height="900" fill="url(#bg)"/>

  <!-- Faint latitude lines (atmospheric, decorative) -->
  <g stroke="#c2410c" stroke-opacity="0.08" fill="none" stroke-width="1">
    <path d="M 0 230 Q 800 210 1600 240"/>
    <path d="M 0 450 Q 800 430 1600 460"/>
    <path d="M 0 670 Q 800 650 1600 680"/>
  </g>

  <!-- Connection routes radiating from hero hub -->
  <g stroke="#9a3309" stroke-opacity="0.5" fill="none" stroke-width="1.5" stroke-linecap="round">
    <path d="M 800 450 L 360 230"/>
    <path d="M 800 450 L 1240 250"/>
    <path d="M 800 450 L 280 580"/>
    <path d="M 800 450 L 1280 620"/>
    <path d="M 800 450 L 540 760"/>
    <path d="M 800 450 L 1100 770"/>
    <path d="M 800 450 L 1380 440"/>
    <path d="M 800 450 L 220 410"/>
  </g>

  <!-- City dots (conference locations) -->
  <g fill="#0e7490" fill-opacity="0.85">
    <circle cx="360" cy="230" r="10"/>
    <circle cx="1240" cy="250" r="10"/>
    <circle cx="280" cy="580" r="10"/>
    <circle cx="1280" cy="620" r="10"/>
    <circle cx="540" cy="760" r="10"/>
    <circle cx="1100" cy="770" r="10"/>
    <circle cx="1380" cy="440" r="10"/>
    <circle cx="220" cy="410" r="10"/>
  </g>
  <g fill="#0e7490" fill-opacity="0.25">
    <circle cx="360" cy="230" r="22"/>
    <circle cx="1240" cy="250" r="22"/>
    <circle cx="280" cy="580" r="22"/>
    <circle cx="1280" cy="620" r="22"/>
    <circle cx="540" cy="760" r="22"/>
    <circle cx="1100" cy="770" r="22"/>
    <circle cx="1380" cy="440" r="22"/>
    <circle cx="220" cy="410" r="22"/>
  </g>

  <!-- Hero: central hub with concentric rings (the .NET community gathering) -->
  <circle cx="800" cy="450" r="280" fill="url(#halo)"/>
  <circle cx="800" cy="450" r="180" fill="none" stroke="url(#ring)" stroke-width="2" stroke-opacity="0.4"/>
  <circle cx="800" cy="450" r="130" fill="none" stroke="url(#ring)" stroke-width="2.5" stroke-opacity="0.6"/>
  <circle cx="800" cy="450" r="85" fill="#faf8f2" stroke="#c2410c" stroke-width="3"/>
  <circle cx="800" cy="450" r="70" fill="url(#hub)"/>

  <!-- Inner hub geometric accent (faceted, evocative of .NET diamond mark without being a logo) -->
  <g fill="#faf8f2" fill-opacity="0.85">
    <polygon points="800,400 835,450 800,500 765,450"/>
  </g>
  <g fill="#9a3309" fill-opacity="0.6">
    <polygon points="800,400 835,450 800,450"/>
    <polygon points="800,500 765,450 800,450"/>
  </g>
</svg>
