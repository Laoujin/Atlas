<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#fef3ec"/>
      <stop offset="1" stop-color="#f0eadb"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.5" r="0.6">
      <stop offset="0" stop-color="#fbbf24" stop-opacity="0.35"/>
      <stop offset="1" stop-color="#fbbf24" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="land" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#d97706" stop-opacity="0.85"/>
      <stop offset="1" stop-color="#9a3309" stop-opacity="0.9"/>
    </linearGradient>
    <linearGradient id="pin" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#c2410c"/>
      <stop offset="1" stop-color="#78350f"/>
    </linearGradient>
  </defs>

  <!-- full-bleed background -->
  <rect width="1600" height="900" fill="url(#bg)"/>
  <ellipse cx="800" cy="470" rx="720" ry="420" fill="url(#glow)"/>

  <!-- faint latitude lines (decorative, atmospheric) -->
  <g stroke="#9a3309" stroke-opacity="0.08" stroke-width="1">
    <line x1="120" y1="260" x2="1480" y2="260"/>
    <line x1="120" y1="380" x2="1480" y2="380"/>
    <line x1="120" y1="500" x2="1480" y2="500"/>
    <line x1="120" y1="620" x2="1480" y2="620"/>
    <line x1="120" y1="740" x2="1480" y2="740"/>
  </g>

  <!-- HERO: stylised Europe landmass, centered around (800, 450) -->
  <g fill="url(#land)" opacity="0.92">
    <!-- main continental body -->
    <path d="M 540 280
             Q 600 230 720 240
             L 880 220
             Q 980 215 1060 250
             L 1140 270
             Q 1180 300 1160 360
             L 1130 420
             Q 1080 470 1020 490
             L 980 540
             Q 940 600 880 620
             L 800 660
             Q 740 680 690 660
             L 640 620
             Q 600 580 590 530
             L 560 470
             Q 520 410 510 360
             Q 510 310 540 280 Z"/>
    <!-- Scandinavia peninsula -->
    <path d="M 880 220
             Q 900 180 940 160
             L 980 130
             Q 1020 110 1040 140
             L 1050 200
             Q 1040 240 1010 250
             L 970 245
             Q 920 240 880 220 Z"/>
    <!-- Iberia -->
    <path d="M 510 470
             Q 470 480 440 520
             L 430 580
             Q 450 610 510 600
             L 560 580
             Q 580 540 560 500
             Q 540 480 510 470 Z"/>
    <!-- Italy boot -->
    <path d="M 820 540
             L 840 600
             Q 850 660 830 700
             L 815 720
             Q 800 720 800 700
             L 805 640
             Q 800 580 820 540 Z"/>
    <!-- UK / Ireland -->
    <path d="M 540 320
             Q 510 310 490 340
             L 480 390
             Q 490 420 530 410
             L 555 380
             Q 565 350 540 320 Z"/>
  </g>

  <!-- subtle land outline highlight -->
  <path d="M 540 280 Q 600 230 720 240 L 880 220 Q 980 215 1060 250 L 1140 270"
        fill="none" stroke="#fbbf24" stroke-opacity="0.4" stroke-width="2"/>

  <!-- conference pins: drop markers at major host cities -->
  <!-- London -->
  <g transform="translate(580,360)">
    <ellipse cx="0" cy="22" rx="10" ry="3" fill="#78350f" opacity="0.4"/>
    <path d="M 0 -28 C 14 -28 18 -14 14 -4 L 0 18 L -14 -4 C -18 -14 -14 -28 0 -28 Z" fill="url(#pin)"/>
    <circle cx="0" cy="-16" r="5" fill="#fef3ec"/>
  </g>
  <!-- Copenhagen -->
  <g transform="translate(870,290)">
    <ellipse cx="0" cy="22" rx="10" ry="3" fill="#78350f" opacity="0.4"/>
    <path d="M 0 -28 C 14 -28 18 -14 14 -4 L 0 18 L -14 -4 C -18 -14 -14 -28 0 -28 Z" fill="url(#pin)"/>
    <circle cx="0" cy="-16" r="5" fill="#fef3ec"/>
  </g>
  <!-- Oslo -->
  <g transform="translate(940,210)">
    <ellipse cx="0" cy="22" rx="10" ry="3" fill="#78350f" opacity="0.4"/>
    <path d="M 0 -28 C 14 -28 18 -14 14 -4 L 0 18 L -14 -4 C -18 -14 -14 -28 0 -28 Z" fill="url(#pin)"/>
    <circle cx="0" cy="-16" r="5" fill="#fef3ec"/>
  </g>
  <!-- Brussels (Devoxx / FOSDEM) — hero pin, slightly larger -->
  <g transform="translate(720,400)">
    <ellipse cx="0" cy="28" rx="14" ry="4" fill="#78350f" opacity="0.5"/>
    <path d="M 0 -38 C 19 -38 24 -19 19 -5 L 0 24 L -19 -5 C -24 -19 -19 -38 0 -38 Z" fill="url(#pin)"/>
    <circle cx="0" cy="-22" r="7" fill="#fef3ec"/>
    <circle cx="0" cy="-22" r="3" fill="#c2410c"/>
  </g>
  <!-- Berlin -->
  <g transform="translate(870,400)">
    <ellipse cx="0" cy="22" rx="10" ry="3" fill="#78350f" opacity="0.4"/>
    <path d="M 0 -28 C 14 -28 18 -14 14 -4 L 0 18 L -14 -4 C -18 -14 -14 -28 0 -28 Z" fill="url(#pin)"/>
    <circle cx="0" cy="-16" r="5" fill="#fef3ec"/>
  </g>
  <!-- Vilnius (Build Stuff) -->
  <g transform="translate(1060,360)">
    <ellipse cx="0" cy="22" rx="10" ry="3" fill="#78350f" opacity="0.4"/>
    <path d="M 0 -28 C 14 -28 18 -14 14 -4 L 0 18 L -14 -4 C -18 -14 -14 -28 0 -28 Z" fill="url(#pin)"/>
    <circle cx="0" cy="-16" r="5" fill="#fef3ec"/>
  </g>
  <!-- Budapest (Craft) -->
  <g transform="translate(940,500)">
    <ellipse cx="0" cy="22" rx="10" ry="3" fill="#78350f" opacity="0.4"/>
    <path d="M 0 -28 C 14 -28 18 -14 14 -4 L 0 18 L -14 -4 C -18 -14 -14 -28 0 -28 Z" fill="url(#pin)"/>
    <circle cx="0" cy="-16" r="5" fill="#fef3ec"/>
  </g>
  <!-- Malmö (Øredev) -->
  <g transform="translate(880,330)">
    <ellipse cx="0" cy="22" rx="10" ry="3" fill="#78350f" opacity="0.4"/>
    <path d="M 0 -28 C 14 -28 18 -14 14 -4 L 0 18 L -14 -4 C -18 -14 -14 -28 0 -28 Z" fill="url(#pin)"/>
    <circle cx="0" cy="-16" r="5" fill="#fef3ec"/>
  </g>
</svg>
