<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#faf8f2"/>
      <stop offset="100%" stop-color="#f0eadb"/>
    </linearGradient>
    <linearGradient id="rustHero" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#d97706"/>
      <stop offset="100%" stop-color="#9a3309"/>
    </linearGradient>
    <linearGradient id="rustMid" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#c2410c"/>
      <stop offset="100%" stop-color="#78350f"/>
    </linearGradient>
    <linearGradient id="rustSoft" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fbbf24"/>
      <stop offset="100%" stop-color="#d97706"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.5" r="0.6">
      <stop offset="0%" stop-color="#fef3ec" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#fef3ec" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1600" height="900" fill="url(#bg)"/>
  <ellipse cx="800" cy="450" rx="700" ry="380" fill="url(#glow)"/>

  <!-- faint blueprint grid (decorative, full-bleed) -->
  <g stroke="#9a3309" stroke-width="1" opacity="0.08">
    <line x1="0" y1="180" x2="1600" y2="180"/>
    <line x1="0" y1="360" x2="1600" y2="360"/>
    <line x1="0" y1="540" x2="1600" y2="540"/>
    <line x1="0" y1="720" x2="1600" y2="720"/>
    <line x1="200" y1="0" x2="200" y2="900"/>
    <line x1="500" y1="0" x2="500" y2="900"/>
    <line x1="800" y1="0" x2="800" y2="900"/>
    <line x1="1100" y1="0" x2="1100" y2="900"/>
    <line x1="1400" y1="0" x2="1400" y2="900"/>
  </g>

  <!-- Architectural layers: three stacked component tiers, isometric-ish skew -->
  <!-- Bottom layer (foundation / infra) -->
  <g opacity="0.85">
    <rect x="430" y="600" width="740" height="120" rx="6" fill="url(#rustMid)"/>
    <rect x="460" y="630" width="120" height="60" rx="3" fill="#78350f" opacity="0.6"/>
    <rect x="600" y="630" width="120" height="60" rx="3" fill="#78350f" opacity="0.6"/>
    <rect x="740" y="630" width="120" height="60" rx="3" fill="#78350f" opacity="0.6"/>
    <rect x="880" y="630" width="120" height="60" rx="3" fill="#78350f" opacity="0.6"/>
    <rect x="1020" y="630" width="120" height="60" rx="3" fill="#78350f" opacity="0.6"/>
  </g>

  <!-- Middle layer (services) -->
  <g opacity="0.92">
    <rect x="380" y="430" width="840" height="140" rx="6" fill="url(#rustHero)"/>
    <rect x="415" y="465" width="160" height="70" rx="4" fill="#fbbf24" opacity="0.85"/>
    <rect x="595" y="465" width="160" height="70" rx="4" fill="#faf8f2" opacity="0.9"/>
    <rect x="775" y="465" width="160" height="70" rx="4" fill="#fbbf24" opacity="0.85"/>
    <rect x="955" y="465" width="160" height="70" rx="4" fill="#faf8f2" opacity="0.9"/>
    <circle cx="495" cy="500" r="8" fill="#9a3309"/>
    <circle cx="675" cy="500" r="8" fill="#c2410c"/>
    <circle cx="855" cy="500" r="8" fill="#9a3309"/>
    <circle cx="1035" cy="500" r="8" fill="#c2410c"/>
  </g>

  <!-- Top layer (hero — gateway / orchestration component) -->
  <g opacity="0.95">
    <rect x="600" y="240" width="400" height="160" rx="8" fill="url(#rustSoft)"/>
    <rect x="630" y="275" width="340" height="14" rx="3" fill="#78350f" opacity="0.55"/>
    <rect x="630" y="305" width="240" height="14" rx="3" fill="#78350f" opacity="0.4"/>
    <rect x="630" y="335" width="300" height="14" rx="3" fill="#78350f" opacity="0.5"/>
    <circle cx="950" cy="280" r="10" fill="#9a3309"/>
  </g>

  <!-- Connection lines between layers -->
  <g stroke="#78350f" stroke-width="2" opacity="0.45" fill="none">
    <line x1="700" y1="400" x2="495" y2="465"/>
    <line x1="800" y1="400" x2="675" y2="465"/>
    <line x1="800" y1="400" x2="855" y2="465"/>
    <line x1="900" y1="400" x2="1035" y2="465"/>
    <line x1="495" y1="535" x2="520" y2="600"/>
    <line x1="675" y1="535" x2="660" y2="600"/>
    <line x1="855" y1="535" x2="800" y2="600"/>
    <line x1="1035" y1="535" x2="940" y2="600"/>
    <line x1="1035" y1="535" x2="1080" y2="600"/>
  </g>

  <!-- Location pin accents (conference markers) outside hero, on edges -->
  <g opacity="0.7">
    <circle cx="280" cy="250" r="14" fill="#c2410c"/>
    <circle cx="280" cy="250" r="5" fill="#faf8f2"/>
    <circle cx="1340" cy="200" r="14" fill="#c2410c"/>
    <circle cx="1340" cy="200" r="5" fill="#faf8f2"/>
    <circle cx="1380" cy="720" r="14" fill="#c2410c"/>
    <circle cx="1380" cy="720" r="5" fill="#faf8f2"/>
    <circle cx="220" cy="680" r="14" fill="#c2410c"/>
    <circle cx="220" cy="680" r="5" fill="#faf8f2"/>
  </g>
</svg>
