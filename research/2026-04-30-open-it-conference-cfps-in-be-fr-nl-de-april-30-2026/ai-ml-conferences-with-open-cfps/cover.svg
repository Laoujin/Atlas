<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" preserveAspectRatio="xMidYMid slice">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#fef3ec"/>
      <stop offset="100%" stop-color="#f0eadb"/>
    </radialGradient>
    <radialGradient id="hub" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#fbbf24"/>
      <stop offset="55%" stop-color="#d97706"/>
      <stop offset="100%" stop-color="#9a3309"/>
    </radialGradient>
    <linearGradient id="ring" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#6d28d9" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#c2410c" stop-opacity="0.7"/>
    </linearGradient>
  </defs>

  <rect width="1600" height="900" fill="url(#bg)"/>

  <!-- concentric orbits -->
  <ellipse cx="800" cy="450" rx="430" ry="170" fill="none" stroke="#6d28d9" stroke-opacity="0.35" stroke-width="2"/>
  <ellipse cx="800" cy="450" rx="320" ry="125" fill="none" stroke="#c2410c" stroke-opacity="0.45" stroke-width="2"/>
  <ellipse cx="800" cy="450" rx="210" ry="80" fill="none" stroke="#78350f" stroke-opacity="0.55" stroke-width="2"/>

  <!-- edges from hub to outer nodes -->
  <g stroke="#9a3309" stroke-opacity="0.55" stroke-width="2.2" fill="none">
    <line x1="800" y1="450" x2="380" y2="430"/>
    <line x1="800" y1="450" x2="1220" y2="470"/>
    <line x1="800" y1="450" x2="540" y2="280"/>
    <line x1="800" y1="450" x2="1080" y2="620"/>
    <line x1="800" y1="450" x2="1100" y2="290"/>
    <line x1="800" y1="450" x2="520" y2="600"/>
    <line x1="800" y1="450" x2="800" y2="240"/>
    <line x1="800" y1="450" x2="800" y2="660"/>
  </g>

  <!-- outer nodes (violet, conferences) -->
  <g fill="#6d28d9" fill-opacity="0.85">
    <circle cx="380" cy="430" r="14"/>
    <circle cx="1220" cy="470" r="14"/>
    <circle cx="540" cy="280" r="12"/>
    <circle cx="1080" cy="620" r="12"/>
    <circle cx="1100" cy="290" r="13"/>
    <circle cx="520" cy="600" r="13"/>
    <circle cx="800" cy="240" r="15"/>
    <circle cx="800" cy="660" r="15"/>
  </g>

  <!-- inner ring nodes (rust, deadlines) -->
  <g fill="#c2410c" fill-opacity="0.9">
    <circle cx="640" cy="410" r="9"/>
    <circle cx="960" cy="490" r="9"/>
    <circle cx="720" cy="370" r="8"/>
    <circle cx="880" cy="530" r="8"/>
  </g>

  <!-- central hub -->
  <circle cx="800" cy="450" r="78" fill="url(#hub)" opacity="0.95"/>
  <circle cx="800" cy="450" r="78" fill="none" stroke="url(#ring)" stroke-width="3" opacity="0.85"/>
  <circle cx="800" cy="450" r="40" fill="#fef3ec" fill-opacity="0.18"/>
</svg>
