<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" preserveAspectRatio="xMidYMid slice">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#5c2a1a"/>
      <stop offset="60%" stop-color="#2a1410"/>
      <stop offset="100%" stop-color="#1a0e0e"/>
    </radialGradient>
    <linearGradient id="bracket" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fbbf24"/>
      <stop offset="50%" stop-color="#d97706"/>
      <stop offset="100%" stop-color="#9a3309"/>
    </linearGradient>
    <linearGradient id="slash" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#fbbf24"/>
      <stop offset="100%" stop-color="#c2410c"/>
    </linearGradient>
    <radialGradient id="dot" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#fbbf24"/>
      <stop offset="60%" stop-color="#d97706"/>
      <stop offset="100%" stop-color="#9a3309" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Full-bleed background -->
  <rect width="1600" height="900" fill="url(#bg)"/>

  <!-- Faint orbital arc connecting cities -->
  <ellipse cx="800" cy="450" rx="520" ry="180" fill="none" stroke="#c2410c" stroke-width="1.5" opacity="0.25"/>
  <ellipse cx="800" cy="450" rx="420" ry="140" fill="none" stroke="#d97706" stroke-width="1" opacity="0.18"/>

  <!-- City dots (Paris, Brussels, Amsterdam, Berlin, Hamburg) along the arc -->
  <circle cx="380" cy="500" r="18" fill="url(#dot)" opacity="0.85"/>
  <circle cx="380" cy="500" r="6" fill="#fbbf24"/>
  <circle cx="600" cy="380" r="18" fill="url(#dot)" opacity="0.85"/>
  <circle cx="600" cy="380" r="6" fill="#fbbf24"/>
  <circle cx="800" cy="320" r="18" fill="url(#dot)" opacity="0.85"/>
  <circle cx="800" cy="320" r="6" fill="#fbbf24"/>
  <circle cx="1020" cy="380" r="18" fill="url(#dot)" opacity="0.85"/>
  <circle cx="1020" cy="380" r="6" fill="#fbbf24"/>
  <circle cx="1220" cy="500" r="18" fill="url(#dot)" opacity="0.85"/>
  <circle cx="1220" cy="500" r="6" fill="#fbbf24"/>

  <!-- Connecting threads between cities -->
  <path d="M 380 500 Q 490 380 600 380 Q 700 320 800 320 Q 910 320 1020 380 Q 1120 440 1220 500" fill="none" stroke="#d97706" stroke-width="2" opacity="0.55"/>

  <!-- Hero: angle brackets < / > centered -->
  <!-- Left bracket -->
  <path d="M 620 450 L 760 320 L 790 350 L 680 450 L 790 550 L 760 580 Z" fill="url(#bracket)" opacity="0.95"/>
  <!-- Slash -->
  <path d="M 870 580 L 950 320 L 985 320 L 905 580 Z" fill="url(#slash)" opacity="0.9"/>
  <!-- Right bracket -->
  <path d="M 980 450 L 840 320 L 810 350 L 920 450 L 810 550 L 840 580 Z" fill="url(#bracket)" opacity="0.95" transform="translate(180,0)"/>

  <!-- Subtle glow underneath hero -->
  <ellipse cx="800" cy="620" rx="280" ry="20" fill="#d97706" opacity="0.2"/>
</svg>
