<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" preserveAspectRatio="xMidYMid slice">
  <defs>
    <radialGradient id="bg" cx="50%" cy="60%" r="70%">
      <stop offset="0%" stop-color="#fef3ec"/>
      <stop offset="60%" stop-color="#f0eadb"/>
      <stop offset="100%" stop-color="#e8dcc4"/>
    </radialGradient>
    <linearGradient id="mic" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#d97706"/>
      <stop offset="55%" stop-color="#c2410c"/>
      <stop offset="100%" stop-color="#78350f"/>
    </linearGradient>
    <linearGradient id="stand" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#9a3309"/>
      <stop offset="100%" stop-color="#5c2a1a"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#fbbf24" stop-opacity="0.55"/>
      <stop offset="60%" stop-color="#d97706" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#d97706" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1600" height="900" fill="url(#bg)"/>

  <!-- warm halo behind hero -->
  <circle cx="800" cy="430" r="360" fill="url(#glow)"/>

  <!-- broadcast arcs (the "call" going out) -->
  <g fill="none" stroke="#c2410c" stroke-linecap="round" opacity="0.55">
    <path d="M 560 360 Q 520 430 560 500" stroke-width="6"/>
    <path d="M 1040 360 Q 1080 430 1040 500" stroke-width="6"/>
    <path d="M 490 310 Q 430 430 490 550" stroke-width="5" opacity="0.7"/>
    <path d="M 1110 310 Q 1170 430 1110 550" stroke-width="5" opacity="0.7"/>
    <path d="M 420 260 Q 340 430 420 600" stroke-width="4" opacity="0.45"/>
    <path d="M 1180 260 Q 1260 430 1180 600" stroke-width="4" opacity="0.45"/>
  </g>

  <!-- podium block -->
  <rect x="640" y="640" width="320" height="140" rx="6" fill="url(#stand)" opacity="0.92"/>
  <rect x="640" y="640" width="320" height="14" fill="#fbbf24" opacity="0.75"/>

  <!-- mic stand vertical -->
  <rect x="794" y="430" width="12" height="220" fill="url(#stand)"/>

  <!-- mic head: capsule -->
  <rect x="730" y="230" width="140" height="220" rx="70" fill="url(#mic)"/>
  <!-- grille hint: a few horizontal bands -->
  <g stroke="#fef3ec" stroke-width="2" opacity="0.35" fill="none">
    <line x1="745" y1="290" x2="855" y2="290"/>
    <line x1="745" y1="320" x2="855" y2="320"/>
    <line x1="745" y1="350" x2="855" y2="350"/>
    <line x1="745" y1="380" x2="855" y2="380"/>
  </g>
  <!-- mic highlight -->
  <ellipse cx="770" cy="290" rx="18" ry="55" fill="#fbbf24" opacity="0.45"/>

  <!-- mic yoke connector -->
  <rect x="780" y="445" width="40" height="22" rx="4" fill="#5c2a1a"/>

  <!-- four small markers on podium edge: countries / topics suggestion -->
  <g fill="#fbbf24" opacity="0.85">
    <circle cx="690" cy="710" r="8"/>
    <circle cx="750" cy="710" r="8"/>
    <circle cx="850" cy="710" r="8"/>
    <circle cx="910" cy="710" r="8"/>
  </g>
</svg>
