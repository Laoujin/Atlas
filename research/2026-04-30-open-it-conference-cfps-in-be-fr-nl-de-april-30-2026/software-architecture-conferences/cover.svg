<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#fef3ec"/>
      <stop offset="1" stop-color="#f0eadb"/>
    </linearGradient>
    <linearGradient id="rust" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#d97706"/>
      <stop offset="1" stop-color="#9a3309"/>
    </linearGradient>
    <linearGradient id="rustDeep" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#c2410c"/>
      <stop offset="1" stop-color="#78350f"/>
    </linearGradient>
    <linearGradient id="teal" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0e7490"/>
      <stop offset="1" stop-color="#155e75"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.45" r="0.6">
      <stop offset="0" stop-color="#fbbf24" stop-opacity="0.35"/>
      <stop offset="1" stop-color="#fbbf24" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Full-bleed background -->
  <rect width="1600" height="900" fill="url(#bg)"/>
  <rect width="1600" height="900" fill="url(#glow)"/>

  <!-- Isometric stacked architectural blocks (hero, centered ~800,450) -->
  <!-- Base block (teal foundation) -->
  <g opacity="0.92">
    <polygon points="500,620 800,760 1100,620 800,480" fill="url(#teal)"/>
    <polygon points="500,620 500,680 800,820 800,760" fill="#0e7490" opacity="0.75"/>
    <polygon points="800,760 800,820 1100,680 1100,620" fill="#155e75" opacity="0.85"/>
  </g>

  <!-- Middle block (deep rust) -->
  <g opacity="0.94">
    <polygon points="560,470 800,582 1040,470 800,358" fill="url(#rustDeep)"/>
    <polygon points="560,470 560,520 800,632 800,582" fill="#78350f" opacity="0.8"/>
    <polygon points="800,582 800,632 1040,520 1040,470" fill="#5c2a1a" opacity="0.85"/>
  </g>

  <!-- Top block (bright rust hero cap) -->
  <g opacity="0.95">
    <polygon points="640,338 800,412 960,338 800,264" fill="url(#rust)"/>
    <polygon points="640,338 640,378 800,452 800,412" fill="#9a3309" opacity="0.82"/>
    <polygon points="800,412 800,452 960,378 960,338" fill="#78350f" opacity="0.88"/>
  </g>

  <!-- Spire / pin on top (small accent) -->
  <circle cx="800" cy="244" r="10" fill="#fbbf24" opacity="0.95"/>
  <line x1="800" y1="254" x2="800" y2="278" stroke="#fbbf24" stroke-width="3" opacity="0.85"/>

  <!-- Faint connection lines suggesting layered architecture -->
  <line x1="500" y1="620" x2="640" y2="378" stroke="#9a3309" stroke-width="1.2" opacity="0.25"/>
  <line x1="1100" y1="620" x2="960" y2="378" stroke="#9a3309" stroke-width="1.2" opacity="0.25"/>

  <!-- Corner decoration (cropped variably, no meaning lost) -->
  <circle cx="120" cy="120" r="60" fill="#0e7490" opacity="0.12"/>
  <circle cx="1480" cy="780" r="80" fill="#c2410c" opacity="0.14"/>
</svg>
