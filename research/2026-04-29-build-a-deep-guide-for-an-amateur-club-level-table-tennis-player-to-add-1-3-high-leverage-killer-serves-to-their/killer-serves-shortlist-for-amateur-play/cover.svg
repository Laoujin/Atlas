<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#faf8f2"/>
      <stop offset="1" stop-color="#f0eadb"/>
    </linearGradient>
    <radialGradient id="rubber" cx="0.4" cy="0.35" r="0.7">
      <stop offset="0" stop-color="#d97706"/>
      <stop offset="0.55" stop-color="#c2410c"/>
      <stop offset="1" stop-color="#78350f"/>
    </radialGradient>
    <linearGradient id="handle" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#9a3309"/>
      <stop offset="1" stop-color="#5c2a1a"/>
    </linearGradient>
    <radialGradient id="ball" cx="0.35" cy="0.3" r="0.8">
      <stop offset="0" stop-color="#fef3ec"/>
      <stop offset="1" stop-color="#fbbf24"/>
    </radialGradient>
  </defs>

  <!-- full-bleed background -->
  <rect width="1600" height="900" fill="url(#bg)"/>

  <!-- faint table line, decorative -->
  <line x1="0" y1="720" x2="1600" y2="720" stroke="#c2410c" stroke-width="2" opacity="0.18"/>
  <line x1="0" y1="735" x2="1600" y2="735" stroke="#78350f" stroke-width="1" opacity="0.12"/>

  <!-- Spin arc 1: short pendulum backspin (low looping curve) -->
  <path d="M 380 470 Q 540 360 700 470" fill="none" stroke="#c2410c" stroke-width="6" stroke-linecap="round" opacity="0.85"/>
  <path d="M 700 470 l -14 -6 l 6 14 z" fill="#c2410c" opacity="0.9"/>
  <circle cx="380" cy="470" r="8" fill="#9a3309" opacity="0.7"/>

  <!-- Spin arc 2: long fast no-spin (flatter, longer line) -->
  <path d="M 360 540 Q 700 510 1080 560" fill="none" stroke="#d97706" stroke-width="5" stroke-linecap="round" opacity="0.8"/>
  <path d="M 1080 560 l -16 -3 l 9 13 z" fill="#d97706" opacity="0.9"/>
  <circle cx="360" cy="540" r="7" fill="#9a3309" opacity="0.6"/>

  <!-- Spin arc 3: tomahawk sidespin (curving sharply) -->
  <path d="M 400 620 Q 620 720 880 640" fill="none" stroke="#fbbf24" stroke-width="5" stroke-linecap="round" opacity="0.85"/>
  <path d="M 880 640 l -15 -2 l 7 14 z" fill="#fbbf24" opacity="0.95"/>
  <circle cx="400" cy="620" r="7" fill="#9a3309" opacity="0.6"/>

  <!-- Hero: paddle, angled, centered around (1100, 420) -->
  <g transform="translate(1100 420) rotate(-22)">
    <!-- handle -->
    <rect x="-30" y="140" width="60" height="200" rx="14" fill="url(#handle)"/>
    <rect x="-20" y="160" width="40" height="170" rx="6" fill="#1a0e0e" opacity="0.25"/>
    <!-- blade edge / wood ring -->
    <ellipse cx="0" cy="0" rx="220" ry="200" fill="#5c2a1a"/>
    <!-- rubber face -->
    <ellipse cx="0" cy="-6" rx="200" ry="182" fill="url(#rubber)"/>
    <!-- subtle face highlight -->
    <ellipse cx="-60" cy="-70" rx="90" ry="50" fill="#fbbf24" opacity="0.18"/>
  </g>

  <!-- ball mid-air, near paddle contact -->
  <circle cx="900" cy="340" r="26" fill="url(#ball)" opacity="0.95"/>
  <circle cx="892" cy="332" r="8" fill="#fef3ec" opacity="0.8"/>

  <!-- corner accent (decorative, croppable) -->
  <circle cx="120" cy="120" r="180" fill="#c2410c" opacity="0.06"/>
</svg>
