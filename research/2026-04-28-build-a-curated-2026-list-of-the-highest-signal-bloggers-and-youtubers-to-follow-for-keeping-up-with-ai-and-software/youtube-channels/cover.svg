<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#fef3ec"/>
      <stop offset="1" stop-color="#f0eadb"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.5" r="0.6">
      <stop offset="0" stop-color="#fbbf24" stop-opacity="0.35"/>
      <stop offset="1" stop-color="#fbbf24" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="play" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#d97706"/>
      <stop offset="0.55" stop-color="#c2410c"/>
      <stop offset="1" stop-color="#78350f"/>
    </linearGradient>
    <linearGradient id="plate" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.9"/>
      <stop offset="1" stop-color="#faf8f2" stop-opacity="0.7"/>
    </linearGradient>
  </defs>

  <!-- Full-bleed background -->
  <rect width="1600" height="900" fill="url(#bg)"/>
  <rect width="1600" height="900" fill="url(#glow)"/>

  <!-- Concentric orbit rings (learning / AI) -->
  <circle cx="800" cy="450" r="360" fill="none" stroke="#6d28d9" stroke-opacity="0.18" stroke-width="2"/>
  <circle cx="800" cy="450" r="290" fill="none" stroke="#6d28d9" stroke-opacity="0.25" stroke-width="2"/>
  <circle cx="800" cy="450" r="220" fill="none" stroke="#9a3309" stroke-opacity="0.35" stroke-width="2"/>

  <!-- Orbit nodes (channels) -->
  <circle cx="800" cy="90" r="9" fill="#6d28d9" opacity="0.85"/>
  <circle cx="1090" cy="170" r="7" fill="#6d28d9" opacity="0.7"/>
  <circle cx="1160" cy="450" r="10" fill="#9a3309" opacity="0.85"/>
  <circle cx="1020" cy="720" r="7" fill="#6d28d9" opacity="0.7"/>
  <circle cx="540" cy="730" r="9" fill="#9a3309" opacity="0.8"/>
  <circle cx="450" cy="450" r="7" fill="#6d28d9" opacity="0.75"/>
  <circle cx="540" cy="200" r="8" fill="#9a3309" opacity="0.8"/>

  <!-- Hero: rounded play-button card -->
  <rect x="540" y="240" width="520" height="420" rx="60" ry="60" fill="url(#plate)" stroke="#78350f" stroke-opacity="0.25" stroke-width="3"/>

  <!-- Play triangle -->
  <polygon points="730,330 730,570 940,450" fill="url(#play)" opacity="0.95"/>

  <!-- Soft inner highlight on triangle -->
  <polygon points="730,330 730,400 820,400" fill="#fbbf24" opacity="0.35"/>
</svg>
