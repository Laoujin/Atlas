<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" preserveAspectRatio="xMidYMid slice">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="65%">
      <stop offset="0%" stop-color="#5c2a1a"/>
      <stop offset="60%" stop-color="#2a140d"/>
      <stop offset="100%" stop-color="#1a0e0e"/>
    </radialGradient>
    <linearGradient id="micBody" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#fbbf24"/>
      <stop offset="40%" stop-color="#d97706"/>
      <stop offset="100%" stop-color="#9a3309"/>
    </linearGradient>
    <linearGradient id="micGrille" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#78350f"/>
      <stop offset="100%" stop-color="#3a1a08"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="45%" r="50%">
      <stop offset="0%" stop-color="#fbbf24" stop-opacity="0.35"/>
      <stop offset="50%" stop-color="#c2410c" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#1a0e0e" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="violetWave" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#6d28d9" stop-opacity="0"/>
      <stop offset="50%" stop-color="#6d28d9" stop-opacity="0.85"/>
      <stop offset="100%" stop-color="#6d28d9" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="rustWave" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#c2410c" stop-opacity="0"/>
      <stop offset="50%" stop-color="#fbbf24" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#c2410c" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Full-bleed background -->
  <rect width="1600" height="900" fill="url(#bg)"/>
  <rect width="1600" height="900" fill="url(#glow)"/>

  <!-- Concentric sound rings emanating from mic -->
  <circle cx="800" cy="450" r="180" fill="none" stroke="#c2410c" stroke-width="2" opacity="0.55"/>
  <circle cx="800" cy="450" r="260" fill="none" stroke="#9a3309" stroke-width="2" opacity="0.4"/>
  <circle cx="800" cy="450" r="340" fill="none" stroke="#6d28d9" stroke-width="1.5" opacity="0.35"/>

  <!-- Left waveform bars (rust) -->
  <g opacity="0.85">
    <rect x="180" y="430" width="6" height="40" rx="3" fill="#d97706"/>
    <rect x="210" y="410" width="6" height="80" rx="3" fill="#d97706"/>
    <rect x="240" y="390" width="6" height="120" rx="3" fill="#fbbf24"/>
    <rect x="270" y="370" width="6" height="160" rx="3" fill="#fbbf24"/>
    <rect x="300" y="395" width="6" height="110" rx="3" fill="#d97706"/>
    <rect x="330" y="415" width="6" height="70" rx="3" fill="#c2410c"/>
    <rect x="360" y="380" width="6" height="140" rx="3" fill="#fbbf24"/>
    <rect x="390" y="405" width="6" height="90" rx="3" fill="#d97706"/>
    <rect x="420" y="425" width="6" height="50" rx="3" fill="#c2410c"/>
    <rect x="450" y="400" width="6" height="100" rx="3" fill="#d97706"/>
    <rect x="480" y="385" width="6" height="130" rx="3" fill="#fbbf24"/>
    <rect x="510" y="420" width="6" height="60" rx="3" fill="#c2410c"/>
    <rect x="540" y="410" width="6" height="80" rx="3" fill="#d97706"/>
    <rect x="570" y="430" width="6" height="40" rx="3" fill="#9a3309"/>
  </g>

  <!-- Right waveform bars (rust + violet accents) -->
  <g opacity="0.85">
    <rect x="1030" y="430" width="6" height="40" rx="3" fill="#9a3309"/>
    <rect x="1060" y="415" width="6" height="70" rx="3" fill="#c2410c"/>
    <rect x="1090" y="395" width="6" height="110" rx="3" fill="#d97706"/>
    <rect x="1120" y="380" width="6" height="140" rx="3" fill="#fbbf24"/>
    <rect x="1150" y="405" width="6" height="90" rx="3" fill="#d97706"/>
    <rect x="1180" y="425" width="6" height="50" rx="3" fill="#6d28d9"/>
    <rect x="1210" y="385" width="6" height="130" rx="3" fill="#fbbf24"/>
    <rect x="1240" y="400" width="6" height="100" rx="3" fill="#d97706"/>
    <rect x="1270" y="370" width="6" height="160" rx="3" fill="#fbbf24"/>
    <rect x="1300" y="390" width="6" height="120" rx="3" fill="#d97706"/>
    <rect x="1330" y="410" width="6" height="80" rx="3" fill="#6d28d9"/>
    <rect x="1360" y="395" width="6" height="110" rx="3" fill="#d97706"/>
    <rect x="1390" y="420" width="6" height="60" rx="3" fill="#c2410c"/>
    <rect x="1420" y="430" width="6" height="40" rx="3" fill="#9a3309"/>
  </g>

  <!-- Microphone stand (mount arm) -->
  <rect x="790" y="610" width="20" height="120" rx="4" fill="#78350f"/>
  <ellipse cx="800" cy="735" rx="60" ry="10" fill="#78350f" opacity="0.85"/>

  <!-- Microphone yoke -->
  <path d="M 700 440 Q 700 600 800 600 Q 900 600 900 440" stroke="#9a3309" stroke-width="10" fill="none" stroke-linecap="round"/>

  <!-- Microphone body (capsule) -->
  <rect x="710" y="290" width="180" height="320" rx="90" fill="url(#micBody)"/>

  <!-- Grille pattern (horizontal lines) -->
  <g stroke="url(#micGrille)" stroke-width="3" opacity="0.7">
    <line x1="730" y1="330" x2="870" y2="330"/>
    <line x1="725" y1="360" x2="875" y2="360"/>
    <line x1="722" y1="390" x2="878" y2="390"/>
    <line x1="720" y1="420" x2="880" y2="420"/>
    <line x1="720" y1="450" x2="880" y2="450"/>
    <line x1="720" y1="480" x2="880" y2="480"/>
    <line x1="722" y1="510" x2="878" y2="510"/>
    <line x1="725" y1="540" x2="875" y2="540"/>
    <line x1="730" y1="570" x2="870" y2="570"/>
  </g>

  <!-- Vertical grille divider -->
  <line x1="800" y1="295" x2="800" y2="605" stroke="#3a1a08" stroke-width="2" opacity="0.6"/>

  <!-- Highlight on mic capsule -->
  <ellipse cx="755" cy="370" rx="20" ry="80" fill="#fef3ec" opacity="0.18"/>

  <!-- Sound wave arcs left (rust) -->
  <path d="M 620 380 Q 580 450 620 520" stroke="#d97706" stroke-width="4" fill="none" opacity="0.7" stroke-linecap="round"/>
  <path d="M 580 350 Q 520 450 580 550" stroke="#c2410c" stroke-width="4" fill="none" opacity="0.55" stroke-linecap="round"/>
  <path d="M 540 320 Q 460 450 540 580" stroke="#9a3309" stroke-width="3.5" fill="none" opacity="0.45" stroke-linecap="round"/>

  <!-- Sound wave arcs right (rust + violet) -->
  <path d="M 980 380 Q 1020 450 980 520" stroke="#d97706" stroke-width="4" fill="none" opacity="0.7" stroke-linecap="round"/>
  <path d="M 1020 350 Q 1080 450 1020 550" stroke="#c2410c" stroke-width="4" fill="none" opacity="0.55" stroke-linecap="round"/>
  <path d="M 1060 320 Q 1140 450 1060 580" stroke="#6d28d9" stroke-width="3.5" fill="none" opacity="0.5" stroke-linecap="round"/>
</svg>
