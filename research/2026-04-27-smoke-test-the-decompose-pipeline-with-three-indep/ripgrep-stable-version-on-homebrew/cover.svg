<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#faf8f2"/>
      <stop offset="1" stop-color="#f0eadb"/>
    </linearGradient>
    <linearGradient id="window" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#fef3ec"/>
      <stop offset="1" stop-color="#f0eadb"/>
    </linearGradient>
    <linearGradient id="rust" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#d97706"/>
      <stop offset="1" stop-color="#9a3309"/>
    </linearGradient>
    <radialGradient id="lens" cx="0.4" cy="0.35" r="0.7">
      <stop offset="0" stop-color="#fbbf24" stop-opacity="0.55"/>
      <stop offset="0.6" stop-color="#d97706" stop-opacity="0.25"/>
      <stop offset="1" stop-color="#78350f" stop-opacity="0.15"/>
    </radialGradient>
  </defs>

  <rect width="1600" height="900" fill="url(#bg)"/>

  <!-- back page -->
  <rect x="430" y="200" width="780" height="540" rx="14" fill="#f0eadb" stroke="#c2410c" stroke-opacity="0.25" stroke-width="2" transform="rotate(-4 820 470)" opacity="0.85"/>

  <!-- mid page -->
  <rect x="410" y="190" width="780" height="540" rx="14" fill="#fef3ec" stroke="#9a3309" stroke-opacity="0.3" stroke-width="2" transform="rotate(2 800 460)" opacity="0.92"/>

  <!-- terminal window (hero front) -->
  <g>
    <rect x="400" y="200" width="800" height="500" rx="16" fill="url(#window)" stroke="#78350f" stroke-width="3"/>
    <rect x="400" y="200" width="800" height="44" rx="16" fill="#c2410c" opacity="0.9"/>
    <rect x="400" y="232" width="800" height="12" fill="#c2410c" opacity="0.9"/>
    <circle cx="430" cy="222" r="8" fill="#fbbf24"/>
    <circle cx="458" cy="222" r="8" fill="#fef3ec" opacity="0.6"/>
    <circle cx="486" cy="222" r="8" fill="#fef3ec" opacity="0.6"/>

    <!-- decorative output bars (no letters) -->
    <rect x="440" y="290" width="180" height="10" rx="3" fill="#9a3309" opacity="0.55"/>
    <rect x="440" y="320" width="320" height="8" rx="3" fill="#78350f" opacity="0.35"/>
    <rect x="440" y="346" width="240" height="8" rx="3" fill="#78350f" opacity="0.35"/>
    <rect x="440" y="372" width="380" height="8" rx="3" fill="#78350f" opacity="0.35"/>
    <rect x="440" y="402" width="160" height="10" rx="3" fill="#9a3309" opacity="0.55"/>
    <rect x="440" y="432" width="280" height="8" rx="3" fill="#78350f" opacity="0.35"/>
    <rect x="440" y="458" width="210" height="8" rx="3" fill="#78350f" opacity="0.35"/>
    <rect x="440" y="488" width="340" height="8" rx="3" fill="#78350f" opacity="0.35"/>
  </g>

  <!-- magnifying lens hero -->
  <g transform="translate(980 540)">
    <line x1="40" y1="40" x2="180" y2="180" stroke="#78350f" stroke-width="28" stroke-linecap="round"/>
    <line x1="40" y1="40" x2="180" y2="180" stroke="#c2410c" stroke-width="18" stroke-linecap="round"/>
    <circle cx="-30" cy="-30" r="120" fill="url(#lens)" stroke="url(#rust)" stroke-width="14"/>
    <circle cx="-30" cy="-30" r="120" fill="none" stroke="#78350f" stroke-width="3" opacity="0.5"/>
    <ellipse cx="-70" cy="-70" rx="36" ry="22" fill="#fef3ec" opacity="0.55"/>
  </g>
</svg>
