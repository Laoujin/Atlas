<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#faf8f2"/>
      <stop offset="1" stop-color="#f0eadb"/>
    </linearGradient>
    <linearGradient id="shield" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#d97706"/>
      <stop offset="0.55" stop-color="#c2410c"/>
      <stop offset="1" stop-color="#78350f"/>
    </linearGradient>
    <linearGradient id="shackle" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#9a3309"/>
      <stop offset="1" stop-color="#c2410c"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.5" r="0.6">
      <stop offset="0" stop-color="#fbbf24" stop-opacity="0.35"/>
      <stop offset="1" stop-color="#fbbf24" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- full-bleed background -->
  <rect width="1600" height="900" fill="url(#bg)"/>

  <!-- warm radial glow behind hero -->
  <circle cx="800" cy="450" r="420" fill="url(#glow)"/>

  <!-- teal challenge-response arcs (ACME handshake) behind shield -->
  <g fill="none" stroke="#0e7490" stroke-linecap="round" opacity="0.7">
    <path d="M 470 450 A 330 330 0 0 1 800 120" stroke-width="14"/>
    <path d="M 1130 450 A 330 330 0 0 1 800 780" stroke-width="14"/>
    <circle cx="470" cy="450" r="18" fill="#0e7490" stroke="none" opacity="0.85"/>
    <circle cx="1130" cy="450" r="18" fill="#0e7490" stroke="none" opacity="0.85"/>
  </g>

  <!-- shackle of padlock -->
  <path d="M 720 360 L 720 280 A 80 80 0 0 1 880 280 L 880 360"
        fill="none" stroke="url(#shackle)" stroke-width="46" stroke-linecap="round" opacity="0.95"/>

  <!-- lock body / shield hybrid (hero) -->
  <path d="M 640 360 L 960 360 Q 980 360 980 380 L 980 600 Q 980 720 800 760 Q 620 720 620 600 L 620 380 Q 620 360 640 360 Z"
        fill="url(#shield)" opacity="0.95"/>

  <!-- inner keyhole accent -->
  <circle cx="800" cy="500" r="34" fill="#1a0e0e" opacity="0.55"/>
  <rect x="788" y="500" width="24" height="80" rx="6" fill="#1a0e0e" opacity="0.55"/>

  <!-- subtle stacked-server hint at base -->
  <g opacity="0.6">
    <rect x="700" y="640" width="200" height="6" rx="2" fill="#fbbf24"/>
    <rect x="710" y="660" width="180" height="6" rx="2" fill="#fbbf24" opacity="0.7"/>
    <rect x="720" y="680" width="160" height="6" rx="2" fill="#fbbf24" opacity="0.5"/>
  </g>

  <!-- corner decoration (croppable) -->
  <circle cx="120" cy="120" r="8" fill="#0e7490" opacity="0.5"/>
  <circle cx="1480" cy="780" r="8" fill="#c2410c" opacity="0.5"/>
</svg>
