<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#faf8f2"/>
      <stop offset="1" stop-color="#f0eadb"/>
    </linearGradient>
    <linearGradient id="rust" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#d97706"/>
      <stop offset="1" stop-color="#9a3309"/>
    </linearGradient>
    <linearGradient id="rust2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#fbbf24"/>
      <stop offset="1" stop-color="#c2410c"/>
    </linearGradient>
    <linearGradient id="teal" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0e7490"/>
      <stop offset="1" stop-color="#155e75"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.5" r="0.6">
      <stop offset="0" stop-color="#fbbf24" stop-opacity="0.35"/>
      <stop offset="1" stop-color="#fbbf24" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Full-bleed background -->
  <rect width="1600" height="900" fill="url(#bg)"/>
  <ellipse cx="900" cy="500" rx="700" ry="420" fill="url(#glow)"/>

  <!-- Speed lines (decoration, edges) -->
  <g opacity="0.18" stroke="#9a3309" stroke-width="3" stroke-linecap="round">
    <line x1="60" y1="220" x2="280" y2="220"/>
    <line x1="40" y1="320" x2="320" y2="320"/>
    <line x1="80" y1="420" x2="240" y2="420"/>
    <line x1="40" y1="520" x2="300" y2="520"/>
    <line x1="60" y1="620" x2="260" y2="620"/>
    <line x1="1320" y1="260" x2="1540" y2="260"/>
    <line x1="1300" y1="640" x2="1560" y2="640"/>
  </g>

  <!-- Back module (teal accent) -->
  <g transform="translate(560 260) rotate(-6)" opacity="0.85">
    <rect x="0" y="0" width="540" height="360" rx="18" fill="url(#teal)"/>
    <rect x="40" y="60" width="280" height="10" rx="5" fill="#faf8f2" opacity="0.35"/>
    <rect x="40" y="92" width="380" height="10" rx="5" fill="#faf8f2" opacity="0.25"/>
    <rect x="40" y="124" width="220" height="10" rx="5" fill="#faf8f2" opacity="0.3"/>
    <rect x="40" y="156" width="320" height="10" rx="5" fill="#faf8f2" opacity="0.22"/>
  </g>

  <!-- Middle module -->
  <g transform="translate(500 320) rotate(-2)" opacity="0.92">
    <rect x="0" y="0" width="600" height="400" rx="20" fill="#78350f"/>
    <rect x="50" y="70" width="320" height="12" rx="6" fill="#fbbf24" opacity="0.55"/>
    <rect x="50" y="106" width="440" height="12" rx="6" fill="#faf8f2" opacity="0.25"/>
    <rect x="50" y="142" width="260" height="12" rx="6" fill="#faf8f2" opacity="0.2"/>
    <rect x="50" y="178" width="380" height="12" rx="6" fill="#faf8f2" opacity="0.22"/>
  </g>

  <!-- Hero: front module with the "1.0" mark as a pure circle (no text) -->
  <g transform="translate(440 280) rotate(3)">
    <rect x="0" y="0" width="720" height="460" rx="24" fill="url(#rust)"/>
    <rect x="60" y="80" width="380" height="14" rx="7" fill="#fef3ec" opacity="0.7"/>
    <rect x="60" y="120" width="540" height="14" rx="7" fill="#fef3ec" opacity="0.45"/>
    <rect x="60" y="160" width="300" height="14" rx="7" fill="#fef3ec" opacity="0.5"/>
    <rect x="60" y="200" width="460" height="14" rx="7" fill="#fef3ec" opacity="0.4"/>
    <rect x="60" y="240" width="220" height="14" rx="7" fill="#fef3ec" opacity="0.5"/>

    <!-- Hero accent: bun-like stacked discs (top "bun") -->
    <ellipse cx="560" cy="340" rx="100" ry="32" fill="url(#rust2)"/>
    <ellipse cx="560" cy="350" rx="100" ry="32" fill="#5c2a1a" opacity="0.35"/>
    <ellipse cx="560" cy="334" rx="100" ry="30" fill="url(#rust2)"/>
    <circle cx="540" cy="328" r="4" fill="#fef3ec" opacity="0.85"/>
    <circle cx="572" cy="324" r="3" fill="#fef3ec" opacity="0.7"/>
    <circle cx="556" cy="338" r="3" fill="#fef3ec" opacity="0.6"/>
  </g>
</svg>
