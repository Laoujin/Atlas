<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#1a0e0e"/>
      <stop offset="1" stop-color="#5c2a1a"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.62" r="0.55">
      <stop offset="0" stop-color="#fbbf24" stop-opacity="0.85"/>
      <stop offset="0.45" stop-color="#d97706" stop-opacity="0.45"/>
      <stop offset="1" stop-color="#9a3309" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="wall" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#78350f"/>
      <stop offset="1" stop-color="#3a1a0a"/>
    </linearGradient>
    <linearGradient id="beam" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#9a3309"/>
      <stop offset="1" stop-color="#4a1c08"/>
    </linearGradient>
    <linearGradient id="window" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#fef3ec" stop-opacity="0.95"/>
      <stop offset="1" stop-color="#fbbf24" stop-opacity="0.7"/>
    </linearGradient>
  </defs>

  <!-- full-bleed background -->
  <rect width="1600" height="900" fill="url(#bg)"/>
  <ellipse cx="800" cy="560" rx="900" ry="520" fill="url(#glow)"/>

  <!-- Hero: gabled hall silhouette, centered ~ (800, 450), within safe zone -->
  <!-- back wall of hall -->
  <polygon points="380,800 380,420 800,160 1220,420 1220,800" fill="url(#wall)" opacity="0.92"/>

  <!-- gable roof outline (rust ridge) -->
  <polygon points="380,420 800,160 1220,420 1200,438 800,194 400,438" fill="#c2410c" opacity="0.9"/>

  <!-- arched window with warm interior glow -->
  <path d="M 680 800 L 680 540 Q 680 420 800 420 Q 920 420 920 540 L 920 800 Z" fill="url(#window)" opacity="0.92"/>
  <!-- mullion cross -->
  <line x1="800" y1="420" x2="800" y2="800" stroke="#3a1a0a" stroke-width="6" opacity="0.85"/>
  <line x1="680" y1="600" x2="920" y2="600" stroke="#3a1a0a" stroke-width="5" opacity="0.85"/>
  <line x1="680" y1="710" x2="920" y2="710" stroke="#3a1a0a" stroke-width="5" opacity="0.85"/>

  <!-- exposed wooden beams (horizontal trusses) -->
  <rect x="380" y="470" width="840" height="22" fill="url(#beam)" opacity="0.88"/>
  <rect x="380" y="560" width="840" height="22" fill="url(#beam)" opacity="0.85"/>
  <rect x="380" y="660" width="840" height="22" fill="url(#beam)" opacity="0.82"/>

  <!-- hanging hams (small dark teardrops from top beam) -->
  <ellipse cx="500" cy="510" rx="14" ry="26" fill="#3a1a0a" opacity="0.85"/>
  <line x1="500" y1="492" x2="500" y2="481" stroke="#3a1a0a" stroke-width="2"/>
  <ellipse cx="580" cy="515" rx="13" ry="24" fill="#3a1a0a" opacity="0.85"/>
  <line x1="580" y1="497" x2="580" y2="481" stroke="#3a1a0a" stroke-width="2"/>
  <ellipse cx="1020" cy="513" rx="13" ry="25" fill="#3a1a0a" opacity="0.85"/>
  <line x1="1020" y1="495" x2="1020" y2="481" stroke="#3a1a0a" stroke-width="2"/>
  <ellipse cx="1100" cy="510" rx="14" ry="26" fill="#3a1a0a" opacity="0.85"/>
  <line x1="1100" y1="492" x2="1100" y2="481" stroke="#3a1a0a" stroke-width="2"/>

  <!-- diagonal roof beams (king post truss hint) -->
  <line x1="400" y1="438" x2="800" y2="220" stroke="#4a1c08" stroke-width="8" opacity="0.7"/>
  <line x1="1200" y1="438" x2="800" y2="220" stroke="#4a1c08" stroke-width="8" opacity="0.7"/>
  <line x1="800" y1="220" x2="800" y2="420" stroke="#4a1c08" stroke-width="6" opacity="0.6"/>

  <!-- foreground floor edge / cobbled hint -->
  <rect x="0" y="800" width="1600" height="100" fill="#2a1408" opacity="0.9"/>
  <ellipse cx="200" cy="850" rx="40" ry="8" fill="#5c2a1a" opacity="0.5"/>
  <ellipse cx="320" cy="855" rx="35" ry="7" fill="#5c2a1a" opacity="0.45"/>
  <ellipse cx="1300" cy="852" rx="42" ry="8" fill="#5c2a1a" opacity="0.5"/>
  <ellipse cx="1420" cy="858" rx="38" ry="7" fill="#5c2a1a" opacity="0.45"/>
</svg>
