<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" preserveAspectRatio="xMidYMid slice">
  <defs>
    <radialGradient id="bg" cx="50%" cy="55%" r="70%">
      <stop offset="0%" stop-color="#5c2a1a"/>
      <stop offset="60%" stop-color="#2a1410"/>
      <stop offset="100%" stop-color="#1a0e0e"/>
    </radialGradient>
    <linearGradient id="liquid" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#fbbf24" stop-opacity="0.95"/>
      <stop offset="55%" stop-color="#d97706" stop-opacity="0.92"/>
      <stop offset="100%" stop-color="#9a3309" stop-opacity="0.95"/>
    </linearGradient>
    <linearGradient id="glassEdge" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#fef3ec" stop-opacity="0.85"/>
      <stop offset="100%" stop-color="#fbbf24" stop-opacity="0.35"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#fbbf24" stop-opacity="0.45"/>
      <stop offset="60%" stop-color="#d97706" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#9a3309" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="bar" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#78350f" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#1a0e0e" stop-opacity="0.9"/>
    </linearGradient>
  </defs>

  <!-- Full-bleed background -->
  <rect width="1600" height="900" fill="url(#bg)"/>

  <!-- Ambient warm glow behind hero -->
  <circle cx="800" cy="450" r="520" fill="url(#glow)"/>

  <!-- Distant bar silhouette / counter line -->
  <rect x="0" y="720" width="1600" height="180" fill="url(#bar)" opacity="0.85"/>

  <!-- Bottle silhouettes on the bar (decorative, partially cropped on detail view) -->
  <g opacity="0.55">
    <rect x="160" y="610" width="34" height="120" rx="4" fill="#78350f"/>
    <rect x="166" y="600" width="22" height="14" rx="2" fill="#5c2a1a"/>
    <rect x="220" y="630" width="28" height="100" rx="3" fill="#9a3309"/>
    <rect x="224" y="620" width="20" height="12" rx="2" fill="#5c2a1a"/>
    <rect x="1380" y="600" width="38" height="130" rx="4" fill="#78350f"/>
    <rect x="1386" y="588" width="26" height="16" rx="2" fill="#5c2a1a"/>
    <rect x="1440" y="625" width="30" height="105" rx="3" fill="#9a3309"/>
  </g>

  <!-- Hero: coupe glass centered ~(800, 450) -->
  <g>
    <!-- Stem -->
    <rect x="794" y="560" width="12" height="140" fill="url(#glassEdge)" opacity="0.75"/>
    <!-- Foot -->
    <ellipse cx="800" cy="708" rx="90" ry="10" fill="#fef3ec" opacity="0.55"/>
    <ellipse cx="800" cy="704" rx="78" ry="6" fill="#fbbf24" opacity="0.35"/>

    <!-- Bowl (coupe) outline -->
    <path d="M 600 320 Q 800 640 1000 320 Z" fill="#fef3ec" opacity="0.10"/>
    <!-- Liquid inside coupe -->
    <path d="M 628 340 Q 800 600 972 340 Z" fill="url(#liquid)"/>
    <!-- Liquid surface ellipse -->
    <ellipse cx="800" cy="340" rx="172" ry="22" fill="#fbbf24" opacity="0.85"/>
    <ellipse cx="800" cy="338" rx="172" ry="20" fill="none" stroke="#fef3ec" stroke-width="2" opacity="0.7"/>

    <!-- Glass rim highlight -->
    <path d="M 600 320 Q 800 348 1000 320" fill="none" stroke="#fef3ec" stroke-width="3" opacity="0.85"/>
    <!-- Subtle bowl side highlight -->
    <path d="M 612 326 Q 700 470 798 596" fill="none" stroke="#fef3ec" stroke-width="2" opacity="0.35"/>

    <!-- Garnish: orange peel twist -->
    <path d="M 760 312 Q 740 270 770 250 Q 810 240 830 270 Q 845 300 815 320" fill="none" stroke="#d97706" stroke-width="10" stroke-linecap="round" opacity="0.92"/>
    <path d="M 760 312 Q 740 270 770 250 Q 810 240 830 270 Q 845 300 815 320" fill="none" stroke="#fbbf24" stroke-width="3" stroke-linecap="round" opacity="0.7"/>

    <!-- Cherry / olive on pick -->
    <line x1="860" y1="240" x2="880" y2="345" stroke="#fef3ec" stroke-width="2" opacity="0.6"/>
    <circle cx="876" cy="332" r="12" fill="#9a3309" opacity="0.95"/>
    <circle cx="872" cy="328" r="3" fill="#fbbf24" opacity="0.7"/>
  </g>

  <!-- Faint canal-light reflections on the bar (decorative) -->
  <g opacity="0.4">
    <ellipse cx="500" cy="745" rx="60" ry="3" fill="#fbbf24"/>
    <ellipse cx="1100" cy="755" rx="80" ry="3" fill="#d97706"/>
    <ellipse cx="1250" cy="745" rx="40" ry="2" fill="#fbbf24"/>
  </g>
</svg>
