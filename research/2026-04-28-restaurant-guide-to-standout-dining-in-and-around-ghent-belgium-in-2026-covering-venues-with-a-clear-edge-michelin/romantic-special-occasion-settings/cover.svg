<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" preserveAspectRatio="xMidYMid slice">
  <defs>
    <radialGradient id="night" cx="50%" cy="55%" r="75%">
      <stop offset="0%" stop-color="#5c2a1a"/>
      <stop offset="55%" stop-color="#2a1410"/>
      <stop offset="100%" stop-color="#1a0e0e"/>
    </radialGradient>
    <radialGradient id="candle" cx="50%" cy="45%" r="55%">
      <stop offset="0%" stop-color="#fbbf24" stop-opacity="0.95"/>
      <stop offset="40%" stop-color="#d97706" stop-opacity="0.7"/>
      <stop offset="80%" stop-color="#c2410c" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#c2410c" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="window" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#fbbf24" stop-opacity="0.95"/>
      <stop offset="60%" stop-color="#d97706" stop-opacity="0.85"/>
      <stop offset="100%" stop-color="#9a3309" stop-opacity="0.7"/>
    </linearGradient>
    <linearGradient id="canal" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#78350f" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#1a0e0e" stop-opacity="0.95"/>
    </linearGradient>
    <radialGradient id="reflection" cx="50%" cy="0%" r="60%">
      <stop offset="0%" stop-color="#d97706" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#d97706" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Full-bleed nocturnal background -->
  <rect width="1600" height="900" fill="url(#night)"/>

  <!-- Candle glow halo behind hero -->
  <ellipse cx="800" cy="430" rx="620" ry="380" fill="url(#candle)"/>

  <!-- Distant Graslei stepped-gable silhouette (edge decoration, full bleed) -->
  <g fill="#2a1410" opacity="0.85">
    <path d="M0,640 L0,560 L70,560 L70,540 L120,540 L120,520 L170,520 L170,540 L220,540 L220,500 L270,500 L270,540 L320,540 L320,560 L380,560 L380,520 L430,520 L430,560 L490,560 L490,640 Z"/>
    <path d="M1110,640 L1110,560 L1170,560 L1170,520 L1220,520 L1220,560 L1280,560 L1280,540 L1330,540 L1330,500 L1380,500 L1380,540 L1430,540 L1430,520 L1480,520 L1480,540 L1530,540 L1530,560 L1600,560 L1600,640 Z"/>
  </g>

  <!-- Hero: arched townhouse window with warm interior light -->
  <g>
    <!-- Window frame / facade panel -->
    <path d="M650,260 Q650,200 800,200 Q950,200 950,260 L950,640 L650,640 Z"
          fill="#1a0e0e" stroke="#5c2a1a" stroke-width="3" opacity="0.95"/>
    <!-- Inner glow -->
    <path d="M675,275 Q675,225 800,225 Q925,225 925,275 L925,615 L675,615 Z"
          fill="url(#window)" opacity="0.92"/>
    <!-- Window mullions -->
    <line x1="800" y1="225" x2="800" y2="615" stroke="#1a0e0e" stroke-width="6" opacity="0.7"/>
    <line x1="675" y1="420" x2="925" y2="420" stroke="#1a0e0e" stroke-width="6" opacity="0.7"/>
    <!-- Candle silhouette inside the window -->
    <rect x="788" y="500" width="24" height="80" fill="#1a0e0e" opacity="0.6"/>
    <ellipse cx="800" cy="490" rx="8" ry="18" fill="#fbbf24" opacity="0.95"/>
    <ellipse cx="800" cy="488" rx="3" ry="9" fill="#fef3ec"/>
  </g>

  <!-- Foreground table: round plate / glass rim catching window light -->
  <ellipse cx="800" cy="760" rx="320" ry="38" fill="#9a3309" opacity="0.55"/>
  <ellipse cx="800" cy="755" rx="240" ry="22" fill="#c2410c" opacity="0.7"/>

  <!-- Wine glass silhouette accent (rose secondary, restrained) -->
  <g opacity="0.88">
    <path d="M1080,560 Q1080,620 1110,640 L1110,720 L1080,725 L1140,725 L1110,720 L1110,640 Q1140,620 1140,560 Z"
          fill="#1a0e0e" stroke="#be185d" stroke-width="2.5" opacity="0.9"/>
    <path d="M1086,565 Q1088,610 1110,628 Q1132,610 1134,565 Z" fill="#be185d" opacity="0.55"/>
  </g>

  <!-- Canal-water reflection at the very bottom (full bleed) -->
  <rect x="0" y="780" width="1600" height="120" fill="url(#canal)"/>
  <ellipse cx="800" cy="790" rx="280" ry="20" fill="url(#reflection)"/>
</svg>
