<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" preserveAspectRatio="xMidYMid slice">
  <defs>
    <radialGradient id="bg" cx="50%" cy="55%" r="65%">
      <stop offset="0%" stop-color="#5c2a1a"/>
      <stop offset="60%" stop-color="#2a130d"/>
      <stop offset="100%" stop-color="#1a0e0e"/>
    </radialGradient>
    <radialGradient id="plateA" cx="40%" cy="38%" r="70%">
      <stop offset="0%" stop-color="#fbbf24" stop-opacity="0.95"/>
      <stop offset="55%" stop-color="#d97706" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#9a3309" stop-opacity="0.85"/>
    </radialGradient>
    <radialGradient id="plateB" cx="55%" cy="45%" r="65%">
      <stop offset="0%" stop-color="#be185d" stop-opacity="0.85"/>
      <stop offset="70%" stop-color="#78350f" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#3a1810" stop-opacity="0.75"/>
    </radialGradient>
    <linearGradient id="glass" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#fbbf24" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#c2410c" stop-opacity="0.25"/>
    </linearGradient>
  </defs>

  <!-- Full-bleed warm nocturnal background -->
  <rect width="1600" height="900" fill="url(#bg)"/>

  <!-- Soft outer glow halo behind plates -->
  <ellipse cx="800" cy="450" rx="520" ry="320" fill="#d97706" opacity="0.08"/>

  <!-- Back plate (rose-tinted, the "aggregated reviews" layer) -->
  <circle cx="930" cy="470" r="240" fill="url(#plateB)" opacity="0.85"/>
  <circle cx="930" cy="470" r="240" fill="none" stroke="#be185d" stroke-width="2" opacity="0.5"/>
  <circle cx="930" cy="470" r="180" fill="none" stroke="#fbbf24" stroke-width="1" opacity="0.35"/>

  <!-- Front hero plate (rust, the standout) -->
  <circle cx="720" cy="430" r="260" fill="url(#plateA)" opacity="0.92"/>
  <circle cx="720" cy="430" r="260" fill="none" stroke="#78350f" stroke-width="2" opacity="0.7"/>
  <circle cx="720" cy="430" r="200" fill="none" stroke="#fef3ec" stroke-width="1.2" opacity="0.4"/>

  <!-- Inner highlight on hero plate -->
  <ellipse cx="650" cy="360" rx="90" ry="40" fill="#fef3ec" opacity="0.18"/>

  <!-- Wine glass silhouette accent (right side, inside safe zone) -->
  <g opacity="0.85">
    <path d="M 1240 230 Q 1240 340 1290 360 Q 1340 340 1340 230 Z" fill="url(#glass)"/>
    <path d="M 1240 230 Q 1240 340 1290 360 Q 1340 340 1340 230 Z" fill="none" stroke="#fbbf24" stroke-width="1.5" opacity="0.7"/>
    <line x1="1290" y1="360" x2="1290" y2="540" stroke="#fbbf24" stroke-width="2" opacity="0.6"/>
    <ellipse cx="1290" cy="552" rx="45" ry="6" fill="#fbbf24" opacity="0.55"/>
    <!-- Wine fill -->
    <path d="M 1248 270 Q 1252 335 1290 352 Q 1328 335 1332 270 Z" fill="#be185d" opacity="0.55"/>
  </g>

  <!-- Small star/spark accent above hero (a "rating" hint, decorative) -->
  <circle cx="500" cy="220" r="4" fill="#fbbf24" opacity="0.85"/>
  <circle cx="560" cy="180" r="2.5" fill="#fbbf24" opacity="0.6"/>
  <circle cx="450" cy="270" r="2" fill="#fef3ec" opacity="0.5"/>
</svg>
