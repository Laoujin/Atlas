<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#fef3ec"/>
      <stop offset="1" stop-color="#f0eadb"/>
    </linearGradient>
    <linearGradient id="bubble" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0e7490"/>
      <stop offset="1" stop-color="#0b5566"/>
    </linearGradient>
    <linearGradient id="term" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#9a3309"/>
      <stop offset="1" stop-color="#78350f"/>
    </linearGradient>
    <linearGradient id="termTop" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#c2410c"/>
      <stop offset="1" stop-color="#9a3309"/>
    </linearGradient>
    <radialGradient id="spark" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#fbbf24" stop-opacity="0.95"/>
      <stop offset="0.6" stop-color="#d97706" stop-opacity="0.5"/>
      <stop offset="1" stop-color="#d97706" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- full-bleed background -->
  <rect width="1600" height="900" fill="url(#bg)"/>

  <!-- subtle corner accents (decorative, croppable) -->
  <circle cx="120" cy="120" r="180" fill="#d97706" opacity="0.06"/>
  <circle cx="1500" cy="820" r="220" fill="#0e7490" opacity="0.05"/>

  <!-- chat bubble (left, teal) -->
  <g opacity="0.92">
    <rect x="280" y="270" width="460" height="300" rx="40" fill="url(#bubble)"/>
    <polygon points="360,560 360,640 440,570" fill="#0e7490"/>
    <!-- decorative message lines -->
    <rect x="330" y="335" width="320" height="22" rx="11" fill="#faf8f2" opacity="0.55"/>
    <rect x="330" y="385" width="240" height="22" rx="11" fill="#faf8f2" opacity="0.45"/>
    <rect x="330" y="435" width="290" height="22" rx="11" fill="#faf8f2" opacity="0.4"/>
    <rect x="330" y="485" width="180" height="22" rx="11" fill="#faf8f2" opacity="0.35"/>
  </g>

  <!-- spark / connection between bubble and terminal -->
  <g opacity="0.9">
    <ellipse cx="800" cy="450" rx="120" ry="60" fill="url(#spark)"/>
    <path d="M 760 430 L 815 450 L 785 460 L 835 480" stroke="#fbbf24" stroke-width="6" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
    <circle cx="800" cy="450" r="14" fill="#fbbf24"/>
  </g>

  <!-- terminal / code window (right, rust hero) -->
  <g opacity="0.95">
    <rect x="860" y="240" width="500" height="380" rx="24" fill="url(#term)"/>
    <rect x="860" y="240" width="500" height="60" rx="24" fill="url(#termTop)"/>
    <rect x="860" y="280" width="500" height="20" fill="#c2410c"/>
    <!-- traffic dots -->
    <circle cx="900" cy="270" r="10" fill="#fbbf24" opacity="0.9"/>
    <circle cx="935" cy="270" r="10" fill="#faf8f2" opacity="0.55"/>
    <circle cx="970" cy="270" r="10" fill="#faf8f2" opacity="0.4"/>
    <!-- prompt caret -->
    <polygon points="895,355 925,375 895,395" fill="#fbbf24" opacity="0.9"/>
    <!-- code lines -->
    <rect x="945" y="365" width="280" height="18" rx="9" fill="#faf8f2" opacity="0.55"/>
    <rect x="895" y="415" width="380" height="18" rx="9" fill="#faf8f2" opacity="0.4"/>
    <rect x="895" y="455" width="260" height="18" rx="9" fill="#faf8f2" opacity="0.4"/>
    <rect x="945" y="495" width="320" height="18" rx="9" fill="#faf8f2" opacity="0.35"/>
    <rect x="945" y="535" width="200" height="18" rx="9" fill="#faf8f2" opacity="0.3"/>
    <!-- blinking cursor block -->
    <rect x="1175" y="535" width="22" height="22" fill="#fbbf24" opacity="0.85"/>
  </g>
</svg>
