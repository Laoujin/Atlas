<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#faf8f2"/>
      <stop offset="1" stop-color="#f0eadb"/>
    </linearGradient>
    <radialGradient id="trigger" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#fbbf24"/>
      <stop offset="0.6" stop-color="#d97706"/>
      <stop offset="1" stop-color="#9a3309"/>
    </radialGradient>
    <linearGradient id="branch" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#c2410c"/>
      <stop offset="1" stop-color="#78350f"/>
    </linearGradient>
    <radialGradient id="pr" cx="0.5" cy="0.5" r="0.6">
      <stop offset="0" stop-color="#d97706"/>
      <stop offset="0.7" stop-color="#c2410c"/>
      <stop offset="1" stop-color="#78350f"/>
    </radialGradient>
    <linearGradient id="teal" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0e7490" stop-opacity="0.85"/>
      <stop offset="1" stop-color="#0e7490" stop-opacity="0.55"/>
    </linearGradient>
  </defs>

  <!-- Full-bleed background -->
  <rect width="1600" height="900" fill="url(#bg)"/>

  <!-- Faint grid lines suggesting infrastructure (decoration, edges) -->
  <g stroke="#c2410c" stroke-opacity="0.07" stroke-width="1">
    <line x1="0" y1="225" x2="1600" y2="225"/>
    <line x1="0" y1="675" x2="1600" y2="675"/>
  </g>

  <!-- Remote trigger: pulsing concentric source on left -->
  <g transform="translate(280,450)">
    <circle r="110" fill="url(#teal)" opacity="0.18"/>
    <circle r="78" fill="url(#teal)" opacity="0.32"/>
    <circle r="50" fill="url(#trigger)" opacity="0.95"/>
    <circle r="22" fill="#faf8f2" opacity="0.85"/>
  </g>

  <!-- Trigger arrow: straight trunk from source toward branch fork -->
  <path d="M 350 450 L 640 450" stroke="url(#branch)" stroke-width="14" fill="none" stroke-linecap="round" opacity="0.9"/>

  <!-- Branching workflow: fork node -->
  <circle cx="660" cy="450" r="18" fill="#9a3309" opacity="0.95"/>

  <!-- Two branch paths curving up and down then converging -->
  <path d="M 670 445 C 780 445, 850 320, 980 320 L 1110 320"
        stroke="url(#branch)" stroke-width="11" fill="none" stroke-linecap="round" opacity="0.88"/>
  <path d="M 670 455 C 780 455, 850 580, 980 580 L 1110 580"
        stroke="url(#branch)" stroke-width="11" fill="none" stroke-linecap="round" opacity="0.88"/>

  <!-- Convergence into PR -->
  <path d="M 1110 320 C 1180 320, 1220 380, 1240 440"
        stroke="#78350f" stroke-width="10" fill="none" stroke-linecap="round" opacity="0.85"/>
  <path d="M 1110 580 C 1180 580, 1220 520, 1240 460"
        stroke="#78350f" stroke-width="10" fill="none" stroke-linecap="round" opacity="0.85"/>

  <!-- Branch commit dots -->
  <circle cx="850" cy="320" r="14" fill="#c2410c" opacity="0.9"/>
  <circle cx="980" cy="320" r="14" fill="#c2410c" opacity="0.9"/>
  <circle cx="850" cy="580" r="14" fill="#d97706" opacity="0.9"/>
  <circle cx="980" cy="580" r="14" fill="#d97706" opacity="0.9"/>

  <!-- PR diamond: hero merge target -->
  <g transform="translate(1280,450)">
    <polygon points="0,-95 95,0 0,95 -95,0" fill="url(#pr)" opacity="0.95"/>
    <polygon points="0,-60 60,0 0,60 -60,0" fill="none" stroke="#faf8f2" stroke-width="3" opacity="0.7"/>
    <circle r="18" fill="#fbbf24" opacity="0.95"/>
  </g>

  <!-- Subtle accent: teal spark traveling along trunk -->
  <circle cx="500" cy="450" r="6" fill="#0e7490" opacity="0.75"/>
  <circle cx="560" cy="450" r="4" fill="#0e7490" opacity="0.5"/>
</svg>
