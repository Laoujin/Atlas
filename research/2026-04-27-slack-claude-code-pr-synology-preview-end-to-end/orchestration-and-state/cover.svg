<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#faf8f2"/>
      <stop offset="1" stop-color="#f0eadb"/>
    </linearGradient>
    <linearGradient id="rust" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#d97706"/>
      <stop offset="1" stop-color="#9a3309"/>
    </linearGradient>
    <linearGradient id="rustDark" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#c2410c"/>
      <stop offset="1" stop-color="#78350f"/>
    </linearGradient>
    <linearGradient id="teal" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0e7490"/>
      <stop offset="1" stop-color="#155e75"/>
    </linearGradient>
    <radialGradient id="spark" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#fbbf24" stop-opacity="0.95"/>
      <stop offset="0.5" stop-color="#d97706" stop-opacity="0.5"/>
      <stop offset="1" stop-color="#d97706" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1600" height="900" fill="url(#bg)"/>

  <!-- faint grid suggesting state cells -->
  <g opacity="0.08" stroke="#78350f" stroke-width="1" fill="none">
    <path d="M0 220 H1600 M0 450 H1600 M0 680 H1600"/>
    <path d="M260 0 V900 M620 0 V900 M980 0 V900 M1340 0 V900"/>
  </g>

  <!-- left block: orchestrator (rust, with port socket on right) -->
  <g opacity="0.92">
    <rect x="350" y="280" width="380" height="340" rx="16" fill="url(#rust)"/>
    <rect x="350" y="280" width="380" height="60" rx="16" fill="#78350f" opacity="0.55"/>
    <!-- internal state rows -->
    <rect x="380" y="380" width="240" height="14" rx="3" fill="#fef3ec" opacity="0.55"/>
    <rect x="380" y="410" width="180" height="14" rx="3" fill="#fef3ec" opacity="0.4"/>
    <rect x="380" y="440" width="220" height="14" rx="3" fill="#fef3ec" opacity="0.5"/>
    <rect x="380" y="470" width="150" height="14" rx="3" fill="#fef3ec" opacity="0.35"/>
    <rect x="380" y="500" width="200" height="14" rx="3" fill="#fef3ec" opacity="0.45"/>
    <!-- protruding port (right edge) -->
    <rect x="710" y="420" width="60" height="60" rx="6" fill="#78350f"/>
    <rect x="730" y="435" width="20" height="30" rx="2" fill="#1a0e0e" opacity="0.7"/>
  </g>

  <!-- right block: durable engine (teal, with receiving socket on left) -->
  <g opacity="0.9">
    <rect x="870" y="280" width="380" height="340" rx="16" fill="url(#teal)"/>
    <rect x="870" y="280" width="380" height="60" rx="16" fill="#0c4a5e" opacity="0.6"/>
    <!-- node graph inside (durable workflow steps) -->
    <g stroke="#fef3ec" stroke-width="2" opacity="0.6" fill="none">
      <line x1="940" y1="430" x2="1020" y2="400"/>
      <line x1="1020" y1="400" x2="1100" y2="450"/>
      <line x1="1100" y1="450" x2="1180" y2="420"/>
      <line x1="1020" y1="400" x2="1080" y2="510"/>
      <line x1="1100" y1="450" x2="1080" y2="510"/>
    </g>
    <g fill="#fbbf24" opacity="0.85">
      <circle cx="940" cy="430" r="8"/>
      <circle cx="1020" cy="400" r="8"/>
      <circle cx="1100" cy="450" r="8"/>
      <circle cx="1180" cy="420" r="8"/>
      <circle cx="1080" cy="510" r="8"/>
    </g>
    <!-- receiving socket -->
    <rect x="850" y="420" width="40" height="60" rx="6" fill="#0c4a5e"/>
    <rect x="855" y="435" width="30" height="30" rx="2" fill="#1a0e0e" opacity="0.7"/>
  </g>

  <!-- spark / correlation trail between sockets -->
  <g>
    <circle cx="800" cy="450" r="120" fill="url(#spark)" opacity="0.7"/>
    <path d="M770 450 Q790 430 810 450 T850 450" stroke="#fbbf24" stroke-width="3" fill="none" opacity="0.9" stroke-linecap="round"/>
    <circle cx="800" cy="450" r="8" fill="#fbbf24"/>
    <circle cx="780" cy="445" r="3" fill="#fef3ec" opacity="0.9"/>
    <circle cx="820" cy="455" r="3" fill="#fef3ec" opacity="0.9"/>
  </g>

  <!-- corner accents (decoration outside safe zone aware) -->
  <g opacity="0.5">
    <rect x="80" y="180" width="120" height="8" rx="2" fill="url(#rustDark)"/>
    <rect x="80" y="200" width="80" height="8" rx="2" fill="url(#rustDark)" opacity="0.6"/>
    <rect x="1400" y="700" width="120" height="8" rx="2" fill="#0e7490"/>
    <rect x="1440" y="720" width="80" height="8" rx="2" fill="#0e7490" opacity="0.6"/>
  </g>
</svg>
