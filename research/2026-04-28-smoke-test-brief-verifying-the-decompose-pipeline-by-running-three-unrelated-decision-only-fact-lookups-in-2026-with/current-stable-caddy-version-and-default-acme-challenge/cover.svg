<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#faf8f2"/>
      <stop offset="1" stop-color="#f0eadb"/>
    </linearGradient>
    <linearGradient id="shield" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#d97706"/>
      <stop offset="0.55" stop-color="#c2410c"/>
      <stop offset="1" stop-color="#78350f"/>
    </linearGradient>
    <linearGradient id="shieldFace" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#fbbf24" stop-opacity="0.35"/>
      <stop offset="1" stop-color="#fbbf24" stop-opacity="0.05"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.5" r="0.6">
      <stop offset="0" stop-color="#fbbf24" stop-opacity="0.45"/>
      <stop offset="1" stop-color="#fbbf24" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- full bleed background -->
  <rect width="1600" height="900" fill="url(#bg)"/>
  <ellipse cx="800" cy="470" rx="620" ry="380" fill="url(#glow)"/>

  <!-- decorative orbit arcs (handshake paths) -->
  <path d="M 360 720 Q 800 540 1240 720" fill="none" stroke="#0e7490" stroke-width="6" stroke-opacity="0.55" stroke-linecap="round"/>
  <path d="M 420 760 Q 800 600 1180 760" fill="none" stroke="#0e7490" stroke-width="3" stroke-opacity="0.3" stroke-linecap="round"/>

  <!-- converging arrows toward shield -->
  <path d="M 300 450 L 560 450" stroke="#0e7490" stroke-width="8" stroke-opacity="0.7" stroke-linecap="round"/>
  <path d="M 540 430 L 580 450 L 540 470" fill="none" stroke="#0e7490" stroke-width="8" stroke-opacity="0.7" stroke-linejoin="round" stroke-linecap="round"/>
  <path d="M 1300 450 L 1040 450" stroke="#0e7490" stroke-width="8" stroke-opacity="0.7" stroke-linecap="round"/>
  <path d="M 1060 430 L 1020 450 L 1060 470" fill="none" stroke="#0e7490" stroke-width="8" stroke-opacity="0.7" stroke-linejoin="round" stroke-linecap="round"/>

  <!-- shield body (hero) -->
  <path d="M 800 200 L 1020 280 L 1020 470 Q 1020 620 800 720 Q 580 620 580 470 L 580 280 Z"
        fill="url(#shield)" opacity="0.95"/>
  <path d="M 800 240 L 980 305 L 980 465 Q 980 595 800 680 Q 620 595 620 465 L 620 305 Z"
        fill="url(#shieldFace)"/>

  <!-- padlock shackle -->
  <path d="M 730 440 L 730 400 Q 730 330 800 330 Q 870 330 870 400 L 870 440"
        fill="none" stroke="#fef3ec" stroke-width="22" stroke-linecap="round" opacity="0.92"/>

  <!-- padlock body -->
  <rect x="700" y="440" width="200" height="160" rx="14" fill="#78350f" opacity="0.92"/>
  <rect x="712" y="452" width="176" height="136" rx="10" fill="#9a3309" opacity="0.85"/>

  <!-- keyhole -->
  <circle cx="800" cy="500" r="16" fill="#fbbf24"/>
  <rect x="793" y="510" width="14" height="44" rx="3" fill="#fbbf24"/>

  <!-- corner accents -->
  <circle cx="120" cy="140" r="6" fill="#c2410c" opacity="0.6"/>
  <circle cx="1480" cy="780" r="6" fill="#0e7490" opacity="0.6"/>
</svg>
