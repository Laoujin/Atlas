<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" preserveAspectRatio="xMidYMid slice">
  <defs>
    <radialGradient id="glow" cx="50%" cy="55%" r="60%">
      <stop offset="0%" stop-color="#5c2a1a" stop-opacity="1"/>
      <stop offset="55%" stop-color="#2a1410" stop-opacity="1"/>
      <stop offset="100%" stop-color="#1a0e0e" stop-opacity="1"/>
    </radialGradient>
    <linearGradient id="plate" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#fef3ec" stop-opacity="0.95"/>
      <stop offset="100%" stop-color="#d6c9b0" stop-opacity="0.9"/>
    </linearGradient>
    <linearGradient id="rim" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#fbbf24" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#c2410c" stop-opacity="0.85"/>
    </linearGradient>
    <linearGradient id="wine" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#be185d" stop-opacity="0.85"/>
      <stop offset="100%" stop-color="#78350f" stop-opacity="0.95"/>
    </linearGradient>
    <linearGradient id="gable" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#9a3309" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#1a0e0e" stop-opacity="0.95"/>
    </linearGradient>
    <linearGradient id="canal" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#5c2a1a" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#1a0e0e" stop-opacity="0.4"/>
    </linearGradient>
  </defs>

  <!-- Full-bleed background -->
  <rect width="1600" height="900" fill="url(#glow)"/>

  <!-- Distant Ghent stepped-gable skyline silhouette (decoration, low band) -->
  <g opacity="0.7">
    <path d="M0 760 L120 760 L120 700 L160 700 L160 660 L200 660 L200 700 L240 700 L240 760 L340 760 L340 690 L380 690 L380 650 L420 650 L420 610 L460 610 L460 650 L500 650 L500 690 L540 690 L540 760 L640 760 L640 720 L680 720 L680 680 L720 680 L720 640 L760 640 L760 680 L800 680 L800 720 L840 720 L840 760 L940 760 L940 700 L980 700 L980 660 L1020 660 L1020 620 L1060 620 L1060 660 L1100 660 L1100 700 L1140 700 L1140 760 L1240 760 L1240 720 L1280 720 L1280 680 L1320 680 L1320 720 L1360 720 L1360 760 L1460 760 L1460 700 L1500 700 L1500 660 L1540 660 L1540 700 L1580 700 L1580 760 L1600 760 L1600 900 L0 900 Z" fill="url(#gable)"/>
  </g>

  <!-- Canal reflection band -->
  <rect x="0" y="760" width="1600" height="80" fill="url(#canal)" opacity="0.6"/>
  <g opacity="0.25" stroke="#fbbf24" stroke-width="1" fill="none">
    <line x1="200" y1="785" x2="320" y2="785"/>
    <line x1="500" y1="800" x2="640" y2="800"/>
    <line x1="900" y1="790" x2="1020" y2="790"/>
    <line x1="1200" y1="805" x2="1340" y2="805"/>
  </g>

  <!-- HERO: plate (left of center) + wine glass (right of center), centered around 800,450 -->
  <!-- Plate shadow -->
  <ellipse cx="640" cy="520" rx="270" ry="40" fill="#000" opacity="0.45"/>

  <!-- Plate -->
  <ellipse cx="640" cy="490" rx="260" ry="58" fill="url(#rim)" opacity="0.9"/>
  <ellipse cx="640" cy="485" rx="245" ry="52" fill="url(#plate)"/>
  <ellipse cx="640" cy="478" rx="170" ry="34" fill="none" stroke="#9a3309" stroke-width="2" opacity="0.45"/>

  <!-- Plate centerpiece: small rust cuisine accent -->
  <circle cx="640" cy="478" r="22" fill="#c2410c" opacity="0.9"/>
  <circle cx="628" cy="472" r="6" fill="#fbbf24" opacity="0.85"/>
  <circle cx="650" cy="482" r="4" fill="#fef3ec" opacity="0.7"/>

  <!-- Wine glass: bowl, stem, foot -->
  <!-- Bowl outline -->
  <path d="M960 280 Q960 430 1050 460 Q1140 430 1140 280 Q1140 270 1130 268 L970 268 Q960 270 960 280 Z" fill="url(#wine)" opacity="0.9"/>
  <!-- Bowl glass highlight -->
  <path d="M978 290 Q978 380 1010 420" fill="none" stroke="#fef3ec" stroke-width="3" opacity="0.45"/>
  <!-- Glass rim -->
  <ellipse cx="1050" cy="270" rx="92" ry="10" fill="none" stroke="#fbbf24" stroke-width="2.5" opacity="0.85"/>
  <!-- Wine surface -->
  <ellipse cx="1050" cy="282" rx="84" ry="8" fill="#be185d" opacity="0.7"/>
  <!-- Stem -->
  <rect x="1046" y="460" width="8" height="120" fill="#fef3ec" opacity="0.55"/>
  <!-- Foot -->
  <ellipse cx="1050" cy="585" rx="70" ry="10" fill="#fef3ec" opacity="0.7"/>
  <ellipse cx="1050" cy="582" rx="70" ry="6" fill="none" stroke="#c2410c" stroke-width="1.5" opacity="0.6"/>

  <!-- Single Michelin-style star above the plate (hero accent) -->
  <g transform="translate(640 240)" opacity="0.95">
    <polygon points="0,-58 14,-18 56,-18 22,8 34,50 0,24 -34,50 -22,8 -56,-18 -14,-18" fill="#fbbf24"/>
    <polygon points="0,-58 14,-18 56,-18 22,8 34,50 0,24 -34,50 -22,8 -56,-18 -14,-18" fill="none" stroke="#c2410c" stroke-width="2" opacity="0.6"/>
  </g>

  <!-- Faint warm radial halo behind hero -->
  <circle cx="800" cy="430" r="380" fill="#d97706" opacity="0.06"/>
</svg>
