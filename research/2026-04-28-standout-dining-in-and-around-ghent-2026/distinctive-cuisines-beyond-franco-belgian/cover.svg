<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" preserveAspectRatio="xMidYMid slice">
  <defs>
    <radialGradient id="bg" cx="50%" cy="55%" r="70%">
      <stop offset="0%" stop-color="#5c2a1a"/>
      <stop offset="60%" stop-color="#2a1410"/>
      <stop offset="100%" stop-color="#1a0e0e"/>
    </radialGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#fbbf24" stop-opacity="0.45"/>
      <stop offset="60%" stop-color="#d97706" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#d97706" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="tagineCone" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#d97706"/>
      <stop offset="55%" stop-color="#c2410c"/>
      <stop offset="100%" stop-color="#78350f"/>
    </linearGradient>
    <linearGradient id="tagineBase" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#9a3309"/>
      <stop offset="100%" stop-color="#5c2a1a"/>
    </linearGradient>
    <linearGradient id="bowlL" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#be185d"/>
      <stop offset="100%" stop-color="#5c1438"/>
    </linearGradient>
    <linearGradient id="bowlR" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#78350f"/>
      <stop offset="100%" stop-color="#3a1a08"/>
    </linearGradient>
    <radialGradient id="brothL" cx="50%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#fbbf24" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#c2410c" stop-opacity="0.3"/>
    </radialGradient>
    <radialGradient id="brothR" cx="50%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#d97706" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#78350f" stop-opacity="0.3"/>
    </radialGradient>
  </defs>

  <!-- Full-bleed background -->
  <rect width="1600" height="900" fill="url(#bg)"/>
  <ellipse cx="800" cy="500" rx="780" ry="380" fill="url(#glow)"/>

  <!-- Left bowl (ramen / pho) -->
  <ellipse cx="380" cy="640" rx="190" ry="38" fill="#1a0e0e" opacity="0.55"/>
  <path d="M 200 580 Q 380 720 560 580 L 540 545 Q 380 610 220 545 Z" fill="url(#bowlL)" opacity="0.92"/>
  <ellipse cx="380" cy="555" rx="170" ry="28" fill="url(#brothL)"/>
  <ellipse cx="380" cy="552" rx="170" ry="26" fill="none" stroke="#fbbf24" stroke-width="1.5" opacity="0.55"/>
  <path d="M 320 540 Q 340 510 360 538 Q 380 508 400 540 Q 420 508 440 540" fill="none" stroke="#fef3ec" stroke-width="2" opacity="0.5"/>

  <!-- Hero: tagine, centered -->
  <ellipse cx="800" cy="690" rx="280" ry="48" fill="#1a0e0e" opacity="0.6"/>
  <!-- base -->
  <path d="M 560 615 Q 800 690 1040 615 L 1015 575 Q 800 635 585 575 Z" fill="url(#tagineBase)"/>
  <ellipse cx="800" cy="575" rx="215" ry="28" fill="#3a1a08"/>
  <!-- cone -->
  <path d="M 605 575 Q 800 565 995 575 L 880 320 Q 800 295 720 320 Z" fill="url(#tagineCone)" opacity="0.95"/>
  <!-- cone highlight -->
  <path d="M 705 555 Q 720 400 770 320" fill="none" stroke="#fbbf24" stroke-width="3" opacity="0.45"/>
  <!-- knob -->
  <circle cx="800" cy="285" r="22" fill="#9a3309"/>
  <circle cx="795" cy="280" r="8" fill="#fbbf24" opacity="0.7"/>
  <!-- steam -->
  <path d="M 770 250 Q 760 210 780 175 Q 800 140 785 105" fill="none" stroke="#fef3ec" stroke-width="3" opacity="0.35" stroke-linecap="round"/>
  <path d="M 820 245 Q 835 205 815 170 Q 800 135 820 100" fill="none" stroke="#fef3ec" stroke-width="3" opacity="0.28" stroke-linecap="round"/>

  <!-- Right bowl (mezze / small plate) -->
  <ellipse cx="1220" cy="640" rx="190" ry="38" fill="#1a0e0e" opacity="0.55"/>
  <path d="M 1040 580 Q 1220 720 1400 580 L 1380 545 Q 1220 610 1060 545 Z" fill="url(#bowlR)" opacity="0.92"/>
  <ellipse cx="1220" cy="555" rx="170" ry="28" fill="url(#brothR)"/>
  <ellipse cx="1220" cy="552" rx="170" ry="26" fill="none" stroke="#d97706" stroke-width="1.5" opacity="0.55"/>
  <circle cx="1180" cy="548" r="10" fill="#fbbf24" opacity="0.55"/>
  <circle cx="1240" cy="552" r="8" fill="#be185d" opacity="0.5"/>
  <circle cx="1260" cy="544" r="6" fill="#fef3ec" opacity="0.4"/>

  <!-- subtle constellation dots, decoration only -->
  <circle cx="200" cy="200" r="2.5" fill="#fbbf24" opacity="0.5"/>
  <circle cx="1380" cy="180" r="2" fill="#fbbf24" opacity="0.45"/>
  <circle cx="1450" cy="320" r="1.8" fill="#fef3ec" opacity="0.35"/>
  <circle cx="160" cy="380" r="1.8" fill="#fef3ec" opacity="0.35"/>
  <circle cx="1500" cy="500" r="2" fill="#d97706" opacity="0.5"/>
  <circle cx="120" cy="520" r="2" fill="#d97706" opacity="0.5"/>
</svg>
