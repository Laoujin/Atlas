<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" preserveAspectRatio="xMidYMid slice">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="65%">
      <stop offset="0%" stop-color="#5c2a1a"/>
      <stop offset="60%" stop-color="#2a1410"/>
      <stop offset="100%" stop-color="#1a0e0e"/>
    </radialGradient>
    <radialGradient id="plate" cx="50%" cy="45%" r="55%">
      <stop offset="0%" stop-color="#fef3ec"/>
      <stop offset="70%" stop-color="#f0eadb"/>
      <stop offset="100%" stop-color="#c9bfa6"/>
    </radialGradient>
    <radialGradient id="rim" cx="50%" cy="50%" r="50%">
      <stop offset="92%" stop-color="#9a3309" stop-opacity="0"/>
      <stop offset="97%" stop-color="#9a3309" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#78350f" stop-opacity="0.9"/>
    </radialGradient>
    <radialGradient id="glow" cx="50%" cy="45%" r="60%">
      <stop offset="0%" stop-color="#fbbf24" stop-opacity="0.35"/>
      <stop offset="50%" stop-color="#d97706" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#d97706" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="cutlery" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#d97706"/>
      <stop offset="100%" stop-color="#9a3309"/>
    </linearGradient>
  </defs>

  <!-- Full-bleed background -->
  <rect width="1600" height="900" fill="url(#bg)"/>
  <rect width="1600" height="900" fill="url(#glow)"/>

  <!-- Ghent skyline silhouette (decoration, bottom edge — gets cropped variably) -->
  <g opacity="0.55" fill="#1a0e0e">
    <!-- Gravensteen-style fortress (left) -->
    <rect x="120" y="780" width="140" height="120"/>
    <rect x="115" y="760" width="20" height="20"/>
    <rect x="155" y="760" width="20" height="20"/>
    <rect x="195" y="760" width="20" height="20"/>
    <rect x="235" y="760" width="20" height="20"/>
    <!-- St Nicholas tower -->
    <rect x="430" y="700" width="60" height="200"/>
    <polygon points="430,700 460,640 490,700"/>
    <!-- Belfry -->
    <rect x="700" y="620" width="55" height="280"/>
    <polygon points="700,620 727,540 755,620"/>
    <rect x="722" y="510" width="11" height="35"/>
    <!-- St Bavo's Cathedral -->
    <rect x="980" y="660" width="80" height="240"/>
    <polygon points="980,660 1020,590 1060,660"/>
    <rect x="1015" y="565" width="10" height="28"/>
    <!-- Gabled merchant houses -->
    <polygon points="1230,820 1230,760 1250,740 1270,760 1270,820"/>
    <polygon points="1280,820 1280,750 1305,725 1330,750 1330,820"/>
    <polygon points="1340,820 1340,770 1360,750 1380,770 1380,820"/>
    <rect x="1230" y="820" width="160" height="80"/>
    <!-- ground line -->
    <rect x="0" y="870" width="1600" height="30"/>
  </g>

  <!-- Hero: plate from above, centered (800, 450), within safe zone -->
  <!-- Plate shadow -->
  <ellipse cx="810" cy="475" rx="295" ry="295" fill="#000" opacity="0.45"/>
  <!-- Plate body -->
  <circle cx="800" cy="450" r="290" fill="url(#plate)"/>
  <!-- Inner well ring -->
  <circle cx="800" cy="450" r="290" fill="url(#rim)"/>
  <circle cx="800" cy="450" r="220" fill="none" stroke="#c2410c" stroke-width="2" opacity="0.35"/>

  <!-- Tasting-menu composition on the plate -->
  <!-- Central rust quenelle -->
  <ellipse cx="800" cy="445" rx="70" ry="38" fill="#9a3309" opacity="0.92"/>
  <ellipse cx="788" cy="432" rx="40" ry="18" fill="#c2410c" opacity="0.85"/>
  <!-- Saffron drizzle arc -->
  <path d="M 660 380 Q 800 320 940 380" fill="none" stroke="#fbbf24" stroke-width="6" stroke-linecap="round" opacity="0.85"/>
  <path d="M 680 410 Q 800 360 920 410" fill="none" stroke="#d97706" stroke-width="3" stroke-linecap="round" opacity="0.7"/>
  <!-- Small accompaniments -->
  <circle cx="700" cy="510" r="12" fill="#78350f" opacity="0.85"/>
  <circle cx="730" cy="540" r="8" fill="#c2410c" opacity="0.8"/>
  <circle cx="880" cy="530" r="14" fill="#78350f" opacity="0.85"/>
  <circle cx="900" cy="500" r="7" fill="#d97706" opacity="0.8"/>
  <!-- Three sauce dots -->
  <circle cx="800" cy="555" r="6" fill="#fbbf24" opacity="0.9"/>
  <circle cx="775" cy="565" r="4" fill="#fbbf24" opacity="0.75"/>
  <circle cx="825" cy="565" r="4" fill="#fbbf24" opacity="0.75"/>

  <!-- Crossed knife & fork above the plate (still within safe zone) -->
  <g transform="translate(800 200) rotate(-18)">
    <!-- Fork -->
    <g transform="translate(-90 0)">
      <rect x="-6" y="-90" width="12" height="180" rx="3" fill="url(#cutlery)" opacity="0.9"/>
      <rect x="-14" y="-90" width="4" height="40" fill="url(#cutlery)" opacity="0.9"/>
      <rect x="-6" y="-90" width="4" height="40" fill="url(#cutlery)" opacity="0.9"/>
      <rect x="2" y="-90" width="4" height="40" fill="url(#cutlery)" opacity="0.9"/>
      <rect x="10" y="-90" width="4" height="40" fill="url(#cutlery)" opacity="0.9"/>
    </g>
  </g>
  <g transform="translate(800 200) rotate(18)">
    <!-- Knife -->
    <g transform="translate(90 0)">
      <rect x="-6" y="-30" width="12" height="120" rx="3" fill="url(#cutlery)" opacity="0.9"/>
      <path d="M -8 -90 L 8 -90 L 6 -30 L -6 -30 Z" fill="#fbbf24" opacity="0.85"/>
    </g>
  </g>

  <!-- A pair of star accents (Michelin nod, abstract — small, not text) -->
  <g fill="#fbbf24" opacity="0.9">
    <polygon points="800,120 805,135 820,135 808,144 813,159 800,150 787,159 792,144 780,135 795,135"/>
  </g>
</svg>
