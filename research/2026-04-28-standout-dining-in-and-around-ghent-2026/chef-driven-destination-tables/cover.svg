<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" preserveAspectRatio="xMidYMid slice">
  <defs>
    <radialGradient id="emberGlow" cx="50%" cy="55%" r="55%">
      <stop offset="0%" stop-color="#fbbf24" stop-opacity="0.55"/>
      <stop offset="35%" stop-color="#c2410c" stop-opacity="0.35"/>
      <stop offset="75%" stop-color="#5c2a1a" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#1a0e0e" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="bgFill" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1a0e0e"/>
      <stop offset="60%" stop-color="#2a1410"/>
      <stop offset="100%" stop-color="#1a0e0e"/>
    </linearGradient>
    <radialGradient id="plateBack" cx="50%" cy="45%" r="50%">
      <stop offset="0%" stop-color="#78350f" stop-opacity="0.95"/>
      <stop offset="70%" stop-color="#5c2a1a" stop-opacity="0.85"/>
      <stop offset="100%" stop-color="#3a1a10" stop-opacity="0.7"/>
    </radialGradient>
    <radialGradient id="plateFront" cx="45%" cy="40%" r="55%">
      <stop offset="0%" stop-color="#d97706" stop-opacity="0.95"/>
      <stop offset="55%" stop-color="#c2410c" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#78350f" stop-opacity="0.85"/>
    </radialGradient>
    <linearGradient id="glassGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#be185d" stop-opacity="0.15"/>
      <stop offset="55%" stop-color="#be185d" stop-opacity="0.75"/>
      <stop offset="100%" stop-color="#9a3309" stop-opacity="0.85"/>
    </linearGradient>
    <radialGradient id="emberSpark" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#fbbf24" stop-opacity="0.95"/>
      <stop offset="100%" stop-color="#c2410c" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Full-bleed background -->
  <rect width="1600" height="900" fill="url(#bgFill)"/>
  <rect width="1600" height="900" fill="url(#emberGlow)"/>

  <!-- Back plate (slightly off-center, behind) -->
  <ellipse cx="640" cy="470" rx="290" ry="78" fill="url(#plateBack)" opacity="0.88"/>
  <ellipse cx="640" cy="465" rx="230" ry="58" fill="#3a1a10" opacity="0.6"/>

  <!-- Front plate (hero, centered in safe zone) -->
  <ellipse cx="900" cy="540" rx="340" ry="92" fill="url(#plateFront)" opacity="0.95"/>
  <ellipse cx="900" cy="534" rx="270" ry="68" fill="#5c2a1a" opacity="0.55"/>
  <ellipse cx="900" cy="530" rx="200" ry="48" fill="#fbbf24" opacity="0.18"/>

  <!-- Wine glass silhouette (rose accent) -->
  <path d="M 1110 230
           C 1110 320, 1180 350, 1180 410
           L 1180 540
           L 1150 555
           L 1210 555
           L 1180 540
           L 1180 410
           C 1180 350, 1250 320, 1250 230
           Z"
        fill="url(#glassGrad)" opacity="0.85"/>
  <ellipse cx="1180" cy="240" rx="70" ry="14" fill="#be185d" opacity="0.55"/>

  <!-- Ember sparks rising (atmospheric, near hero) -->
  <circle cx="500" cy="380" r="14" fill="url(#emberSpark)" opacity="0.85"/>
  <circle cx="430" cy="300" r="9" fill="url(#emberSpark)" opacity="0.7"/>
  <circle cx="560" cy="240" r="6" fill="url(#emberSpark)" opacity="0.6"/>
  <circle cx="1320" cy="640" r="11" fill="url(#emberSpark)" opacity="0.75"/>
  <circle cx="1380" cy="560" r="7" fill="url(#emberSpark)" opacity="0.6"/>
</svg>
