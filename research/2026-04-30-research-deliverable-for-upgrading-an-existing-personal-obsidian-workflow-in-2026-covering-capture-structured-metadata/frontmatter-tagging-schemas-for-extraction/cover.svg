<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#faf8f2"/>
      <stop offset="1" stop-color="#f0eadb"/>
    </linearGradient>
    <linearGradient id="card" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#fef3ec"/>
      <stop offset="1" stop-color="#f5e6d3"/>
    </linearGradient>
    <linearGradient id="hero" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#d97706"/>
      <stop offset="1" stop-color="#9a3309"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.5" r="0.6">
      <stop offset="0" stop-color="#fbbf24" stop-opacity="0.35"/>
      <stop offset="1" stop-color="#fbbf24" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- full-bleed background -->
  <rect width="1600" height="900" fill="url(#bg)"/>
  <rect width="1600" height="900" fill="url(#glow)"/>

  <!-- back card (rotated, partially behind) -->
  <g transform="translate(560 250) rotate(-8)" opacity="0.7">
    <rect width="520" height="620" rx="10" fill="#e8dcc4" stroke="#c2410c" stroke-opacity="0.25" stroke-width="2"/>
    <rect x="40" y="50" width="180" height="14" rx="3" fill="#9a3309" opacity="0.55"/>
    <rect x="40" y="84" width="380" height="10" rx="3" fill="#78350f" opacity="0.35"/>
    <rect x="40" y="116" width="320" height="10" rx="3" fill="#78350f" opacity="0.35"/>
    <rect x="40" y="148" width="360" height="10" rx="3" fill="#78350f" opacity="0.35"/>
    <rect x="40" y="180" width="280" height="10" rx="3" fill="#78350f" opacity="0.35"/>
  </g>

  <!-- hero card with frontmatter rows -->
  <g transform="translate(620 180)">
    <!-- card body -->
    <rect width="540" height="640" rx="14" fill="url(#card)" stroke="#c2410c" stroke-opacity="0.4" stroke-width="2"/>

    <!-- top bar (frontmatter delimiter band) -->
    <rect x="0" y="0" width="540" height="44" rx="14" fill="url(#hero)"/>
    <rect x="0" y="30" width="540" height="14" fill="url(#hero)"/>

    <!-- frontmatter triple-dash markers (geometric, no letters) -->
    <rect x="40" y="80" width="80" height="6" rx="2" fill="#c2410c"/>
    <rect x="130" y="80" width="60" height="6" rx="2" fill="#c2410c"/>
    <rect x="200" y="80" width="40" height="6" rx="2" fill="#c2410c"/>

    <!-- key:value rows: short rust "key" + colon dot + longer faint "value" -->
    <g transform="translate(40 130)">
      <rect width="110" height="14" rx="3" fill="#9a3309"/>
      <circle cx="124" cy="7" r="3" fill="#78350f"/>
      <rect x="146" width="280" height="14" rx="3" fill="#78350f" opacity="0.45"/>
    </g>
    <g transform="translate(40 174)">
      <rect width="80" height="14" rx="3" fill="#9a3309"/>
      <circle cx="94" cy="7" r="3" fill="#78350f"/>
      <rect x="116" width="340" height="14" rx="3" fill="#78350f" opacity="0.45"/>
    </g>
    <g transform="translate(40 218)">
      <rect width="140" height="14" rx="3" fill="#9a3309"/>
      <circle cx="154" cy="7" r="3" fill="#78350f"/>
      <rect x="176" width="220" height="14" rx="3" fill="#78350f" opacity="0.45"/>
    </g>
    <!-- list-style row (tags array) -->
    <g transform="translate(40 262)">
      <rect width="70" height="14" rx="3" fill="#9a3309"/>
      <circle cx="84" cy="7" r="3" fill="#78350f"/>
    </g>
    <g transform="translate(80 290)">
      <rect width="14" height="6" rx="2" fill="#c2410c"/>
      <rect x="26" width="90" height="14" rx="7" fill="#fbbf24" opacity="0.7"/>
    </g>
    <g transform="translate(80 316)">
      <rect width="14" height="6" rx="2" fill="#c2410c"/>
      <rect x="26" width="120" height="14" rx="7" fill="#fbbf24" opacity="0.7"/>
    </g>
    <g transform="translate(80 342)">
      <rect width="14" height="6" rx="2" fill="#c2410c"/>
      <rect x="26" width="76" height="14" rx="7" fill="#fbbf24" opacity="0.7"/>
    </g>

    <!-- closing frontmatter band -->
    <rect x="40" y="380" width="80" height="6" rx="2" fill="#c2410c"/>
    <rect x="130" y="380" width="60" height="6" rx="2" fill="#c2410c"/>
    <rect x="200" y="380" width="40" height="6" rx="2" fill="#c2410c"/>

    <!-- body text below frontmatter -->
    <rect x="40" y="420" width="420" height="8" rx="2" fill="#78350f" opacity="0.25"/>
    <rect x="40" y="442" width="380" height="8" rx="2" fill="#78350f" opacity="0.25"/>
    <rect x="40" y="464" width="440" height="8" rx="2" fill="#78350f" opacity="0.25"/>
    <rect x="40" y="486" width="300" height="8" rx="2" fill="#78350f" opacity="0.25"/>
    <rect x="40" y="508" width="400" height="8" rx="2" fill="#78350f" opacity="0.25"/>
    <rect x="40" y="530" width="340" height="8" rx="2" fill="#78350f" opacity="0.25"/>
    <rect x="40" y="552" width="420" height="8" rx="2" fill="#78350f" opacity="0.25"/>
    <rect x="40" y="574" width="260" height="8" rx="2" fill="#78350f" opacity="0.25"/>
  </g>

  <!-- extraction flow: arcs pulling tags out to the right -->
  <g fill="none" stroke="#c2410c" stroke-width="2" opacity="0.55">
    <path d="M 1180 280 Q 1280 290 1340 250"/>
    <path d="M 1180 330 Q 1300 340 1380 320"/>
    <path d="M 1180 380 Q 1290 390 1350 410"/>
  </g>
  <!-- extracted token chips floating right of card -->
  <g opacity="0.85">
    <rect x="1340" y="234" width="100" height="22" rx="11" fill="#c2410c"/>
    <rect x="1380" y="306" width="120" height="22" rx="11" fill="#d97706"/>
    <rect x="1350" y="396" width="90" height="22" rx="11" fill="#9a3309"/>
  </g>

  <!-- subtle schema grid behind, outside hero safe zone where possible -->
  <g stroke="#c2410c" stroke-opacity="0.08" stroke-width="1">
    <line x1="0" y1="150" x2="1600" y2="150"/>
    <line x1="0" y1="300" x2="1600" y2="300"/>
    <line x1="0" y1="600" x2="1600" y2="600"/>
    <line x1="0" y1="750" x2="1600" y2="750"/>
    <line x1="200" y1="0" x2="200" y2="900"/>
    <line x1="1400" y1="0" x2="1400" y2="900"/>
  </g>
</svg>
