<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#fef3ec"/>
      <stop offset="1" stop-color="#f0eadb"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#fbbf24" stop-opacity="0.45"/>
      <stop offset="1" stop-color="#fbbf24" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="hub" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#d97706"/>
      <stop offset="1" stop-color="#9a3309"/>
    </linearGradient>
    <linearGradient id="card" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.95"/>
      <stop offset="1" stop-color="#faf8f2" stop-opacity="0.9"/>
    </linearGradient>
  </defs>

  <rect width="1600" height="900" fill="url(#bg)"/>
  <circle cx="800" cy="450" r="520" fill="url(#glow)"/>

  <!-- edges from hero hub to satellite notes -->
  <g stroke="#9a3309" stroke-width="2.2" stroke-opacity="0.55" fill="none">
    <line x1="800" y1="450" x2="380" y2="240"/>
    <line x1="800" y1="450" x2="290" y2="500"/>
    <line x1="800" y1="450" x2="430" y2="720"/>
    <line x1="800" y1="450" x2="1180" y2="220"/>
    <line x1="800" y1="450" x2="1310" y2="470"/>
    <line x1="800" y1="450" x2="1170" y2="710"/>
    <line x1="380" y1="240" x2="290" y2="500"/>
    <line x1="1180" y1="220" x2="1310" y2="470"/>
    <line x1="430" y1="720" x2="1170" y2="710"/>
  </g>

  <!-- satellite note cards (tilted rectangles) -->
  <g stroke="#78350f" stroke-opacity="0.7" stroke-width="2">
    <g transform="translate(380 240) rotate(-12)">
      <rect x="-70" y="-50" width="140" height="100" rx="6" fill="url(#card)"/>
      <line x1="-50" y1="-22" x2="50" y2="-22" stroke="#c2410c" stroke-opacity="0.5" stroke-width="3"/>
      <line x1="-50" y1="-2" x2="30" y2="-2" stroke="#c2410c" stroke-opacity="0.35" stroke-width="3"/>
      <line x1="-50" y1="18" x2="40" y2="18" stroke="#c2410c" stroke-opacity="0.35" stroke-width="3"/>
    </g>
    <g transform="translate(290 500) rotate(8)">
      <rect x="-70" y="-50" width="140" height="100" rx="6" fill="url(#card)"/>
      <line x1="-50" y1="-22" x2="40" y2="-22" stroke="#c2410c" stroke-opacity="0.5" stroke-width="3"/>
      <line x1="-50" y1="-2" x2="50" y2="-2" stroke="#c2410c" stroke-opacity="0.35" stroke-width="3"/>
      <line x1="-50" y1="18" x2="20" y2="18" stroke="#c2410c" stroke-opacity="0.35" stroke-width="3"/>
    </g>
    <g transform="translate(430 720) rotate(-5)">
      <rect x="-70" y="-50" width="140" height="100" rx="6" fill="url(#card)"/>
      <line x1="-50" y1="-22" x2="50" y2="-22" stroke="#c2410c" stroke-opacity="0.5" stroke-width="3"/>
      <line x1="-50" y1="-2" x2="35" y2="-2" stroke="#c2410c" stroke-opacity="0.35" stroke-width="3"/>
      <line x1="-50" y1="18" x2="45" y2="18" stroke="#c2410c" stroke-opacity="0.35" stroke-width="3"/>
    </g>
    <g transform="translate(1180 220) rotate(10)">
      <rect x="-70" y="-50" width="140" height="100" rx="6" fill="url(#card)"/>
      <line x1="-50" y1="-22" x2="45" y2="-22" stroke="#c2410c" stroke-opacity="0.5" stroke-width="3"/>
      <line x1="-50" y1="-2" x2="25" y2="-2" stroke="#c2410c" stroke-opacity="0.35" stroke-width="3"/>
      <line x1="-50" y1="18" x2="40" y2="18" stroke="#c2410c" stroke-opacity="0.35" stroke-width="3"/>
    </g>
    <g transform="translate(1310 470) rotate(-8)">
      <rect x="-70" y="-50" width="140" height="100" rx="6" fill="url(#card)"/>
      <line x1="-50" y1="-22" x2="40" y2="-22" stroke="#c2410c" stroke-opacity="0.5" stroke-width="3"/>
      <line x1="-50" y1="-2" x2="50" y2="-2" stroke="#c2410c" stroke-opacity="0.35" stroke-width="3"/>
      <line x1="-50" y1="18" x2="30" y2="18" stroke="#c2410c" stroke-opacity="0.35" stroke-width="3"/>
    </g>
    <g transform="translate(1170 710) rotate(6)">
      <rect x="-70" y="-50" width="140" height="100" rx="6" fill="url(#card)"/>
      <line x1="-50" y1="-22" x2="50" y2="-22" stroke="#c2410c" stroke-opacity="0.5" stroke-width="3"/>
      <line x1="-50" y1="-2" x2="30" y2="-2" stroke="#c2410c" stroke-opacity="0.35" stroke-width="3"/>
      <line x1="-50" y1="18" x2="45" y2="18" stroke="#c2410c" stroke-opacity="0.35" stroke-width="3"/>
    </g>
  </g>

  <!-- hero hub: layered hexagonal vault badge centered at (800,450) -->
  <g transform="translate(800 450)">
    <circle r="160" fill="#78350f" opacity="0.18"/>
    <polygon points="0,-130 113,-65 113,65 0,130 -113,65 -113,-65" fill="url(#hub)" stroke="#78350f" stroke-width="3"/>
    <polygon points="0,-78 68,-39 68,39 0,78 -68,39 -68,-39" fill="#fef3ec" opacity="0.92"/>
    <circle r="22" fill="#c2410c"/>
    <circle r="8" fill="#fbbf24"/>
  </g>
</svg>
