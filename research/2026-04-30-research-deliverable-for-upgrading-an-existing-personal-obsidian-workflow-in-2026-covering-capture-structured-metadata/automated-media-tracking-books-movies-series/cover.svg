<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#fef3ec"/>
      <stop offset="1" stop-color="#f0eadb"/>
    </linearGradient>
    <linearGradient id="reel" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#c2410c"/>
      <stop offset="1" stop-color="#78350f"/>
    </linearGradient>
    <linearGradient id="book" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#d97706"/>
      <stop offset="1" stop-color="#9a3309"/>
    </linearGradient>
    <linearGradient id="screen" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#fbbf24"/>
      <stop offset="1" stop-color="#d97706"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.5" r="0.6">
      <stop offset="0" stop-color="#fbbf24" stop-opacity="0.35"/>
      <stop offset="1" stop-color="#fbbf24" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1600" height="900" fill="url(#bg)"/>
  <circle cx="800" cy="450" r="520" fill="url(#glow)"/>

  <!-- connecting flow arc beneath hero trio -->
  <path d="M 360 620 Q 800 760 1240 620" stroke="#9a3309" stroke-width="3" fill="none" opacity="0.35" stroke-dasharray="2 12"/>

  <!-- BOOK (left) -->
  <g opacity="0.92" transform="translate(380 460) rotate(-8)">
    <rect x="-150" y="-180" width="300" height="360" rx="6" fill="url(#book)"/>
    <rect x="-150" y="-180" width="22" height="360" fill="#5c2a1a" opacity="0.7"/>
    <line x1="-95" y1="-110" x2="120" y2="-110" stroke="#fef3ec" stroke-width="3" opacity="0.55"/>
    <line x1="-95" y1="-70" x2="100" y2="-70" stroke="#fef3ec" stroke-width="3" opacity="0.45"/>
    <line x1="-95" y1="-30" x2="115" y2="-30" stroke="#fef3ec" stroke-width="3" opacity="0.45"/>
    <line x1="-95" y1="10" x2="80" y2="10" stroke="#fef3ec" stroke-width="3" opacity="0.4"/>
    <line x1="-95" y1="50" x2="105" y2="50" stroke="#fef3ec" stroke-width="3" opacity="0.4"/>
    <line x1="-95" y1="90" x2="90" y2="90" stroke="#fef3ec" stroke-width="3" opacity="0.35"/>
  </g>

  <!-- FILM REEL (center hero) -->
  <g transform="translate(800 450)">
    <circle r="220" fill="url(#reel)" opacity="0.95"/>
    <circle r="220" fill="none" stroke="#5c2a1a" stroke-width="6" opacity="0.6"/>
    <circle r="50" fill="#1a0e0e" opacity="0.85"/>
    <circle r="18" fill="#fbbf24"/>
    <!-- reel holes -->
    <circle cx="0" cy="-140" r="32" fill="#1a0e0e" opacity="0.75"/>
    <circle cx="121" cy="-70" r="32" fill="#1a0e0e" opacity="0.75"/>
    <circle cx="121" cy="70" r="32" fill="#1a0e0e" opacity="0.75"/>
    <circle cx="0" cy="140" r="32" fill="#1a0e0e" opacity="0.75"/>
    <circle cx="-121" cy="70" r="32" fill="#1a0e0e" opacity="0.75"/>
    <circle cx="-121" cy="-70" r="32" fill="#1a0e0e" opacity="0.75"/>
    <!-- highlight -->
    <path d="M -150 -150 A 220 220 0 0 1 80 -200" stroke="#fbbf24" stroke-width="5" fill="none" opacity="0.5"/>
  </g>

  <!-- TV / SCREEN (right) -->
  <g opacity="0.93" transform="translate(1220 460) rotate(6)">
    <rect x="-160" y="-110" width="320" height="220" rx="14" fill="#5c2a1a"/>
    <rect x="-140" y="-92" width="280" height="184" rx="6" fill="url(#screen)"/>
    <!-- screen scanlines -->
    <line x1="-130" y1="-50" x2="130" y2="-50" stroke="#9a3309" stroke-width="2" opacity="0.35"/>
    <line x1="-130" y1="-15" x2="130" y2="-15" stroke="#9a3309" stroke-width="2" opacity="0.35"/>
    <line x1="-130" y1="20" x2="130" y2="20" stroke="#9a3309" stroke-width="2" opacity="0.35"/>
    <line x1="-130" y1="55" x2="130" y2="55" stroke="#9a3309" stroke-width="2" opacity="0.35"/>
    <!-- stand -->
    <rect x="-12" y="110" width="24" height="36" fill="#5c2a1a"/>
    <rect x="-60" y="142" width="120" height="10" rx="3" fill="#5c2a1a"/>
  </g>

  <!-- corner decorations (croppable) -->
  <circle cx="80" cy="80" r="6" fill="#c2410c" opacity="0.5"/>
  <circle cx="1520" cy="820" r="6" fill="#c2410c" opacity="0.5"/>
  <circle cx="120" cy="820" r="4" fill="#d97706" opacity="0.6"/>
  <circle cx="1500" cy="100" r="4" fill="#d97706" opacity="0.6"/>
</svg>
