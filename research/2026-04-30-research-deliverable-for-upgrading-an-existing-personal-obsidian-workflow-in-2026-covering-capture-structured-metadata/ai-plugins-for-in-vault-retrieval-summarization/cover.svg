<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" preserveAspectRatio="xMidYMid slice">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#fef3ec"/>
      <stop offset="100%" stop-color="#f0eadb"/>
    </radialGradient>
    <radialGradient id="hub" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#fbbf24"/>
      <stop offset="55%" stop-color="#c2410c"/>
      <stop offset="100%" stop-color="#78350f"/>
    </radialGradient>
    <radialGradient id="beam" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#fbbf24" stop-opacity="0.55"/>
      <stop offset="60%" stop-color="#c2410c" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#c2410c" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="node" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#9a3309"/>
      <stop offset="100%" stop-color="#5c2a1a"/>
    </radialGradient>
    <radialGradient id="vnode" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#7c3aed"/>
      <stop offset="100%" stop-color="#4c1d95"/>
    </radialGradient>
  </defs>

  <rect width="1600" height="900" fill="url(#bg)"/>

  <!-- orbit rings: embedding space -->
  <g fill="none" stroke="#c2410c" stroke-opacity="0.25">
    <ellipse cx="800" cy="450" rx="430" ry="270" stroke-width="1.5"/>
    <ellipse cx="800" cy="450" rx="320" ry="200" stroke-width="1.5"/>
    <ellipse cx="800" cy="450" rx="210" ry="130" stroke-width="1.5"/>
  </g>
  <g fill="none" stroke="#6d28d9" stroke-opacity="0.18">
    <ellipse cx="800" cy="450" rx="380" ry="240" stroke-width="1" transform="rotate(28 800 450)"/>
    <ellipse cx="800" cy="450" rx="260" ry="160" stroke-width="1" transform="rotate(-22 800 450)"/>
  </g>

  <!-- focused beam from hub outward -->
  <ellipse cx="800" cy="450" rx="520" ry="320" fill="url(#beam)" opacity="0.85"/>

  <!-- edges between notes -->
  <g stroke="#9a3309" stroke-opacity="0.55" stroke-width="1.6" fill="none">
    <line x1="800" y1="450" x2="430" y2="280"/>
    <line x1="800" y1="450" x2="1180" y2="270"/>
    <line x1="800" y1="450" x2="1210" y2="640"/>
    <line x1="800" y1="450" x2="420" y2="610"/>
    <line x1="800" y1="450" x2="610" y2="200"/>
    <line x1="800" y1="450" x2="990" y2="700"/>
    <line x1="800" y1="450" x2="1080" y2="190"/>
    <line x1="800" y1="450" x2="540" y2="720"/>
  </g>
  <g stroke="#6d28d9" stroke-opacity="0.4" stroke-width="1.2" fill="none">
    <line x1="430" y1="280" x2="610" y2="200"/>
    <line x1="1180" y1="270" x2="1080" y2="190"/>
    <line x1="1210" y1="640" x2="990" y2="700"/>
    <line x1="420" y1="610" x2="540" y2="720"/>
    <line x1="610" y1="200" x2="1080" y2="190"/>
    <line x1="540" y1="720" x2="990" y2="700"/>
  </g>

  <!-- note nodes (vault) -->
  <g opacity="0.92">
    <circle cx="430" cy="280" r="14" fill="url(#node)"/>
    <circle cx="1180" cy="270" r="14" fill="url(#node)"/>
    <circle cx="1210" cy="640" r="14" fill="url(#node)"/>
    <circle cx="420" cy="610" r="14" fill="url(#node)"/>
    <circle cx="610" cy="200" r="11" fill="url(#vnode)"/>
    <circle cx="990" cy="700" r="11" fill="url(#vnode)"/>
    <circle cx="1080" cy="190" r="10" fill="url(#node)"/>
    <circle cx="540" cy="720" r="10" fill="url(#vnode)"/>
  </g>

  <!-- secondary scattered nodes -->
  <g fill="#78350f" opacity="0.55">
    <circle cx="320" cy="430" r="5"/>
    <circle cx="1290" cy="450" r="5"/>
    <circle cx="720" cy="170" r="4"/>
    <circle cx="880" cy="730" r="4"/>
    <circle cx="1130" cy="540" r="5"/>
    <circle cx="490" cy="500" r="5"/>
  </g>
  <g fill="#6d28d9" opacity="0.5">
    <circle cx="370" cy="380" r="4"/>
    <circle cx="1250" cy="370" r="4"/>
    <circle cx="1140" cy="640" r="4"/>
    <circle cx="470" cy="660" r="4"/>
  </g>

  <!-- hub: the AI retrieval lens -->
  <circle cx="800" cy="450" r="78" fill="url(#hub)" opacity="0.95"/>
  <circle cx="800" cy="450" r="44" fill="#faf8f2" opacity="0.18"/>
  <circle cx="800" cy="450" r="20" fill="#fbbf24" opacity="0.85"/>
</svg>
