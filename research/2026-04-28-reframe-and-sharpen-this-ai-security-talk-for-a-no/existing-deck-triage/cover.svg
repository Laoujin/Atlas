<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#faf8f2"/>
      <stop offset="1" stop-color="#f0eadb"/>
    </linearGradient>
    <linearGradient id="hero" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#d97706"/>
      <stop offset="1" stop-color="#9a3309"/>
    </linearGradient>
    <linearGradient id="cut" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#78350f" stop-opacity="0.55"/>
      <stop offset="1" stop-color="#5c2a1a" stop-opacity="0.7"/>
    </linearGradient>
    <linearGradient id="keep" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#6d28d9" stop-opacity="0.78"/>
      <stop offset="1" stop-color="#4c1d95" stop-opacity="0.9"/>
    </linearGradient>
    <linearGradient id="paper" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#fef3ec"/>
      <stop offset="1" stop-color="#f0eadb"/>
    </linearGradient>
  </defs>

  <rect width="1600" height="900" fill="url(#bg)"/>

  <!-- back stack (cut pile) -->
  <g transform="translate(420 560) rotate(-14)" opacity="0.85">
    <rect x="0" y="0" width="520" height="320" rx="10" fill="url(#cut)"/>
    <line x1="40" y1="80" x2="320" y2="80" stroke="#1a0e0e" stroke-opacity="0.35" stroke-width="6"/>
    <line x1="40" y1="120" x2="420" y2="120" stroke="#1a0e0e" stroke-opacity="0.25" stroke-width="4"/>
    <line x1="40" y1="150" x2="380" y2="150" stroke="#1a0e0e" stroke-opacity="0.25" stroke-width="4"/>
    <line x1="380" y1="240" x2="470" y2="330" stroke="#fbbf24" stroke-width="6" stroke-linecap="round" opacity="0.7"/>
    <line x1="470" y1="240" x2="380" y2="330" stroke="#fbbf24" stroke-width="6" stroke-linecap="round" opacity="0.7"/>
  </g>

  <!-- mid stack (trim/simplify pile) -->
  <g transform="translate(560 480) rotate(-4)" opacity="0.92">
    <rect x="0" y="0" width="560" height="340" rx="12" fill="url(#paper)" stroke="#9a3309" stroke-opacity="0.35" stroke-width="2"/>
    <line x1="40" y1="70" x2="380" y2="70" stroke="#9a3309" stroke-opacity="0.45" stroke-width="6"/>
    <line x1="40" y1="120" x2="480" y2="120" stroke="#78350f" stroke-opacity="0.3" stroke-width="4"/>
    <line x1="40" y1="155" x2="440" y2="155" stroke="#78350f" stroke-opacity="0.3" stroke-width="4"/>
    <line x1="40" y1="190" x2="380" y2="190" stroke="#78350f" stroke-opacity="0.3" stroke-width="4"/>
    <!-- scissor-trim arrow -->
    <path d="M420 250 L500 250" stroke="#c2410c" stroke-width="6" stroke-linecap="round"/>
    <path d="M490 240 L500 250 L490 260" fill="none" stroke="#c2410c" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- hero slide (kept / reframed) -->
  <g transform="translate(680 250) rotate(6)">
    <rect x="0" y="0" width="640" height="400" rx="14" fill="url(#hero)"/>
    <rect x="0" y="0" width="640" height="80" fill="#1a0e0e" fill-opacity="0.18"/>
    <line x1="40" y1="140" x2="380" y2="140" stroke="#fef3ec" stroke-opacity="0.85" stroke-width="8" stroke-linecap="round"/>
    <line x1="40" y1="190" x2="540" y2="190" stroke="#fef3ec" stroke-opacity="0.55" stroke-width="5" stroke-linecap="round"/>
    <line x1="40" y1="225" x2="500" y2="225" stroke="#fef3ec" stroke-opacity="0.55" stroke-width="5" stroke-linecap="round"/>
    <line x1="40" y1="260" x2="460" y2="260" stroke="#fef3ec" stroke-opacity="0.55" stroke-width="5" stroke-linecap="round"/>
    <!-- check mark badge in violet (keep verdict) -->
    <circle cx="540" cy="320" r="48" fill="url(#keep)"/>
    <path d="M515 322 L535 342 L568 302" fill="none" stroke="#faf8f2" stroke-width="9" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
</svg>
