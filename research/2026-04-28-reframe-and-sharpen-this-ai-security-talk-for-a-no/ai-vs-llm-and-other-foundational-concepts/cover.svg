<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#faf8f2"/>
      <stop offset="1" stop-color="#f0eadb"/>
    </linearGradient>
    <linearGradient id="ai" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#6d28d9" stop-opacity="0.18"/>
      <stop offset="1" stop-color="#6d28d9" stop-opacity="0.32"/>
    </linearGradient>
    <linearGradient id="ml" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#9a3309" stop-opacity="0.55"/>
      <stop offset="1" stop-color="#78350f" stop-opacity="0.7"/>
    </linearGradient>
    <linearGradient id="dl" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#c2410c" stop-opacity="0.85"/>
      <stop offset="1" stop-color="#9a3309" stop-opacity="0.95"/>
    </linearGradient>
    <radialGradient id="llm" cx="0.5" cy="0.45" r="0.6">
      <stop offset="0" stop-color="#fbbf24"/>
      <stop offset="0.6" stop-color="#d97706"/>
      <stop offset="1" stop-color="#c2410c"/>
    </radialGradient>
    <radialGradient id="glow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#fbbf24" stop-opacity="0.45"/>
      <stop offset="1" stop-color="#fbbf24" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1600" height="900" fill="url(#bg)"/>

  <!-- soft warm glow behind the hero -->
  <circle cx="800" cy="450" r="380" fill="url(#glow)"/>

  <!-- AI: outermost ring (violet, faintest) -->
  <rect x="290" y="120" rx="44" ry="44" width="1020" height="660" fill="url(#ai)" stroke="#6d28d9" stroke-opacity="0.55" stroke-width="2"/>

  <!-- ML: second ring (rust, mid) -->
  <rect x="390" y="180" rx="36" ry="36" width="820" height="540" fill="url(#ml)" stroke="#78350f" stroke-opacity="0.6" stroke-width="2"/>

  <!-- Deep Learning: third ring (rust, deeper) -->
  <rect x="500" y="245" rx="28" ry="28" width="600" height="410" fill="url(#dl)" stroke="#78350f" stroke-opacity="0.7" stroke-width="2"/>

  <!-- LLM: hero core (warm radial) -->
  <rect x="620" y="320" rx="20" ry="20" width="360" height="260" fill="url(#llm)" stroke="#9a3309" stroke-opacity="0.85" stroke-width="2.5"/>

  <!-- inner spark / focal dot -->
  <circle cx="800" cy="450" r="14" fill="#faf8f2" opacity="0.92"/>
  <circle cx="800" cy="450" r="6" fill="#9a3309"/>
</svg>
