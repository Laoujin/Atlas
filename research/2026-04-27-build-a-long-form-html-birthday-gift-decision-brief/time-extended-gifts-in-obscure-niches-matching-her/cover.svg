<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#fef3ec"/>
      <stop offset="1" stop-color="#f0eadb"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.5" r="0.6">
      <stop offset="0" stop-color="#fbbf24" stop-opacity="0.35"/>
      <stop offset="1" stop-color="#fbbf24" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="boxA" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#d97706"/>
      <stop offset="1" stop-color="#9a3309"/>
    </linearGradient>
    <linearGradient id="boxB" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#c2410c"/>
      <stop offset="1" stop-color="#78350f"/>
    </linearGradient>
    <linearGradient id="boxC" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#fbbf24"/>
      <stop offset="1" stop-color="#d97706"/>
    </linearGradient>
    <linearGradient id="boxD" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#c2410c"/>
      <stop offset="1" stop-color="#9a3309"/>
    </linearGradient>
  </defs>

  <!-- Full-bleed background -->
  <rect width="1600" height="900" fill="url(#bg)"/>
  <ellipse cx="800" cy="500" rx="700" ry="380" fill="url(#glow)"/>

  <!-- Timeline arc sweeping through the safe zone -->
  <path d="M 200 640 Q 800 380 1400 600" stroke="#9a3309" stroke-width="3" fill="none" stroke-opacity="0.45" stroke-dasharray="2 14" stroke-linecap="round"/>

  <!-- Tick marks along the arc anchoring each gift to a moment in time -->
  <circle cx="320" cy="600" r="6" fill="#78350f" fill-opacity="0.55"/>
  <circle cx="560" cy="500" r="6" fill="#78350f" fill-opacity="0.55"/>
  <circle cx="800" cy="450" r="6" fill="#78350f" fill-opacity="0.55"/>
  <circle cx="1040" cy="470" r="6" fill="#78350f" fill-opacity="0.55"/>
  <circle cx="1280" cy="560" r="6" fill="#78350f" fill-opacity="0.55"/>

  <!-- Box 1: smallest, leftmost, earliest -->
  <g opacity="0.85" transform="translate(280 520) rotate(-4)">
    <rect x="0" y="0" width="110" height="100" fill="url(#boxA)"/>
    <rect x="48" y="0" width="14" height="100" fill="#fbbf24" opacity="0.9"/>
    <rect x="0" y="42" width="110" height="14" fill="#fbbf24" opacity="0.9"/>
    <path d="M 55 0 Q 40 -22 25 -10 Q 45 -8 55 0 Q 65 -8 85 -10 Q 70 -22 55 0 Z" fill="#fbbf24" opacity="0.95"/>
  </g>

  <!-- Box 2 -->
  <g opacity="0.9" transform="translate(490 410) rotate(3)">
    <rect x="0" y="0" width="150" height="135" fill="url(#boxB)"/>
    <rect x="65" y="0" width="18" height="135" fill="#fef3ec" opacity="0.85"/>
    <rect x="0" y="58" width="150" height="18" fill="#fef3ec" opacity="0.85"/>
    <path d="M 74 0 Q 54 -28 34 -14 Q 58 -10 74 0 Q 90 -10 114 -14 Q 94 -28 74 0 Z" fill="#fef3ec" opacity="0.9"/>
  </g>

  <!-- Box 3: hero, centre, largest -->
  <g transform="translate(710 320) rotate(-2)">
    <rect x="0" y="0" width="200" height="180" fill="url(#boxC)"/>
    <rect x="88" y="0" width="22" height="180" fill="#9a3309" opacity="0.85"/>
    <rect x="0" y="78" width="200" height="22" fill="#9a3309" opacity="0.85"/>
    <path d="M 99 0 Q 72 -36 46 -18 Q 76 -14 99 0 Q 122 -14 152 -18 Q 126 -36 99 0 Z" fill="#9a3309" opacity="0.9"/>
  </g>

  <!-- Box 4 -->
  <g opacity="0.9" transform="translate(980 400) rotate(4)">
    <rect x="0" y="0" width="140" height="125" fill="url(#boxD)"/>
    <rect x="60" y="0" width="16" height="125" fill="#fbbf24" opacity="0.9"/>
    <rect x="0" y="54" width="140" height="16" fill="#fbbf24" opacity="0.9"/>
    <path d="M 68 0 Q 50 -25 32 -12 Q 54 -9 68 0 Q 82 -9 104 -12 Q 86 -25 68 0 Z" fill="#fbbf24" opacity="0.95"/>
  </g>

  <!-- Box 5: smallest, rightmost, faded — anticipation of what's still to come -->
  <g opacity="0.7" transform="translate(1200 500) rotate(-3)">
    <rect x="0" y="0" width="100" height="90" fill="url(#boxA)"/>
    <rect x="43" y="0" width="12" height="90" fill="#fef3ec" opacity="0.85"/>
    <rect x="0" y="38" width="100" height="12" fill="#fef3ec" opacity="0.85"/>
    <path d="M 50 0 Q 36 -20 22 -9 Q 40 -7 50 0 Q 60 -7 78 -9 Q 64 -20 50 0 Z" fill="#fef3ec" opacity="0.9"/>
  </g>
</svg>
