<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#fef3ec"/>
      <stop offset="1" stop-color="#f0eadb"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.5" r="0.6">
      <stop offset="0" stop-color="#fbbf24" stop-opacity="0.55"/>
      <stop offset="1" stop-color="#fbbf24" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="orb" cx="0.4" cy="0.35" r="0.75">
      <stop offset="0" stop-color="#fbbf24"/>
      <stop offset="0.45" stop-color="#d97706"/>
      <stop offset="1" stop-color="#78350f"/>
    </radialGradient>
    <linearGradient id="step1" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#fbbf24" stop-opacity="0.85"/>
      <stop offset="1" stop-color="#d97706" stop-opacity="0.85"/>
    </linearGradient>
    <linearGradient id="step2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#d97706" stop-opacity="0.9"/>
      <stop offset="1" stop-color="#c2410c" stop-opacity="0.9"/>
    </linearGradient>
    <linearGradient id="step3" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#c2410c"/>
      <stop offset="1" stop-color="#9a3309"/>
    </linearGradient>
  </defs>

  <!-- Full-bleed background -->
  <rect width="1600" height="900" fill="url(#bg)"/>
  <ellipse cx="800" cy="470" rx="780" ry="430" fill="url(#glow)"/>

  <!-- Ascending version-bump steps (left of hero) -->
  <rect x="280" y="600" width="260" height="140" rx="10" fill="url(#step1)" opacity="0.75"/>
  <rect x="380" y="500" width="260" height="240" rx="10" fill="url(#step2)" opacity="0.85"/>
  <rect x="480" y="400" width="260" height="340" rx="10" fill="url(#step3)" opacity="0.92"/>

  <!-- Hero: warm orb (abstract roll), centered in safe zone -->
  <circle cx="1020" cy="470" r="200" fill="url(#orb)" opacity="0.95"/>
  <!-- Soft highlight on the orb -->
  <ellipse cx="965" cy="405" rx="70" ry="42" fill="#fef3ec" opacity="0.35"/>

  <!-- Curved score lines suggesting a bread roll, abstractly -->
  <path d="M 880 470 Q 1020 380 1160 470" stroke="#78350f" stroke-width="3" fill="none" opacity="0.45" stroke-linecap="round"/>
  <path d="M 880 470 Q 1020 560 1160 470" stroke="#78350f" stroke-width="3" fill="none" opacity="0.45" stroke-linecap="round"/>

  <!-- Small ascent marker dot above the orb (version pointer) -->
  <circle cx="1020" cy="230" r="14" fill="#c2410c" opacity="0.9"/>
  <line x1="1020" y1="250" x2="1020" y2="270" stroke="#c2410c" stroke-width="3" opacity="0.7"/>
</svg>
