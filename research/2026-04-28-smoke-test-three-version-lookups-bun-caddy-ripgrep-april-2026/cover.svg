<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#fef3ec"/>
      <stop offset="1" stop-color="#f0eadb"/>
    </linearGradient>
    <radialGradient id="hub" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#fbbf24"/>
      <stop offset="0.55" stop-color="#d97706"/>
      <stop offset="1" stop-color="#9a3309"/>
    </radialGradient>
    <radialGradient id="halo" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#d97706" stop-opacity="0.35"/>
      <stop offset="1" stop-color="#d97706" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="probe" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#9a3309" stop-opacity="0.9"/>
      <stop offset="1" stop-color="#c2410c" stop-opacity="0.5"/>
    </linearGradient>
  </defs>

  <!-- full-bleed background -->
  <rect width="1600" height="900" fill="url(#bg)"/>

  <!-- faint corner decoration (safe to crop) -->
  <circle cx="80" cy="80" r="120" fill="#d97706" opacity="0.06"/>
  <circle cx="1520" cy="820" r="160" fill="#9a3309" opacity="0.06"/>

  <!-- hero halo -->
  <circle cx="800" cy="450" r="280" fill="url(#halo)"/>

  <!-- three probe channels emerging from hub to three targets -->
  <!-- channel 1: upper-left target -->
  <line x1="800" y1="450" x2="380" y2="230" stroke="url(#probe)" stroke-width="6" opacity="0.85"/>
  <circle cx="380" cy="230" r="38" fill="#faf8f2" stroke="#c2410c" stroke-width="5" opacity="0.95"/>
  <circle cx="380" cy="230" r="14" fill="#c2410c" opacity="0.9"/>

  <!-- channel 2: right target -->
  <line x1="800" y1="450" x2="1240" y2="450" stroke="url(#probe)" stroke-width="6" opacity="0.85"/>
  <circle cx="1240" cy="450" r="38" fill="#faf8f2" stroke="#c2410c" stroke-width="5" opacity="0.95"/>
  <circle cx="1240" cy="450" r="14" fill="#c2410c" opacity="0.9"/>

  <!-- channel 3: lower-left target -->
  <line x1="800" y1="450" x2="380" y2="670" stroke="url(#probe)" stroke-width="6" opacity="0.85"/>
  <circle cx="380" cy="670" r="38" fill="#faf8f2" stroke="#c2410c" stroke-width="5" opacity="0.95"/>
  <circle cx="380" cy="670" r="14" fill="#c2410c" opacity="0.9"/>

  <!-- concentric diagnostic rings around hub -->
  <circle cx="800" cy="450" r="170" fill="none" stroke="#9a3309" stroke-width="2" opacity="0.25"/>
  <circle cx="800" cy="450" r="220" fill="none" stroke="#9a3309" stroke-width="2" opacity="0.18"/>

  <!-- central hub (hero) -->
  <circle cx="800" cy="450" r="110" fill="url(#hub)" opacity="0.95"/>
  <circle cx="800" cy="450" r="60" fill="#78350f" opacity="0.55"/>
  <circle cx="800" cy="450" r="22" fill="#fbbf24" opacity="0.95"/>
</svg>
