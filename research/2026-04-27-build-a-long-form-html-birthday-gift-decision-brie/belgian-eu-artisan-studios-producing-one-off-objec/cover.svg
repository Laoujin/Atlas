<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" preserveAspectRatio="xMidYMid slice">
  <defs>
    <radialGradient id="bg" cx="50%" cy="55%" r="70%">
      <stop offset="0%" stop-color="#fef3ec"/>
      <stop offset="60%" stop-color="#f0eadb"/>
      <stop offset="100%" stop-color="#e6dcc4"/>
    </radialGradient>
    <linearGradient id="vessel" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#d97706"/>
      <stop offset="45%" stop-color="#c2410c"/>
      <stop offset="100%" stop-color="#78350f"/>
    </linearGradient>
    <linearGradient id="vesselShine" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#fbbf24" stop-opacity="0.55"/>
      <stop offset="40%" stop-color="#fbbf24" stop-opacity="0"/>
      <stop offset="100%" stop-color="#9a3309" stop-opacity="0.45"/>
    </linearGradient>
    <radialGradient id="wheel" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#9a3309"/>
      <stop offset="80%" stop-color="#5c2a1a"/>
      <stop offset="100%" stop-color="#3a1a10"/>
    </radialGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#fbbf24" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#fbbf24" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- full-bleed background -->
  <rect width="1600" height="900" fill="url(#bg)"/>

  <!-- warm glow behind the wheel -->
  <circle cx="800" cy="600" r="420" fill="url(#glow)"/>

  <!-- potter's wheel disc (perspective ellipse) -->
  <ellipse cx="800" cy="690" rx="360" ry="70" fill="url(#wheel)" opacity="0.92"/>
  <ellipse cx="800" cy="685" rx="360" ry="68" fill="none" stroke="#78350f" stroke-width="3" opacity="0.7"/>
  <ellipse cx="800" cy="690" rx="280" ry="52" fill="none" stroke="#c2410c" stroke-width="1.5" opacity="0.45"/>
  <ellipse cx="800" cy="690" rx="180" ry="33" fill="none" stroke="#c2410c" stroke-width="1.5" opacity="0.35"/>

  <!-- clay vessel (hero), centered roughly at 800,460 -->
  <path d="M 720 660
           C 700 600, 690 540, 710 480
           C 730 430, 740 410, 720 370
           C 700 330, 700 300, 740 270
           C 770 248, 830 248, 860 270
           C 900 300, 900 330, 880 370
           C 860 410, 870 430, 890 480
           C 910 540, 900 600, 880 660
           Z"
        fill="url(#vessel)"/>
  <!-- vessel shine overlay -->
  <path d="M 720 660
           C 700 600, 690 540, 710 480
           C 730 430, 740 410, 720 370
           C 700 330, 700 300, 740 270
           C 770 248, 830 248, 860 270
           C 900 300, 900 330, 880 370
           C 860 410, 870 430, 890 480
           C 910 540, 900 600, 880 660
           Z"
        fill="url(#vesselShine)" opacity="0.85"/>

  <!-- vessel rim ellipse -->
  <ellipse cx="800" cy="258" rx="60" ry="14" fill="#3a1a10" opacity="0.55"/>
  <ellipse cx="800" cy="256" rx="60" ry="13" fill="none" stroke="#78350f" stroke-width="2"/>

  <!-- subtle throwing-line ridges on the vessel -->
  <path d="M 712 470 C 760 460, 840 460, 888 470" fill="none" stroke="#78350f" stroke-width="1.2" opacity="0.4"/>
  <path d="M 716 540 C 760 530, 840 530, 884 540" fill="none" stroke="#78350f" stroke-width="1.2" opacity="0.35"/>
  <path d="M 720 605 C 760 596, 840 596, 880 605" fill="none" stroke="#78350f" stroke-width="1.2" opacity="0.3"/>

  <!-- two faint clay flecks (motion of the wheel) -->
  <circle cx="500" cy="720" r="5" fill="#9a3309" opacity="0.5"/>
  <circle cx="1110" cy="735" r="4" fill="#9a3309" opacity="0.45"/>
  <circle cx="1180" cy="700" r="3" fill="#c2410c" opacity="0.55"/>
</svg>
