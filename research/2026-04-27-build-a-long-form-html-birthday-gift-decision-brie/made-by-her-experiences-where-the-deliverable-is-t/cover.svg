<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" preserveAspectRatio="xMidYMid slice">
  <defs>
    <radialGradient id="bg" cx="50%" cy="55%" r="70%">
      <stop offset="0%" stop-color="#fef3ec"/>
      <stop offset="60%" stop-color="#f0eadb"/>
      <stop offset="100%" stop-color="#e8dcc4"/>
    </radialGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#fbbf24" stop-opacity="0.55"/>
      <stop offset="60%" stop-color="#d97706" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#d97706" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="vessel" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#d97706"/>
      <stop offset="55%" stop-color="#c2410c"/>
      <stop offset="100%" stop-color="#78350f"/>
    </linearGradient>
    <linearGradient id="vesselShine" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#fbbf24" stop-opacity="0.0"/>
      <stop offset="35%" stop-color="#fbbf24" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#fbbf24" stop-opacity="0.0"/>
    </linearGradient>
    <linearGradient id="bench" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#9a3309" stop-opacity="0.85"/>
      <stop offset="100%" stop-color="#5c2a1a" stop-opacity="0.9"/>
    </linearGradient>
    <linearGradient id="hand" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#c2410c"/>
      <stop offset="100%" stop-color="#78350f"/>
    </linearGradient>
  </defs>

  <!-- full bleed background -->
  <rect width="1600" height="900" fill="url(#bg)"/>

  <!-- atmospheric warm glow behind hero -->
  <circle cx="800" cy="470" r="430" fill="url(#glow)"/>

  <!-- workbench surface (full bleed, decorative) -->
  <rect x="0" y="700" width="1600" height="200" fill="url(#bench)" opacity="0.85"/>
  <rect x="0" y="698" width="1600" height="4" fill="#fbbf24" opacity="0.4"/>

  <!-- pottery wheel disc / turntable under the vessel -->
  <ellipse cx="800" cy="710" rx="320" ry="42" fill="#1a0e0e" opacity="0.35"/>
  <ellipse cx="800" cy="700" rx="300" ry="34" fill="#78350f" opacity="0.85"/>
  <ellipse cx="800" cy="694" rx="280" ry="28" fill="#9a3309" opacity="0.7"/>

  <!-- HERO: thrown vessel / candle / amber jar on the wheel -->
  <path d="M 670 700 Q 660 600 685 540 Q 700 500 700 460 Q 700 430 720 410 L 880 410 Q 900 430 900 460 Q 900 500 915 540 Q 940 600 930 700 Z"
        fill="url(#vessel)"/>
  <!-- vessel rim -->
  <ellipse cx="800" cy="410" rx="90" ry="14" fill="#78350f"/>
  <ellipse cx="800" cy="408" rx="86" ry="10" fill="#1a0e0e" opacity="0.6"/>
  <!-- vessel highlight -->
  <path d="M 700 460 Q 695 540 705 660 L 735 660 Q 728 540 735 470 Z"
        fill="url(#vesselShine)" opacity="0.7"/>

  <!-- stained-glass facet panel behind, top-left of hero (other-craft echo) -->
  <g opacity="0.78">
    <polygon points="380,180 540,150 560,290 400,310" fill="#6d28d9" opacity="0.25"/>
    <polygon points="380,180 540,150 560,290 400,310" fill="none" stroke="#78350f" stroke-width="3"/>
    <polygon points="540,150 660,200 640,310 560,290" fill="#d97706" opacity="0.55"/>
    <polygon points="540,150 660,200 640,310 560,290" fill="none" stroke="#78350f" stroke-width="3"/>
    <polygon points="400,310 560,290 540,420 420,410" fill="#fbbf24" opacity="0.55"/>
    <polygon points="400,310 560,290 540,420 420,410" fill="none" stroke="#78350f" stroke-width="3"/>
    <polygon points="560,290 640,310 620,420 540,420" fill="#c2410c" opacity="0.6"/>
    <polygon points="560,290 640,310 620,420 540,420" fill="none" stroke="#78350f" stroke-width="3"/>
  </g>

  <!-- tufting loop arcs, top-right (other-craft echo) -->
  <g opacity="0.7" fill="none" stroke="#c2410c" stroke-width="6" stroke-linecap="round">
    <path d="M 1080 200 Q 1110 170 1140 200"/>
    <path d="M 1140 200 Q 1170 170 1200 200"/>
    <path d="M 1200 200 Q 1230 170 1260 200"/>
    <path d="M 1080 250 Q 1110 220 1140 250"/>
    <path d="M 1140 250 Q 1170 220 1200 250"/>
    <path d="M 1200 250 Q 1230 220 1260 250"/>
  </g>
  <g opacity="0.55" fill="none" stroke="#d97706" stroke-width="6" stroke-linecap="round">
    <path d="M 1100 300 Q 1130 270 1160 300"/>
    <path d="M 1160 300 Q 1190 270 1220 300"/>
    <path d="M 1220 300 Q 1250 270 1280 300"/>
  </g>

  <!-- HAND coming in from the right, shaping the vessel -->
  <g>
    <!-- forearm/sleeve -->
    <path d="M 1240 540 Q 1180 520 1100 510 Q 1020 505 960 500 Q 920 495 905 470 L 905 460 Q 940 470 1000 470 Q 1080 472 1160 482 Q 1230 492 1290 510 Z"
          fill="url(#hand)" opacity="0.92"/>
    <!-- thumb pressing the vessel -->
    <path d="M 905 470 Q 880 462 870 478 Q 866 492 880 500 Q 905 504 920 492 Z"
          fill="#9a3309"/>
    <!-- highlight along forearm -->
    <path d="M 970 478 Q 1080 480 1200 498" fill="none" stroke="#fbbf24" stroke-width="3" opacity="0.45"/>
  </g>

  <!-- a few perfume / spark droplets rising (motion, ties to perfume + glassblowing) -->
  <circle cx="800" cy="370" r="5" fill="#fbbf24" opacity="0.85"/>
  <circle cx="770" cy="345" r="3" fill="#d97706" opacity="0.7"/>
  <circle cx="830" cy="340" r="4" fill="#fbbf24" opacity="0.7"/>
  <circle cx="755" cy="310" r="2.5" fill="#c2410c" opacity="0.6"/>
  <circle cx="845" cy="305" r="3" fill="#d97706" opacity="0.55"/>

  <!-- small silver-clay ring on the bench (jewellery anchor) -->
  <ellipse cx="430" cy="775" rx="34" ry="10" fill="none" stroke="#78350f" stroke-width="5" opacity="0.85"/>
  <ellipse cx="430" cy="773" rx="34" ry="10" fill="none" stroke="#fbbf24" stroke-width="2" opacity="0.7"/>
</svg>
