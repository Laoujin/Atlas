<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" preserveAspectRatio="xMidYMid slice">
  <defs>
    <radialGradient id="bg" cx="50%" cy="55%" r="70%">
      <stop offset="0%" stop-color="#fef3ec"/>
      <stop offset="100%" stop-color="#f0eadb"/>
    </radialGradient>
    <radialGradient id="hero" cx="45%" cy="40%" r="65%">
      <stop offset="0%" stop-color="#fbbf24"/>
      <stop offset="55%" stop-color="#d97706"/>
      <stop offset="100%" stop-color="#9a3309"/>
    </radialGradient>
    <linearGradient id="ring" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#c2410c" stop-opacity="0.85"/>
      <stop offset="100%" stop-color="#78350f" stop-opacity="0.7"/>
    </linearGradient>
    <linearGradient id="teal" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#0e7490" stop-opacity="0.0"/>
      <stop offset="50%" stop-color="#0e7490" stop-opacity="0.75"/>
      <stop offset="100%" stop-color="#0e7490" stop-opacity="0.0"/>
    </linearGradient>
  </defs>

  <!-- Full-bleed background -->
  <rect x="0" y="0" width="1600" height="900" fill="url(#bg)"/>

  <!-- Outer concentric runtime rings (decoration, partly clipped is fine) -->
  <circle cx="800" cy="450" r="380" fill="none" stroke="#c2410c" stroke-opacity="0.18" stroke-width="2"/>
  <circle cx="800" cy="450" r="320" fill="none" stroke="#c2410c" stroke-opacity="0.28" stroke-width="2"/>

  <!-- Teal velocity arc (release timeline accent) -->
  <path d="M 380 450 A 420 420 0 0 1 1220 450" fill="none" stroke="url(#teal)" stroke-width="3" stroke-linecap="round"/>

  <!-- Hero: rounded bun form, centered at (800, 450), within safe zone -->
  <g>
    <!-- soft shadow underneath -->
    <ellipse cx="800" cy="660" rx="280" ry="22" fill="#78350f" opacity="0.18"/>
    <!-- main bun body -->
    <path d="M 540 510
             Q 540 320 800 320
             Q 1060 320 1060 510
             Q 1060 600 980 620
             Q 800 645 620 620
             Q 540 600 540 510 Z"
          fill="url(#hero)" opacity="0.95"/>
    <!-- top crease highlight -->
    <path d="M 600 430 Q 800 380 1000 430"
          fill="none" stroke="#fbbf24" stroke-opacity="0.55" stroke-width="6" stroke-linecap="round"/>
    <!-- base seam -->
    <path d="M 560 575 Q 800 615 1040 575"
          fill="none" stroke="#5c2a1a" stroke-opacity="0.35" stroke-width="3" stroke-linecap="round"/>
  </g>

  <!-- Orbit ring tilted around the hero -->
  <ellipse cx="800" cy="470" rx="360" ry="90" fill="none" stroke="url(#ring)" stroke-width="3" opacity="0.7"/>

  <!-- Two release-marker nodes on the orbit -->
  <circle cx="445" cy="470" r="9" fill="#c2410c" opacity="0.9"/>
  <circle cx="1155" cy="470" r="11" fill="#0e7490" opacity="0.9"/>

  <!-- Corner decoration (outside safe zone, may crop) -->
  <circle cx="120" cy="120" r="6" fill="#d97706" opacity="0.6"/>
  <circle cx="1480" cy="800" r="8" fill="#c2410c" opacity="0.55"/>
</svg>
