<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#faf8f2"/>
      <stop offset="1" stop-color="#f0eadb"/>
    </linearGradient>
    <linearGradient id="rust" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#d97706"/>
      <stop offset="0.55" stop-color="#c2410c"/>
      <stop offset="1" stop-color="#78350f"/>
    </linearGradient>
    <linearGradient id="rustSoft" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#fbbf24" stop-opacity="0.85"/>
      <stop offset="1" stop-color="#c2410c" stop-opacity="0.9"/>
    </linearGradient>
    <linearGradient id="teal" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0e7490" stop-opacity="0.9"/>
      <stop offset="1" stop-color="#0e7490" stop-opacity="0.65"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.5" r="0.6">
      <stop offset="0" stop-color="#fbbf24" stop-opacity="0.35"/>
      <stop offset="1" stop-color="#fbbf24" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- full-bleed background -->
  <rect width="1600" height="900" fill="url(#bg)"/>
  <rect width="1600" height="900" fill="url(#glow)"/>

  <!-- decorative server-rack slats (cropped freely, no meaning carried) -->
  <g opacity="0.18" fill="#78350f">
    <rect x="60" y="120" width="180" height="14" rx="3"/>
    <rect x="60" y="160" width="180" height="14" rx="3"/>
    <rect x="60" y="200" width="180" height="14" rx="3"/>
    <rect x="60" y="240" width="180" height="14" rx="3"/>
    <rect x="1360" y="660" width="180" height="14" rx="3"/>
    <rect x="1360" y="700" width="180" height="14" rx="3"/>
    <rect x="1360" y="740" width="180" height="14" rx="3"/>
    <rect x="1360" y="780" width="180" height="14" rx="3"/>
  </g>

  <!-- left block: server chassis (teal accent) -->
  <g>
    <rect x="430" y="330" width="360" height="280" rx="14" fill="url(#teal)" opacity="0.85"/>
    <rect x="455" y="360" width="310" height="22" rx="4" fill="#faf8f2" opacity="0.35"/>
    <rect x="455" y="395" width="310" height="22" rx="4" fill="#faf8f2" opacity="0.25"/>
    <rect x="455" y="430" width="310" height="22" rx="4" fill="#faf8f2" opacity="0.18"/>
    <circle cx="475" cy="585" r="7" fill="#fbbf24"/>
    <circle cx="500" cy="585" r="7" fill="#faf8f2" opacity="0.5"/>
    <circle cx="525" cy="585" r="7" fill="#faf8f2" opacity="0.3"/>
  </g>

  <!-- spark trail between blocks -->
  <g fill="#fbbf24">
    <circle cx="810" cy="455" r="4" opacity="0.9"/>
    <circle cx="835" cy="465" r="3" opacity="0.75"/>
    <circle cx="860" cy="448" r="4" opacity="0.85"/>
    <circle cx="885" cy="460" r="2.5" opacity="0.6"/>
    <circle cx="910" cy="452" r="3.5" opacity="0.8"/>
  </g>

  <!-- hero: shield/padlock (rust) interlocking with chassis -->
  <g>
    <path d="M 1080 320
             L 1240 320
             Q 1290 320 1290 370
             L 1290 540
             Q 1290 620 1160 660
             Q 1030 620 1030 540
             L 1030 370
             Q 1030 320 1080 320 Z"
          fill="url(#rust)"/>
    <!-- inner padlock shackle -->
    <path d="M 1115 470
             L 1115 425
             Q 1115 380 1160 380
             Q 1205 380 1205 425
             L 1205 470"
          fill="none" stroke="#faf8f2" stroke-width="14" stroke-linecap="round" opacity="0.85"/>
    <!-- lock body -->
    <rect x="1095" y="465" width="130" height="115" rx="10" fill="#faf8f2" opacity="0.92"/>
    <circle cx="1160" cy="510" r="12" fill="#c2410c"/>
    <rect x="1155" y="515" width="10" height="38" rx="3" fill="#c2410c"/>
  </g>

  <!-- subtle handshake arc tying server to lock -->
  <path d="M 790 470 Q 935 360 1030 460" fill="none" stroke="url(#rustSoft)" stroke-width="6" stroke-linecap="round" opacity="0.55"/>
</svg>
