<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#faf8f2"/>
      <stop offset="1" stop-color="#f0eadb"/>
    </linearGradient>
    <linearGradient id="rust" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#d97706"/>
      <stop offset="1" stop-color="#9a3309"/>
    </linearGradient>
    <linearGradient id="rustHero" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#c2410c"/>
      <stop offset="1" stop-color="#78350f"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#fbbf24" stop-opacity="0.45"/>
      <stop offset="1" stop-color="#fbbf24" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Full-bleed background -->
  <rect width="1600" height="900" fill="url(#bg)"/>
  <ellipse cx="900" cy="460" rx="620" ry="380" fill="url(#glow)"/>

  <!-- Stacked angled terminal/page panels -->
  <g transform="translate(800 470) rotate(-8)">
    <rect x="-380" y="-220" width="760" height="440" rx="14" fill="#78350f" opacity="0.78"/>
    <rect x="-380" y="-220" width="760" height="44" rx="14" fill="#5c2a1a" opacity="0.9"/>
  </g>

  <g transform="translate(820 450) rotate(-2)">
    <rect x="-400" y="-230" width="800" height="460" rx="14" fill="#0e7490" opacity="0.82"/>
    <rect x="-400" y="-230" width="800" height="46" rx="14" fill="#0b5d72" opacity="0.95"/>
    <!-- faint code-line bars -->
    <rect x="-360" y="-150" width="380" height="14" rx="5" fill="#faf8f2" opacity="0.22"/>
    <rect x="-360" y="-118" width="540" height="14" rx="5" fill="#faf8f2" opacity="0.18"/>
    <rect x="-360" y="-86"  width="280" height="14" rx="5" fill="#faf8f2" opacity="0.22"/>
    <rect x="-360" y="-54"  width="460" height="14" rx="5" fill="#faf8f2" opacity="0.16"/>
    <rect x="-360" y="-22"  width="340" height="14" rx="5" fill="#faf8f2" opacity="0.20"/>
    <rect x="-360" y="10"   width="500" height="14" rx="5" fill="#faf8f2" opacity="0.16"/>
  </g>

  <!-- Hero: rust panel with magnifying-glass accent (ripgrep = ripping search) -->
  <g transform="translate(840 430) rotate(4)">
    <rect x="-420" y="-240" width="840" height="480" rx="16" fill="url(#rustHero)"/>
    <rect x="-420" y="-240" width="840" height="48" rx="16" fill="#5c2a1a" opacity="0.6"/>
    <!-- window dots -->
    <circle cx="-388" cy="-216" r="9" fill="#fbbf24" opacity="0.85"/>
    <circle cx="-358" cy="-216" r="9" fill="#fbbf24" opacity="0.55"/>
    <circle cx="-328" cy="-216" r="9" fill="#fbbf24" opacity="0.35"/>

    <!-- magnifier ring -->
    <circle cx="80" cy="40" r="135" fill="none" stroke="#fef3ec" stroke-width="22" opacity="0.92"/>
    <circle cx="80" cy="40" r="135" fill="#fbbf24" opacity="0.12"/>
    <!-- handle -->
    <rect x="195" y="150" width="170" height="34" rx="17" fill="#fef3ec" opacity="0.92" transform="rotate(40 195 150)"/>

    <!-- highlighted "match" bar inside the lens area -->
    <rect x="-260" y="30" width="220" height="20" rx="6" fill="#fbbf24" opacity="0.85"/>
    <rect x="-260" y="-10" width="320" height="14" rx="5" fill="#fef3ec" opacity="0.35"/>
    <rect x="-260" y="70"  width="180" height="14" rx="5" fill="#fef3ec" opacity="0.35"/>
  </g>
</svg>
