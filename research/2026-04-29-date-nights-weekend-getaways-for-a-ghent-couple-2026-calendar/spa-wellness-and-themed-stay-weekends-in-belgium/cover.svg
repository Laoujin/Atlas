<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#1a0e0e"/>
      <stop offset="0.55" stop-color="#5c2a1a"/>
      <stop offset="1" stop-color="#9a3309"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#fbbf24" stop-opacity="0.85"/>
      <stop offset="0.4" stop-color="#d97706" stop-opacity="0.4"/>
      <stop offset="1" stop-color="#d97706" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="window" cx="0.5" cy="0.5" r="0.6">
      <stop offset="0" stop-color="#fbbf24"/>
      <stop offset="1" stop-color="#d97706"/>
    </radialGradient>
    <linearGradient id="steam" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0" stop-color="#faf8f2" stop-opacity="0.55"/>
      <stop offset="1" stop-color="#faf8f2" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Full-bleed sky -->
  <rect width="1600" height="900" fill="url(#sky)"/>

  <!-- Setting-sun glow behind cabin -->
  <circle cx="820" cy="520" r="380" fill="url(#glow)"/>

  <!-- Far hills -->
  <path d="M0 620 Q 300 540 600 590 T 1200 570 T 1600 600 L 1600 900 L 0 900 Z"
        fill="#5c2a1a" opacity="0.75"/>

  <!-- Mid hills -->
  <path d="M0 700 Q 250 640 520 680 T 1050 670 T 1600 700 L 1600 900 L 0 900 Z"
        fill="#3a1a10" opacity="0.85"/>

  <!-- Steam wisps rising beside cabin -->
  <path d="M650 620 Q 640 560 660 510 Q 680 460 660 410" stroke="url(#steam)" stroke-width="22" fill="none" stroke-linecap="round" opacity="0.7"/>
  <path d="M690 640 Q 700 580 685 530 Q 670 480 695 430" stroke="url(#steam)" stroke-width="16" fill="none" stroke-linecap="round" opacity="0.55"/>
  <path d="M945 620 Q 955 560 940 510 Q 925 460 950 410" stroke="url(#steam)" stroke-width="20" fill="none" stroke-linecap="round" opacity="0.6"/>

  <!-- Treehouse cabin: stilts -->
  <rect x="755" y="560" width="14" height="170" fill="#1a0e0e"/>
  <rect x="830" y="560" width="14" height="170" fill="#1a0e0e"/>
  <rect x="792" y="560" width="14" height="170" fill="#1a0e0e"/>

  <!-- Cabin body -->
  <rect x="720" y="450" width="160" height="120" fill="#78350f"/>
  <!-- Cabin pitched roof -->
  <path d="M700 460 L 800 380 L 900 460 Z" fill="#1a0e0e"/>
  <!-- Roof overhang shadow -->
  <rect x="710" y="455" width="180" height="10" fill="#1a0e0e" opacity="0.7"/>

  <!-- Warm window -->
  <rect x="765" y="485" width="70" height="55" fill="url(#window)"/>
  <!-- Window mullions -->
  <rect x="797" y="485" width="4" height="55" fill="#78350f" opacity="0.8"/>
  <rect x="765" y="510" width="70" height="3" fill="#78350f" opacity="0.8"/>

  <!-- Small chimney with faint smoke -->
  <rect x="850" y="395" width="14" height="35" fill="#1a0e0e"/>
  <path d="M857 390 Q 870 360 855 330 Q 840 300 865 270" stroke="url(#steam)" stroke-width="10" fill="none" stroke-linecap="round" opacity="0.5"/>

  <!-- Pine tree silhouettes flanking the cabin -->
  <path d="M580 730 L 600 600 L 615 640 L 625 580 L 640 630 L 650 590 L 660 730 Z" fill="#1a0e0e" opacity="0.95"/>
  <path d="M540 750 L 555 640 L 568 670 L 578 620 L 590 660 L 600 750 Z" fill="#1a0e0e" opacity="0.9"/>
  <path d="M970 720 L 985 600 L 998 640 L 1010 580 L 1022 630 L 1032 590 L 1045 720 Z" fill="#1a0e0e" opacity="0.95"/>
  <path d="M1050 740 L 1065 650 L 1078 680 L 1088 630 L 1100 670 L 1110 740 Z" fill="#1a0e0e" opacity="0.9"/>

  <!-- Foreground hill / ground -->
  <path d="M0 780 Q 400 740 800 760 T 1600 770 L 1600 900 L 0 900 Z"
        fill="#0e0606"/>

  <!-- Hot tub hint: small warm pool reflection in foreground -->
  <ellipse cx="800" cy="810" rx="140" ry="14" fill="#d97706" opacity="0.35"/>
  <ellipse cx="800" cy="810" rx="90" ry="8" fill="#fbbf24" opacity="0.4"/>
</svg>
