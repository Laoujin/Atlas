<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#fef3ec"/>
      <stop offset="0.55" stop-color="#fbbf24" stop-opacity="0.35"/>
      <stop offset="1" stop-color="#d97706" stop-opacity="0.55"/>
    </linearGradient>
    <radialGradient id="sun" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#fbbf24"/>
      <stop offset="0.6" stop-color="#d97706"/>
      <stop offset="1" stop-color="#9a3309"/>
    </radialGradient>
    <linearGradient id="ground" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#78350f" stop-opacity="0.85"/>
      <stop offset="1" stop-color="#5c2a1a" stop-opacity="0.95"/>
    </linearGradient>
    <linearGradient id="rail" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#fbbf24" stop-opacity="0.9"/>
      <stop offset="1" stop-color="#c2410c" stop-opacity="0.95"/>
    </linearGradient>
  </defs>

  <!-- full-bleed sky -->
  <rect width="1600" height="900" fill="url(#sky)"/>

  <!-- distant city silhouettes (decorative, near horizon) -->
  <g opacity="0.35" fill="#9a3309">
    <rect x="220" y="430" width="60" height="80"/>
    <rect x="285" y="410" width="40" height="100"/>
    <polygon points="330,510 350,400 370,510"/>
    <rect x="380" y="440" width="50" height="70"/>
    <rect x="1170" y="425" width="45" height="85"/>
    <rect x="1220" y="445" width="60" height="65"/>
    <polygon points="1290,510 1310,395 1330,510"/>
    <rect x="1340" y="430" width="50" height="80"/>
  </g>

  <!-- horizon ground -->
  <rect x="0" y="510" width="1600" height="390" fill="url(#ground)"/>

  <!-- hero: sun on the horizon -->
  <circle cx="800" cy="490" r="150" fill="url(#sun)" opacity="0.95"/>
  <circle cx="800" cy="490" r="180" fill="none" stroke="#d97706" stroke-width="2" opacity="0.4"/>
  <circle cx="800" cy="490" r="215" fill="none" stroke="#d97706" stroke-width="1.5" opacity="0.25"/>

  <!-- converging rails toward the sun -->
  <g stroke="url(#rail)" stroke-linecap="round" fill="none">
    <line x1="200" y1="820" x2="760" y2="510" stroke-width="9"/>
    <line x1="320" y1="820" x2="780" y2="510" stroke-width="9"/>
    <line x1="1400" y1="820" x2="840" y2="510" stroke-width="9"/>
    <line x1="1280" y1="820" x2="820" y2="510" stroke-width="9"/>
  </g>

  <!-- railway ties (sleepers) crossing the rails -->
  <g stroke="#fbbf24" stroke-linecap="round" opacity="0.7">
    <line x1="240" y1="810" x2="380" y2="810" stroke-width="6"/>
    <line x1="320" y1="740" x2="430" y2="740" stroke-width="5"/>
    <line x1="390" y1="680" x2="475" y2="680" stroke-width="4.5"/>
    <line x1="450" y1="625" x2="520" y2="625" stroke-width="4"/>
    <line x1="505" y1="580" x2="560" y2="580" stroke-width="3.5"/>
    <line x1="555" y1="545" x2="600" y2="545" stroke-width="3"/>

    <line x1="1220" y1="810" x2="1360" y2="810" stroke-width="6"/>
    <line x1="1170" y1="740" x2="1280" y2="740" stroke-width="5"/>
    <line x1="1125" y1="680" x2="1210" y2="680" stroke-width="4.5"/>
    <line x1="1080" y1="625" x2="1150" y2="625" stroke-width="4"/>
    <line x1="1040" y1="580" x2="1095" y2="580" stroke-width="3.5"/>
    <line x1="1000" y1="545" x2="1045" y2="545" stroke-width="3"/>
  </g>

  <!-- soft glow over the horizon line -->
  <ellipse cx="800" cy="510" rx="500" ry="20" fill="#fbbf24" opacity="0.35"/>
</svg>
