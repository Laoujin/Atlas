<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#1a0e0e"/>
      <stop offset="0.55" stop-color="#5c2a1a"/>
      <stop offset="1" stop-color="#78350f"/>
    </linearGradient>
    <radialGradient id="glowA" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#fbbf24" stop-opacity="0.95"/>
      <stop offset="0.35" stop-color="#d97706" stop-opacity="0.55"/>
      <stop offset="1" stop-color="#c2410c" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowB" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#fef3ec" stop-opacity="0.9"/>
      <stop offset="0.35" stop-color="#fbbf24" stop-opacity="0.5"/>
      <stop offset="1" stop-color="#9a3309" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="lantA" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#fbbf24"/>
      <stop offset="1" stop-color="#c2410c"/>
    </linearGradient>
    <linearGradient id="lantB" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#fef3ec"/>
      <stop offset="1" stop-color="#d97706"/>
    </linearGradient>
    <radialGradient id="ground" cx="0.5" cy="1" r="0.7">
      <stop offset="0" stop-color="#9a3309" stop-opacity="0.45"/>
      <stop offset="1" stop-color="#1a0e0e" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1600" height="900" fill="url(#sky)"/>
  <rect y="600" width="1600" height="300" fill="url(#ground)"/>

  <!-- distant horizon hills -->
  <path d="M0 640 Q 320 580 600 615 T 1200 600 T 1600 625 L 1600 700 L 0 700 Z" fill="#1a0e0e" opacity="0.55"/>
  <path d="M0 680 Q 400 640 800 660 T 1600 670 L 1600 750 L 0 750 Z" fill="#1a0e0e" opacity="0.7"/>

  <!-- soft halos behind lanterns -->
  <circle cx="640" cy="430" r="280" fill="url(#glowA)"/>
  <circle cx="960" cy="400" r="260" fill="url(#glowB)"/>

  <!-- thin string between lanterns -->
  <path d="M 540 360 Q 800 470 1060 340" stroke="#78350f" stroke-width="2" fill="none" opacity="0.7"/>

  <!-- lantern A (warmer, lower) -->
  <g opacity="0.95">
    <path d="M 620 360 Q 600 360 600 380 L 600 470 Q 600 510 640 510 L 700 510 Q 740 510 740 470 L 740 380 Q 740 360 720 360 Z" fill="url(#lantA)"/>
    <rect x="608" y="350" width="124" height="14" rx="3" fill="#78350f"/>
    <rect x="608" y="510" width="124" height="14" rx="3" fill="#78350f"/>
    <path d="M 670 350 L 670 320 Q 670 305 690 305" stroke="#78350f" stroke-width="3" fill="none"/>
    <line x1="640" y1="364" x2="640" y2="510" stroke="#9a3309" stroke-width="1.5" opacity="0.6"/>
    <line x1="700" y1="364" x2="700" y2="510" stroke="#9a3309" stroke-width="1.5" opacity="0.6"/>
  </g>

  <!-- lantern B (paler, slightly higher, smaller) -->
  <g opacity="0.92">
    <path d="M 935 290 Q 918 290 918 308 L 918 388 Q 918 422 952 422 L 1004 422 Q 1038 422 1038 388 L 1038 308 Q 1038 290 1021 290 Z" fill="url(#lantB)"/>
    <rect x="924" y="282" width="108" height="12" rx="3" fill="#78350f"/>
    <rect x="924" y="422" width="108" height="12" rx="3" fill="#78350f"/>
    <path d="M 978 282 L 978 256 Q 978 244 960 244" stroke="#78350f" stroke-width="3" fill="none"/>
    <line x1="952" y1="294" x2="952" y2="422" stroke="#9a3309" stroke-width="1.2" opacity="0.55"/>
    <line x1="1004" y1="294" x2="1004" y2="422" stroke="#9a3309" stroke-width="1.2" opacity="0.55"/>
  </g>

  <!-- floating embers / drifting sparks tied to the lanterns -->
  <circle cx="560" cy="280" r="3" fill="#fbbf24" opacity="0.85"/>
  <circle cx="500" cy="220" r="2" fill="#fef3ec" opacity="0.7"/>
  <circle cx="780" cy="200" r="2.5" fill="#fbbf24" opacity="0.75"/>
  <circle cx="880" cy="170" r="2" fill="#fef3ec" opacity="0.6"/>
  <circle cx="1100" cy="220" r="3" fill="#fbbf24" opacity="0.8"/>
  <circle cx="1180" cy="160" r="2" fill="#fef3ec" opacity="0.7"/>
  <circle cx="430" cy="340" r="2" fill="#d97706" opacity="0.75"/>
  <circle cx="1240" cy="320" r="2.5" fill="#fbbf24" opacity="0.7"/>

  <!-- faint travel trail along the horizon (suggesting a route / rail glow) -->
  <path d="M 80 720 Q 500 700 800 712 T 1520 715" stroke="#d97706" stroke-width="1.5" fill="none" opacity="0.45"/>
  <path d="M 80 730 Q 500 712 800 722 T 1520 728" stroke="#fbbf24" stroke-width="0.8" fill="none" opacity="0.3"/>
</svg>
