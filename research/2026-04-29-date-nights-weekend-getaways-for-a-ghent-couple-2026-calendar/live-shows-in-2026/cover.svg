<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" preserveAspectRatio="xMidYMid slice">
  <defs>
    <radialGradient id="stage" cx="50%" cy="55%" r="55%">
      <stop offset="0%" stop-color="#fbbf24" stop-opacity="0.95"/>
      <stop offset="35%" stop-color="#d97706" stop-opacity="0.7"/>
      <stop offset="75%" stop-color="#78350f" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#1a0e0e" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a0e0e"/>
      <stop offset="100%" stop-color="#5c2a1a"/>
    </linearGradient>
    <linearGradient id="curtainL" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#9a3309"/>
      <stop offset="50%" stop-color="#c2410c"/>
      <stop offset="100%" stop-color="#78350f"/>
    </linearGradient>
    <linearGradient id="curtainR" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#78350f"/>
      <stop offset="50%" stop-color="#c2410c"/>
      <stop offset="100%" stop-color="#9a3309"/>
    </linearGradient>
    <linearGradient id="beam" x1="0.5" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="#fbbf24" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#fbbf24" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Full-bleed evening backdrop -->
  <rect width="1600" height="900" fill="url(#bg)"/>

  <!-- Spotlight beams from above (decorative, partially clipped on detail crop) -->
  <polygon points="800,80 560,900 1040,900" fill="url(#beam)" opacity="0.7"/>
  <polygon points="800,80 380,900 1220,900" fill="url(#beam)" opacity="0.35"/>

  <!-- Stage glow (hero anchor) -->
  <ellipse cx="800" cy="560" rx="620" ry="280" fill="url(#stage)"/>

  <!-- Left curtain drape -->
  <path d="M 140,90 Q 240,400 200,810 L 360,810 Q 340,420 420,90 Z" fill="url(#curtainL)" opacity="0.9"/>
  <path d="M 200,90 Q 280,420 260,810 L 300,810 Q 300,420 340,90 Z" fill="#78350f" opacity="0.55"/>

  <!-- Right curtain drape -->
  <path d="M 1460,90 Q 1360,400 1400,810 L 1240,810 Q 1260,420 1180,90 Z" fill="url(#curtainR)" opacity="0.9"/>
  <path d="M 1400,90 Q 1320,420 1340,810 L 1300,810 Q 1300,420 1260,90 Z" fill="#78350f" opacity="0.55"/>

  <!-- Top valance -->
  <path d="M 90,90 Q 400,200 800,170 Q 1200,200 1510,90 L 1510,90 L 90,90 Z" fill="#9a3309" opacity="0.85"/>
  <path d="M 90,90 Q 250,210 380,170 Q 500,210 620,170 Q 750,210 880,170 Q 1010,210 1130,170 Q 1260,210 1510,90 L 1510,90 Z" fill="#c2410c" opacity="0.6"/>

  <!-- Hero star: stage spotlight orb -->
  <circle cx="800" cy="450" r="90" fill="#fbbf24" opacity="0.95"/>
  <circle cx="800" cy="450" r="140" fill="#fbbf24" opacity="0.25"/>
  <circle cx="800" cy="450" r="55" fill="#fef3ec" opacity="0.85"/>
</svg>
