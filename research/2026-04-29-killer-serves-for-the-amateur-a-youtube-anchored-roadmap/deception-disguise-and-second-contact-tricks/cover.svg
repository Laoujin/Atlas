<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" preserveAspectRatio="xMidYMid slice">
  <defs>
    <radialGradient id="bg" cx="50%" cy="55%" r="70%">
      <stop offset="0%" stop-color="#fef3ec"/>
      <stop offset="100%" stop-color="#f0eadb"/>
    </radialGradient>
    <radialGradient id="paddle" cx="40%" cy="35%" r="70%">
      <stop offset="0%" stop-color="#d97706"/>
      <stop offset="55%" stop-color="#c2410c"/>
      <stop offset="100%" stop-color="#78350f"/>
    </radialGradient>
    <linearGradient id="handle" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#9a3309"/>
      <stop offset="100%" stop-color="#78350f"/>
    </linearGradient>
    <radialGradient id="ball" cx="35%" cy="35%" r="65%">
      <stop offset="0%" stop-color="#fbbf24"/>
      <stop offset="100%" stop-color="#d97706"/>
    </radialGradient>
    <radialGradient id="ghost" cx="40%" cy="35%" r="70%">
      <stop offset="0%" stop-color="#c2410c" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#78350f" stop-opacity="0.15"/>
    </radialGradient>
  </defs>

  <rect width="1600" height="900" fill="url(#bg)"/>

  <!-- horizon / table line, full bleed -->
  <line x1="0" y1="640" x2="1600" y2="640" stroke="#9a3309" stroke-width="1.5" opacity="0.25"/>

  <!-- ghost paddle (the "fake" motion) -->
  <g opacity="0.7" transform="translate(560 470) rotate(-18)">
    <rect x="-18" y="80" width="36" height="170" rx="10" fill="url(#handle)" opacity="0.35"/>
    <ellipse cx="0" cy="0" rx="135" ry="155" fill="url(#ghost)"/>
  </g>

  <!-- main paddle (the real contact) -->
  <g transform="translate(640 430) rotate(22)">
    <rect x="-22" y="95" width="44" height="200" rx="12" fill="url(#handle)"/>
    <ellipse cx="0" cy="0" rx="150" ry="170" fill="url(#paddle)"/>
    <ellipse cx="-40" cy="-50" rx="55" ry="40" fill="#fbbf24" opacity="0.18"/>
  </g>

  <!-- divergent trajectories from contact point (~840, 380) -->
  <!-- upper arc: long, fast outcome -->
  <path d="M 840 380 Q 1080 240 1340 320"
        stroke="#c2410c" stroke-width="4" fill="none"
        stroke-dasharray="2 10" stroke-linecap="round" opacity="0.85"/>
  <!-- lower arc: short, heavy backspin outcome -->
  <path d="M 840 380 Q 1020 560 1280 600"
        stroke="#9a3309" stroke-width="4" fill="none"
        stroke-dasharray="2 10" stroke-linecap="round" opacity="0.85"/>

  <!-- bounce marks on the table line -->
  <ellipse cx="1110" cy="640" rx="14" ry="3" fill="#78350f" opacity="0.45"/>
  <ellipse cx="1180" cy="640" rx="10" ry="2.5" fill="#78350f" opacity="0.35"/>

  <!-- contact ball (the single moment that branches) -->
  <circle cx="840" cy="380" r="28" fill="url(#ball)"/>
  <circle cx="831" cy="371" r="9" fill="#fef3ec" opacity="0.7"/>

  <!-- outcome balls, faint -->
  <circle cx="1340" cy="320" r="18" fill="url(#ball)" opacity="0.55"/>
  <circle cx="1280" cy="600" r="18" fill="url(#ball)" opacity="0.55"/>
</svg>
