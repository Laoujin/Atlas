<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#fef3ec"/>
      <stop offset="1" stop-color="#f0eadb"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.5" r="0.6">
      <stop offset="0" stop-color="#fbbf24" stop-opacity="0.35"/>
      <stop offset="1" stop-color="#fbbf24" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="blade" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#c2410c"/>
      <stop offset="1" stop-color="#78350f"/>
    </linearGradient>
    <linearGradient id="bladeRim" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#9a3309"/>
      <stop offset="1" stop-color="#5c2a1a"/>
    </linearGradient>
    <linearGradient id="handle" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#78350f"/>
      <stop offset="0.5" stop-color="#9a3309"/>
      <stop offset="1" stop-color="#78350f"/>
    </linearGradient>
    <radialGradient id="ball" cx="0.35" cy="0.35" r="0.7">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="0.7" stop-color="#fef3ec"/>
      <stop offset="1" stop-color="#d97706"/>
    </radialGradient>
  </defs>

  <rect width="1600" height="900" fill="url(#bg)"/>
  <ellipse cx="800" cy="500" rx="700" ry="380" fill="url(#glow)"/>

  <!-- spin trails: curved arcs around the ball suggesting deceptive sidespin -->
  <g fill="none" stroke="#c2410c" stroke-linecap="round" opacity="0.55">
    <path d="M 1140 290 Q 1280 360 1230 500" stroke-width="6"/>
    <path d="M 1180 250 Q 1340 340 1290 520" stroke-width="4" opacity="0.7"/>
    <path d="M 1100 250 Q 1240 310 1200 460" stroke-width="3" opacity="0.6"/>
  </g>
  <g fill="none" stroke="#9a3309" stroke-linecap="round" opacity="0.4">
    <path d="M 1090 580 Q 1240 620 1310 540" stroke-width="4"/>
    <path d="M 1070 620 Q 1230 680 1340 580" stroke-width="3"/>
  </g>

  <!-- paddle: rotated as if mid-serve contact -->
  <g transform="rotate(-28 720 470)">
    <!-- handle -->
    <rect x="380" y="445" width="240" height="56" rx="14" fill="url(#handle)"/>
    <rect x="380" y="445" width="240" height="10" rx="5" fill="#5c2a1a" opacity="0.5"/>
    <rect x="380" y="491" width="240" height="10" rx="5" fill="#5c2a1a" opacity="0.5"/>
    <!-- blade rim -->
    <ellipse cx="780" cy="473" rx="220" ry="200" fill="url(#bladeRim)"/>
    <!-- rubber surface -->
    <ellipse cx="780" cy="470" rx="206" ry="186" fill="url(#blade)"/>
    <!-- subtle highlight -->
    <ellipse cx="710" cy="400" rx="80" ry="50" fill="#fbbf24" opacity="0.18"/>
  </g>

  <!-- ball: centered in safe zone, mid-flight -->
  <circle cx="1160" cy="420" r="62" fill="url(#ball)"/>
  <ellipse cx="1140" cy="400" rx="20" ry="14" fill="#ffffff" opacity="0.7"/>

  <!-- table edge hint: thin baseline strip, decorative -->
  <rect x="0" y="780" width="1600" height="6" fill="#9a3309" opacity="0.3"/>
  <rect x="0" y="790" width="1600" height="2" fill="#c2410c" opacity="0.4"/>
</svg>
