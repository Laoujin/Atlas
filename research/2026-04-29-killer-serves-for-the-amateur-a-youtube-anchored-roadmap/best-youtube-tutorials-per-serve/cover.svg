<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#fef3ec"/>
      <stop offset="1" stop-color="#f0eadb"/>
    </linearGradient>
    <radialGradient id="blade" cx="0.4" cy="0.4" r="0.7">
      <stop offset="0" stop-color="#d97706"/>
      <stop offset="0.6" stop-color="#c2410c"/>
      <stop offset="1" stop-color="#78350f"/>
    </radialGradient>
    <linearGradient id="handle" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#9a3309"/>
      <stop offset="1" stop-color="#5c2a1a"/>
    </linearGradient>
    <radialGradient id="ball" cx="0.35" cy="0.35" r="0.7">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="0.7" stop-color="#fbbf24"/>
      <stop offset="1" stop-color="#d97706"/>
    </radialGradient>
  </defs>

  <rect width="1600" height="900" fill="url(#bg)"/>

  <!-- table edge suggestion, full bleed -->
  <rect x="0" y="730" width="1600" height="6" fill="#c2410c" opacity="0.35"/>
  <rect x="0" y="745" width="1600" height="2" fill="#78350f" opacity="0.25"/>

  <!-- spin trajectory arcs (the serve curving in) -->
  <path d="M 380 250 Q 700 180 980 380" stroke="#c2410c" stroke-width="4" fill="none" opacity="0.55" stroke-dasharray="2 12" stroke-linecap="round"/>
  <path d="M 360 320 Q 680 260 980 440" stroke="#9a3309" stroke-width="3" fill="none" opacity="0.45" stroke-dasharray="2 14" stroke-linecap="round"/>
  <path d="M 400 200 Q 720 140 1000 340" stroke="#d97706" stroke-width="3" fill="none" opacity="0.5" stroke-dasharray="2 10" stroke-linecap="round"/>

  <!-- paddle, angled (hero left) -->
  <g transform="translate(800 470) rotate(-22)">
    <!-- handle -->
    <rect x="-30" y="120" width="60" height="220" rx="14" fill="url(#handle)"/>
    <rect x="-22" y="135" width="44" height="200" rx="8" fill="#78350f" opacity="0.4"/>
    <!-- blade -->
    <ellipse cx="0" cy="0" rx="220" ry="240" fill="url(#blade)"/>
    <ellipse cx="0" cy="0" rx="200" ry="220" fill="#9a3309" opacity="0.35"/>
    <ellipse cx="-60" cy="-70" rx="80" ry="60" fill="#fbbf24" opacity="0.18"/>
  </g>

  <!-- ball mid-flight (hero focal point) -->
  <g transform="translate(1080 380)">
    <ellipse cx="6" cy="58" rx="58" ry="10" fill="#78350f" opacity="0.18"/>
    <circle r="58" fill="url(#ball)"/>
    <circle r="58" fill="none" stroke="#c2410c" stroke-width="1.5" opacity="0.4"/>
    <!-- spin curl indicator -->
    <path d="M -28 -10 Q 0 -42 28 -10" stroke="#c2410c" stroke-width="2.5" fill="none" opacity="0.55" stroke-linecap="round"/>
    <path d="M -22 12 Q 0 -16 22 12" stroke="#9a3309" stroke-width="2" fill="none" opacity="0.4" stroke-linecap="round"/>
  </g>

  <!-- soft warm glow behind hero -->
  <circle cx="900" cy="430" r="380" fill="#fbbf24" opacity="0.08"/>
</svg>
