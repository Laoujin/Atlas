<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#fef3ec"/>
      <stop offset="1" stop-color="#f0eadb"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.5" r="0.6">
      <stop offset="0" stop-color="#fbbf24" stop-opacity="0.35"/>
      <stop offset="1" stop-color="#fbbf24" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="paddle" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#c2410c"/>
      <stop offset="1" stop-color="#78350f"/>
    </linearGradient>
    <linearGradient id="paddleBack" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#9a3309"/>
      <stop offset="1" stop-color="#5c2a1a"/>
    </linearGradient>
    <linearGradient id="handle" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#78350f"/>
      <stop offset="1" stop-color="#5c2a1a"/>
    </linearGradient>
    <radialGradient id="ball" cx="0.35" cy="0.35" r="0.7">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="0.6" stop-color="#fbbf24"/>
      <stop offset="1" stop-color="#d97706"/>
    </radialGradient>
  </defs>

  <!-- full bleed background -->
  <rect width="1600" height="900" fill="url(#bg)"/>
  <ellipse cx="800" cy="500" rx="900" ry="450" fill="url(#glow)"/>

  <!-- table edge: subtle horizon line, full bleed decoration -->
  <rect x="0" y="640" width="1600" height="6" fill="#9a3309" opacity="0.55"/>
  <rect x="0" y="650" width="1600" height="2" fill="#78350f" opacity="0.35"/>

  <!-- net hint (decorative, low opacity) -->
  <rect x="780" y="560" width="40" height="80" fill="#5c2a1a" opacity="0.18"/>
  <line x1="780" y1="560" x2="820" y2="560" stroke="#5c2a1a" stroke-width="3" opacity="0.35"/>

  <!-- bounce arcs: practice progression, three trajectories -->
  <path d="M 280 640 Q 520 380 760 640" stroke="#c2410c" stroke-width="3" fill="none" opacity="0.45" stroke-dasharray="6 8"/>
  <path d="M 760 640 Q 1000 420 1240 640" stroke="#c2410c" stroke-width="3" fill="none" opacity="0.55" stroke-dasharray="6 8"/>
  <path d="M 380 640 Q 620 300 860 640" stroke="#d97706" stroke-width="2.5" fill="none" opacity="0.35" stroke-dasharray="4 10"/>

  <!-- HERO: paddle, tilted, centered around (800, 450) -->
  <g transform="translate(800 450) rotate(-22)">
    <!-- handle -->
    <rect x="-28" y="120" width="56" height="190" rx="14" fill="url(#handle)"/>
    <rect x="-28" y="120" width="56" height="190" rx="14" fill="none" stroke="#3d1a0a" stroke-width="2" opacity="0.5"/>
    <!-- handle grip stripes -->
    <rect x="-28" y="160" width="56" height="6" fill="#3d1a0a" opacity="0.4"/>
    <rect x="-28" y="220" width="56" height="6" fill="#3d1a0a" opacity="0.4"/>
    <rect x="-28" y="280" width="56" height="6" fill="#3d1a0a" opacity="0.4"/>
    <!-- blade rim -->
    <ellipse cx="0" cy="0" rx="195" ry="210" fill="#3d1a0a" opacity="0.85"/>
    <!-- rubber face -->
    <ellipse cx="0" cy="-6" rx="178" ry="195" fill="url(#paddle)"/>
    <!-- rubber sheen -->
    <ellipse cx="-55" cy="-80" rx="70" ry="100" fill="#fef3ec" opacity="0.12"/>
  </g>

  <!-- ball: arcing in toward paddle, hero-adjacent -->
  <circle cx="1130" cy="305" r="34" fill="url(#ball)" opacity="0.95"/>
  <circle cx="1130" cy="305" r="34" fill="none" stroke="#9a3309" stroke-width="1.5" opacity="0.4"/>
  <!-- ball motion trail -->
  <circle cx="1200" cy="260" r="6" fill="#fbbf24" opacity="0.5"/>
  <circle cx="1250" cy="225" r="4" fill="#fbbf24" opacity="0.35"/>
  <circle cx="1290" cy="195" r="3" fill="#fbbf24" opacity="0.22"/>
</svg>
