<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#faf8f2"/>
      <stop offset="1" stop-color="#f0eadb"/>
    </linearGradient>
    <linearGradient id="chassis" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#475569"/>
      <stop offset="1" stop-color="#334155"/>
    </linearGradient>
    <linearGradient id="bay" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#1e293b"/>
      <stop offset="1" stop-color="#0f172a"/>
    </linearGradient>
    <linearGradient id="hero" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#d97706"/>
      <stop offset="0.5" stop-color="#c2410c"/>
      <stop offset="1" stop-color="#78350f"/>
    </linearGradient>
    <radialGradient id="led" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#fbbf24"/>
      <stop offset="1" stop-color="#fbbf24" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow" cx="0.5" cy="0.5" r="0.6">
      <stop offset="0" stop-color="#d97706" stop-opacity="0.18"/>
      <stop offset="1" stop-color="#d97706" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1600" height="900" fill="url(#bg)"/>
  <ellipse cx="800" cy="470" rx="700" ry="380" fill="url(#glow)"/>

  <!-- back chassis (faint, offset) -->
  <g opacity="0.45" transform="translate(60,40) skewY(-4)">
    <rect x="420" y="220" width="760" height="380" rx="10" fill="url(#chassis)"/>
    <rect x="450" y="250" width="700" height="68" rx="4" fill="url(#bay)"/>
    <rect x="450" y="332" width="700" height="68" rx="4" fill="url(#bay)"/>
    <rect x="450" y="414" width="700" height="68" rx="4" fill="url(#bay)"/>
    <rect x="450" y="496" width="700" height="68" rx="4" fill="url(#bay)"/>
  </g>

  <!-- hero chassis -->
  <g transform="translate(0,0) skewY(-3)">
    <rect x="380" y="290" width="840" height="420" rx="12" fill="url(#chassis)" opacity="0.95"/>
    <rect x="380" y="290" width="840" height="14" rx="6" fill="#64748b" opacity="0.7"/>
    <rect x="380" y="696" width="840" height="14" rx="6" fill="#1e293b" opacity="0.8"/>

    <!-- drive bays -->
    <rect x="410" y="320" width="780" height="80" rx="5" fill="url(#bay)"/>
    <rect x="410" y="412" width="780" height="80" rx="5" fill="url(#bay)"/>
    <rect x="410" y="504" width="780" height="80" rx="5" fill="url(#bay)"/>
    <rect x="410" y="596" width="780" height="80" rx="5" fill="url(#bay)"/>

    <!-- bay separators / handles -->
    <rect x="430" y="340" width="60" height="40" rx="3" fill="#334155" opacity="0.85"/>
    <rect x="430" y="432" width="60" height="40" rx="3" fill="#334155" opacity="0.85"/>
    <rect x="430" y="524" width="60" height="40" rx="3" fill="#334155" opacity="0.85"/>
    <rect x="430" y="616" width="60" height="40" rx="3" fill="#334155" opacity="0.85"/>

    <!-- hero rust drive (the "portable" one) -->
    <rect x="510" y="412" width="660" height="80" rx="5" fill="url(#hero)"/>
    <rect x="530" y="432" width="60" height="40" rx="3" fill="#78350f" opacity="0.9"/>
    <rect x="610" y="440" width="500" height="6" rx="3" fill="#fef3ec" opacity="0.4"/>
    <rect x="610" y="456" width="380" height="4" rx="2" fill="#fef3ec" opacity="0.3"/>

    <!-- LED dots -->
    <circle cx="1140" cy="360" r="6" fill="#fbbf24" opacity="0.5"/>
    <circle cx="1140" cy="452" r="7" fill="#fbbf24"/>
    <circle cx="1140" cy="452" r="18" fill="url(#led)"/>
    <circle cx="1140" cy="544" r="6" fill="#64748b" opacity="0.6"/>
    <circle cx="1140" cy="636" r="6" fill="#64748b" opacity="0.6"/>
  </g>

  <!-- corner decoration: tiny stack indicator (cropped variably) -->
  <g opacity="0.25">
    <rect x="80" y="780" width="120" height="6" rx="3" fill="#334155"/>
    <rect x="80" y="800" width="90" height="6" rx="3" fill="#334155"/>
    <rect x="80" y="820" width="60" height="6" rx="3" fill="#c2410c"/>
  </g>
  <g opacity="0.25">
    <rect x="1400" y="80" width="120" height="6" rx="3" fill="#334155"/>
    <rect x="1430" y="100" width="90" height="6" rx="3" fill="#334155"/>
    <rect x="1460" y="120" width="60" height="6" rx="3" fill="#c2410c"/>
  </g>
</svg>
