<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#f0eadb"/>
      <stop offset="1" stop-color="#fef3ec"/>
    </linearGradient>
    <linearGradient id="rust" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#d97706"/>
      <stop offset="1" stop-color="#9a3309"/>
    </linearGradient>
    <linearGradient id="rustTop" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#fbbf24"/>
      <stop offset="1" stop-color="#c2410c"/>
    </linearGradient>
    <linearGradient id="slate" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#475569"/>
      <stop offset="1" stop-color="#334155"/>
    </linearGradient>
    <linearGradient id="slateTop" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#64748b"/>
      <stop offset="1" stop-color="#334155"/>
    </linearGradient>
    <linearGradient id="slateSide" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#1e293b"/>
      <stop offset="1" stop-color="#334155"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.55" r="0.6">
      <stop offset="0" stop-color="#fbbf24" stop-opacity="0.35"/>
      <stop offset="1" stop-color="#fbbf24" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1600" height="900" fill="url(#bg)"/>
  <rect width="1600" height="900" fill="url(#glow)"/>

  <!-- Bottom slate chassis -->
  <g opacity="0.92">
    <polygon points="500,640 900,780 1300,640 900,500" fill="url(#slateTop)"/>
    <polygon points="500,640 500,720 900,860 900,780" fill="url(#slateSide)"/>
    <polygon points="900,780 900,860 1300,720 1300,640" fill="url(#slate)"/>
    <circle cx="560" cy="666" r="6" fill="#fbbf24" opacity="0.85"/>
    <circle cx="588" cy="676" r="6" fill="#94a3b8" opacity="0.6"/>
  </g>

  <!-- Middle slate chassis -->
  <g opacity="0.9">
    <polygon points="540,500 900,626 1260,500 900,374" fill="url(#slateTop)"/>
    <polygon points="540,500 540,580 900,706 900,626" fill="url(#slateSide)"/>
    <polygon points="900,626 900,706 1260,580 1260,500" fill="url(#slate)"/>
    <circle cx="596" cy="524" r="5" fill="#94a3b8" opacity="0.6"/>
    <circle cx="620" cy="532" r="5" fill="#94a3b8" opacity="0.6"/>
  </g>

  <!-- Top hero rust chassis -->
  <g>
    <polygon points="580,360 900,472 1220,360 900,248" fill="url(#rustTop)"/>
    <polygon points="580,360 580,432 900,544 900,472" fill="#78350f"/>
    <polygon points="900,472 900,544 1220,432 1220,360" fill="url(#rust)"/>
    <!-- drive bay slits on side -->
    <line x1="630" y1="386" x2="870" y2="470" stroke="#5c2a1a" stroke-width="2" opacity="0.5"/>
    <line x1="630" y1="402" x2="870" y2="486" stroke="#5c2a1a" stroke-width="2" opacity="0.5"/>
    <line x1="630" y1="418" x2="870" y2="502" stroke="#5c2a1a" stroke-width="2" opacity="0.5"/>
    <!-- LED accent -->
    <circle cx="628" cy="382" r="8" fill="#fbbf24"/>
    <circle cx="628" cy="382" r="14" fill="#fbbf24" opacity="0.35"/>
  </g>

  <!-- Faint connection sparks rising from hero -->
  <circle cx="900" cy="200" r="4" fill="#c2410c" opacity="0.5"/>
  <circle cx="960" cy="170" r="3" fill="#d97706" opacity="0.4"/>
  <circle cx="840" cy="180" r="3" fill="#9a3309" opacity="0.4"/>
</svg>
