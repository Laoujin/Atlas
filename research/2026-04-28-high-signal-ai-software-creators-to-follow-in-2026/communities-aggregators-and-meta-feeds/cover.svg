<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#faf8f2"/>
      <stop offset="1" stop-color="#f0eadb"/>
    </linearGradient>
    <radialGradient id="hub" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#fbbf24"/>
      <stop offset="0.55" stop-color="#c2410c"/>
      <stop offset="1" stop-color="#78350f"/>
    </radialGradient>
    <radialGradient id="glow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#d97706" stop-opacity="0.35"/>
      <stop offset="1" stop-color="#d97706" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1600" height="900" fill="url(#bg)"/>
  <circle cx="800" cy="450" r="380" fill="url(#glow)"/>

  <!-- outer orbit -->
  <ellipse cx="800" cy="450" rx="430" ry="170" fill="none" stroke="#9a3309" stroke-width="2" opacity="0.55"/>
  <!-- middle orbit -->
  <ellipse cx="800" cy="450" rx="320" ry="260" fill="none" stroke="#6d28d9" stroke-width="2" opacity="0.6"/>
  <!-- inner orbit -->
  <ellipse cx="800" cy="450" rx="200" ry="200" fill="none" stroke="#c2410c" stroke-width="2.5" opacity="0.7"/>

  <!-- connection lines from nodes to hub -->
  <g stroke="#78350f" stroke-width="1.5" opacity="0.45">
    <line x1="370" y1="450" x2="800" y2="450"/>
    <line x1="1230" y1="450" x2="800" y2="450"/>
    <line x1="800" y1="190" x2="800" y2="450"/>
    <line x1="800" y1="710" x2="800" y2="450"/>
    <line x1="480" y1="280" x2="800" y2="450"/>
    <line x1="1120" y1="280" x2="800" y2="450"/>
    <line x1="480" y1="620" x2="800" y2="450"/>
    <line x1="1120" y1="620" x2="800" y2="450"/>
  </g>

  <!-- outer nodes (sources) -->
  <g>
    <circle cx="370" cy="450" r="22" fill="#6d28d9" opacity="0.85"/>
    <circle cx="1230" cy="450" r="22" fill="#6d28d9" opacity="0.85"/>
    <circle cx="800" cy="190" r="20" fill="#9a3309" opacity="0.9"/>
    <circle cx="800" cy="710" r="20" fill="#9a3309" opacity="0.9"/>
    <circle cx="480" cy="280" r="16" fill="#c2410c" opacity="0.85"/>
    <circle cx="1120" cy="280" r="16" fill="#c2410c" opacity="0.85"/>
    <circle cx="480" cy="620" r="16" fill="#d97706" opacity="0.9"/>
    <circle cx="1120" cy="620" r="16" fill="#d97706" opacity="0.9"/>
  </g>

  <!-- mid orbit accent nodes -->
  <circle cx="620" cy="320" r="9" fill="#6d28d9" opacity="0.7"/>
  <circle cx="980" cy="580" r="9" fill="#6d28d9" opacity="0.7"/>

  <!-- hub -->
  <circle cx="800" cy="450" r="78" fill="url(#hub)"/>
  <circle cx="800" cy="450" r="78" fill="none" stroke="#fbbf24" stroke-width="2" opacity="0.7"/>
  <circle cx="800" cy="450" r="34" fill="#faf8f2" opacity="0.92"/>
  <circle cx="800" cy="450" r="14" fill="#c2410c"/>
</svg>
