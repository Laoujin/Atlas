<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#faf8f2"/>
      <stop offset="1" stop-color="#f0eadb"/>
    </linearGradient>
    <linearGradient id="page1" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#fef3ec"/>
      <stop offset="1" stop-color="#f0eadb"/>
    </linearGradient>
    <linearGradient id="page2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#fbbf24" stop-opacity="0.35"/>
      <stop offset="1" stop-color="#d97706" stop-opacity="0.55"/>
    </linearGradient>
    <linearGradient id="hero" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#d97706"/>
      <stop offset="0.55" stop-color="#c2410c"/>
      <stop offset="1" stop-color="#78350f"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#fbbf24" stop-opacity="0.35"/>
      <stop offset="1" stop-color="#fbbf24" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Full-bleed background -->
  <rect width="1600" height="900" fill="url(#bg)"/>
  <ellipse cx="800" cy="470" rx="620" ry="380" fill="url(#glow)"/>

  <!-- Back page, tilted left -->
  <g transform="translate(800 470) rotate(-9) translate(-260 -310)" opacity="0.85">
    <rect x="0" y="0" width="520" height="620" rx="6" fill="url(#page1)" stroke="#9a3309" stroke-opacity="0.25" stroke-width="2"/>
    <rect x="40" y="60" width="320" height="10" rx="3" fill="#78350f" opacity="0.35"/>
    <rect x="40" y="120" width="440" height="4" rx="2" fill="#78350f" opacity="0.2"/>
    <rect x="40" y="140" width="440" height="4" rx="2" fill="#78350f" opacity="0.2"/>
    <rect x="40" y="160" width="380" height="4" rx="2" fill="#78350f" opacity="0.2"/>
    <rect x="40" y="200" width="440" height="4" rx="2" fill="#78350f" opacity="0.2"/>
    <rect x="40" y="220" width="420" height="4" rx="2" fill="#78350f" opacity="0.2"/>
    <rect x="40" y="240" width="300" height="4" rx="2" fill="#78350f" opacity="0.2"/>
  </g>

  <!-- Middle page, tilted right with violet accent -->
  <g transform="translate(800 470) rotate(6) translate(-260 -310)" opacity="0.92">
    <rect x="0" y="0" width="520" height="620" rx="6" fill="url(#page1)" stroke="#6d28d9" stroke-opacity="0.35" stroke-width="2"/>
    <rect x="0" y="0" width="8" height="620" fill="#6d28d9" opacity="0.7"/>
    <rect x="40" y="70" width="280" height="14" rx="3" fill="#6d28d9" opacity="0.55"/>
    <rect x="40" y="130" width="440" height="4" rx="2" fill="#5c2a1a" opacity="0.3"/>
    <rect x="40" y="150" width="440" height="4" rx="2" fill="#5c2a1a" opacity="0.3"/>
    <rect x="40" y="170" width="360" height="4" rx="2" fill="#5c2a1a" opacity="0.3"/>
    <rect x="40" y="210" width="440" height="4" rx="2" fill="#5c2a1a" opacity="0.3"/>
    <rect x="40" y="230" width="400" height="4" rx="2" fill="#5c2a1a" opacity="0.3"/>
  </g>

  <!-- Hero page, front and centre, slight tilt -->
  <g transform="translate(800 460) rotate(-2) translate(-280 -320)">
    <rect x="0" y="0" width="560" height="640" rx="8" fill="#fef3ec" stroke="#9a3309" stroke-opacity="0.4" stroke-width="2.5"/>
    <!-- Rust banner header -->
    <rect x="0" y="0" width="560" height="120" rx="8" fill="url(#hero)"/>
    <rect x="0" y="112" width="560" height="8" fill="#78350f" opacity="0.6"/>
    <!-- Headline bar inside banner -->
    <rect x="40" y="44" width="340" height="14" rx="4" fill="#faf8f2" opacity="0.85"/>
    <rect x="40" y="70" width="220" height="8" rx="3" fill="#faf8f2" opacity="0.55"/>
    <!-- Body text lines -->
    <rect x="40" y="170" width="480" height="6" rx="3" fill="#5c2a1a" opacity="0.4"/>
    <rect x="40" y="190" width="480" height="6" rx="3" fill="#5c2a1a" opacity="0.4"/>
    <rect x="40" y="210" width="420" height="6" rx="3" fill="#5c2a1a" opacity="0.4"/>
    <rect x="40" y="230" width="460" height="6" rx="3" fill="#5c2a1a" opacity="0.4"/>
    <rect x="40" y="250" width="380" height="6" rx="3" fill="#5c2a1a" opacity="0.4"/>
    <!-- Pull quote / divider -->
    <rect x="40" y="290" width="6" height="80" rx="3" fill="#6d28d9" opacity="0.7"/>
    <rect x="64" y="300" width="380" height="8" rx="3" fill="#6d28d9" opacity="0.5"/>
    <rect x="64" y="320" width="340" height="8" rx="3" fill="#6d28d9" opacity="0.45"/>
    <rect x="64" y="340" width="300" height="8" rx="3" fill="#6d28d9" opacity="0.4"/>
    <!-- More body -->
    <rect x="40" y="400" width="480" height="6" rx="3" fill="#5c2a1a" opacity="0.35"/>
    <rect x="40" y="420" width="460" height="6" rx="3" fill="#5c2a1a" opacity="0.35"/>
    <rect x="40" y="440" width="480" height="6" rx="3" fill="#5c2a1a" opacity="0.35"/>
    <rect x="40" y="460" width="400" height="6" rx="3" fill="#5c2a1a" opacity="0.35"/>
    <rect x="40" y="480" width="440" height="6" rx="3" fill="#5c2a1a" opacity="0.35"/>
    <rect x="40" y="500" width="320" height="6" rx="3" fill="#5c2a1a" opacity="0.35"/>
    <!-- Footer dot row (signature/byline mark) -->
    <circle cx="56" cy="570" r="14" fill="#c2410c" opacity="0.85"/>
    <rect x="84" y="562" width="180" height="8" rx="3" fill="#78350f" opacity="0.5"/>
    <rect x="84" y="578" width="120" height="6" rx="3" fill="#78350f" opacity="0.35"/>
  </g>

  <!-- Corner decoration: small folded-corner accent -->
  <path d="M 60 60 L 140 60 L 60 140 Z" fill="#c2410c" opacity="0.18"/>
  <path d="M 1540 840 L 1460 840 L 1540 760 Z" fill="#6d28d9" opacity="0.18"/>
</svg>
