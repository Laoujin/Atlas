<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#faf8f2"/>
      <stop offset="1" stop-color="#f0eadb"/>
    </linearGradient>
    <linearGradient id="peak" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#fbbf24"/>
      <stop offset="0.45" stop-color="#c2410c"/>
      <stop offset="1" stop-color="#78350f"/>
    </linearGradient>
    <radialGradient id="hub" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#fbbf24"/>
      <stop offset="0.6" stop-color="#c2410c"/>
      <stop offset="1" stop-color="#9a3309"/>
    </radialGradient>
    <radialGradient id="glow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#fbbf24" stop-opacity="0.35"/>
      <stop offset="1" stop-color="#fbbf24" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1600" height="900" fill="url(#bg)"/>

  <!-- soft warm glow behind hero -->
  <ellipse cx="800" cy="470" rx="520" ry="320" fill="url(#glow)"/>

  <!-- baseline noise: low-amplitude flat-ish lines -->
  <path d="M 140 540 Q 220 530 300 545 T 460 540 T 620 548 T 780 538 T 940 545 T 1100 540 T 1260 548 T 1460 540"
        fill="none" stroke="#9a3309" stroke-width="2" stroke-opacity="0.25"/>
  <path d="M 140 580 Q 240 572 340 585 T 540 580 T 740 588 T 940 578 T 1140 585 T 1340 580 T 1460 583"
        fill="none" stroke="#78350f" stroke-width="2" stroke-opacity="0.2"/>
  <path d="M 140 620 Q 220 615 300 624 T 460 620 T 620 626 T 780 618 T 940 624 T 1100 620 T 1260 626 T 1460 620"
        fill="none" stroke="#6d28d9" stroke-width="2" stroke-opacity="0.22"/>

  <!-- signal: tall rust peak rising from baseline -->
  <path d="M 200 600 L 420 595 Q 470 593 500 580 L 620 540 Q 660 530 690 510 L 760 380 Q 790 250 820 200 Q 840 165 860 200 Q 890 270 920 400 L 980 520 Q 1010 555 1050 575 L 1170 605 Q 1220 612 1280 608 L 1420 600"
        fill="none" stroke="url(#peak)" stroke-width="6" stroke-linecap="round" stroke-linejoin="round" opacity="0.95"/>

  <!-- filled peak underlay for weight -->
  <path d="M 500 580 L 620 540 L 690 510 L 760 380 L 820 200 L 920 400 L 980 520 L 1050 575 L 1170 605 L 500 605 Z"
        fill="url(#peak)" opacity="0.18"/>

  <!-- network edges from hub at peak apex (820, 200) -->
  <line x1="820" y1="200" x2="380" y2="280" stroke="#6d28d9" stroke-width="1.5" stroke-opacity="0.55"/>
  <line x1="820" y1="200" x2="540" y2="160" stroke="#6d28d9" stroke-width="1.5" stroke-opacity="0.55"/>
  <line x1="820" y1="200" x2="1080" y2="150" stroke="#6d28d9" stroke-width="1.5" stroke-opacity="0.55"/>
  <line x1="820" y1="200" x2="1240" y2="280" stroke="#6d28d9" stroke-width="1.5" stroke-opacity="0.55"/>
  <line x1="820" y1="200" x2="1180" y2="380" stroke="#c2410c" stroke-width="1.5" stroke-opacity="0.5"/>
  <line x1="820" y1="200" x2="460" y2="400" stroke="#c2410c" stroke-width="1.5" stroke-opacity="0.5"/>

  <!-- curated nodes (small rust) -->
  <circle cx="380" cy="280" r="9" fill="#c2410c" opacity="0.85"/>
  <circle cx="540" cy="160" r="11" fill="#9a3309" opacity="0.9"/>
  <circle cx="1080" cy="150" r="10" fill="#c2410c" opacity="0.88"/>
  <circle cx="1240" cy="280" r="9" fill="#9a3309" opacity="0.85"/>
  <circle cx="1180" cy="380" r="8" fill="#d97706" opacity="0.85"/>
  <circle cx="460" cy="400" r="8" fill="#d97706" opacity="0.85"/>

  <!-- violet accent nodes (rare, secondary) -->
  <circle cx="540" cy="160" r="4" fill="#6d28d9" opacity="0.9"/>
  <circle cx="1080" cy="150" r="4" fill="#6d28d9" opacity="0.9"/>

  <!-- hero hub at peak apex -->
  <circle cx="820" cy="200" r="38" fill="url(#hub)" opacity="0.95"/>
  <circle cx="820" cy="200" r="14" fill="#fef3ec" opacity="0.85"/>
  <circle cx="820" cy="200" r="6" fill="#78350f"/>
</svg>
