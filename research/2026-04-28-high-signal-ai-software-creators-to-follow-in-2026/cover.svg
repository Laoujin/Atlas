<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#faf8f2"/>
      <stop offset="1" stop-color="#f0eadb"/>
    </linearGradient>
    <linearGradient id="rust" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#d97706"/>
      <stop offset="1" stop-color="#9a3309"/>
    </linearGradient>
    <linearGradient id="rustHero" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#fbbf24"/>
      <stop offset="0.55" stop-color="#c2410c"/>
      <stop offset="1" stop-color="#78350f"/>
    </linearGradient>
    <linearGradient id="violet" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#6d28d9" stop-opacity="0.9"/>
      <stop offset="1" stop-color="#6d28d9" stop-opacity="0.7"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#fbbf24" stop-opacity="0.35"/>
      <stop offset="1" stop-color="#fbbf24" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Full-bleed background -->
  <rect width="1600" height="900" fill="url(#bg)"/>
  <circle cx="800" cy="450" r="520" fill="url(#glow)"/>

  <!-- Faint connection lines from hub to cards (curated network) -->
  <g stroke="#9a3309" stroke-width="2" stroke-linecap="round" opacity="0.35" fill="none">
    <line x1="800" y1="450" x2="380" y2="280"/>
    <line x1="800" y1="450" x2="1240" y2="270"/>
    <line x1="800" y1="450" x2="340" y2="640"/>
    <line x1="800" y1="450" x2="1260" y2="650"/>
    <line x1="800" y1="450" x2="560" y2="200"/>
    <line x1="800" y1="450" x2="1080" y2="700"/>
  </g>

  <!-- Satellite cards (sources) -->
  <!-- left-top card -->
  <g opacity="0.9">
    <rect x="290" y="200" width="180" height="130" rx="10" fill="#ffffff" stroke="#78350f" stroke-width="2"/>
    <rect x="305" y="215" width="150" height="55" rx="4" fill="url(#violet)" opacity="0.55"/>
    <rect x="305" y="282" width="120" height="6" rx="3" fill="#9a3309" opacity="0.7"/>
    <rect x="305" y="296" width="90" height="6" rx="3" fill="#9a3309" opacity="0.5"/>
    <rect x="305" y="310" width="105" height="6" rx="3" fill="#9a3309" opacity="0.5"/>
  </g>

  <!-- right-top card (video tile with play triangle) -->
  <g opacity="0.92">
    <rect x="1150" y="190" width="190" height="140" rx="10" fill="#ffffff" stroke="#78350f" stroke-width="2"/>
    <rect x="1165" y="205" width="160" height="80" rx="4" fill="#1a0e0e"/>
    <polygon points="1230,225 1230,265 1265,245" fill="#fbbf24"/>
    <rect x="1165" y="298" width="130" height="6" rx="3" fill="#9a3309" opacity="0.7"/>
    <rect x="1165" y="312" width="95" height="6" rx="3" fill="#9a3309" opacity="0.5"/>
  </g>

  <!-- left-bottom card -->
  <g opacity="0.9">
    <rect x="250" y="570" width="180" height="130" rx="10" fill="#ffffff" stroke="#78350f" stroke-width="2"/>
    <circle cx="285" cy="605" r="14" fill="url(#violet)"/>
    <rect x="310" y="595" width="100" height="6" rx="3" fill="#9a3309" opacity="0.7"/>
    <rect x="310" y="609" width="80" height="6" rx="3" fill="#9a3309" opacity="0.5"/>
    <rect x="265" y="635" width="150" height="5" rx="2" fill="#9a3309" opacity="0.45"/>
    <rect x="265" y="650" width="135" height="5" rx="2" fill="#9a3309" opacity="0.45"/>
    <rect x="265" y="665" width="145" height="5" rx="2" fill="#9a3309" opacity="0.45"/>
    <rect x="265" y="680" width="100" height="5" rx="2" fill="#9a3309" opacity="0.45"/>
  </g>

  <!-- right-bottom card -->
  <g opacity="0.92">
    <rect x="1180" y="585" width="180" height="130" rx="10" fill="#ffffff" stroke="#78350f" stroke-width="2"/>
    <rect x="1195" y="600" width="150" height="36" rx="4" fill="url(#rust)" opacity="0.85"/>
    <rect x="1195" y="648" width="115" height="6" rx="3" fill="#9a3309" opacity="0.7"/>
    <rect x="1195" y="662" width="140" height="6" rx="3" fill="#9a3309" opacity="0.5"/>
    <rect x="1195" y="676" width="95" height="6" rx="3" fill="#9a3309" opacity="0.5"/>
    <rect x="1195" y="690" width="120" height="6" rx="3" fill="#9a3309" opacity="0.5"/>
  </g>

  <!-- Hero: central curated hub card (RSS/feed beacon) -->
  <g>
    <!-- Soft shadow plate -->
    <rect x="640" y="290" width="320" height="320" rx="22" fill="#78350f" opacity="0.18" transform="translate(8 10)"/>
    <!-- Main hero card -->
    <rect x="640" y="290" width="320" height="320" rx="22" fill="url(#rustHero)" stroke="#78350f" stroke-width="3"/>

    <!-- Concentric arcs (signal/feed waves) -->
    <g fill="none" stroke="#fef3ec" stroke-width="9" stroke-linecap="round" opacity="0.95">
      <circle cx="730" cy="520" r="40"/>
      <path d="M 730 460 A 100 100 0 0 1 830 560"/>
      <path d="M 730 400 A 160 160 0 0 1 890 560"/>
    </g>
    <circle cx="730" cy="520" r="14" fill="#fef3ec"/>

    <!-- Star/spark accent (curation mark) -->
    <g transform="translate(880 360)" fill="#fef3ec" opacity="0.95">
      <polygon points="0,-28 7,-7 28,0 7,7 0,28 -7,7 -28,0 -7,-7"/>
    </g>
    <g transform="translate(880 360)" fill="#6d28d9" opacity="0.85">
      <polygon points="0,-16 4,-4 16,0 4,4 0,16 -4,4 -16,0 -4,-4"/>
    </g>
  </g>

  <!-- Decorative corner dots (outside safe zone, OK to clip) -->
  <g fill="#6d28d9" opacity="0.55">
    <circle cx="80" cy="80" r="6"/>
    <circle cx="120" cy="60" r="4"/>
    <circle cx="1530" cy="830" r="6"/>
    <circle cx="1490" cy="850" r="4"/>
  </g>
</svg>
