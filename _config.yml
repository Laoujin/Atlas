title: Atlas
description: Research compiled on demand by Scout.

# Google Analytics (GA4 measurement ID). Leave blank/comment-out to disable.
google_analytics: G-NJYXE1Q77M

# baseurl must match your Atlas repo name for project Pages
# (e.g. /Atlas serves at https://<you>.github.io/Atlas/).
# install.sh rewrites this to match the actual Atlas repo name.
baseurl: /Atlas

# If you renamed your Scout fork, the installer updates this too.
scout_repo: Laoujin/Scout

# Atlas's own repo — used by the "Raw .md" link in the research-page footer.
atlas_repo: Laoujin/Atlas

# --- Theme variables (edit any of these, push, GitHub Pages rebuilds) ---
# Skeletons:  s1 s2 s3 s4 s5 s6   (site layout)
# Palettes:   rust paper cartography midnight minimal fieldnotes solarized nord
# Cards:      v1 v2 v3 v4 v5 v6 v7
skeleton: s5
palette:  cartography
card:     v1

# Research folders under /research/ get layout=research + type=research automatically.
defaults:
  - scope:
      path: research
    values:
      layout: research
      type: research

# Compass theme (git submodule at compass/)
layouts_dir: compass/_layouts
includes_dir: compass/_includes
assets_base: /compass/assets

exclude:
  - README.md
  - .gitignore
  - compass/_config.yml
  - compass/serve.ps1
  - compass/research
  - compass/index.html
  - compass/Gemfile
  - compass/Gemfile.lock

markdown: kramdown
highlighter: rouge
