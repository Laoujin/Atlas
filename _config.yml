title: Atlas
description: Research compiled on demand by Scout.
# baseurl must match your Atlas repo name when served from a project Pages site
# (e.g. /Atlas serves at https://<you>.github.io/Atlas/). Forkers: update this.
baseurl: /Atlas
# Forker: if you renamed your Scout fork, set scout_repo to its name.
scout_repo: Scout

defaults:
  - scope:
      path: research
    values:
      layout: research
      type: research

exclude:
  - README.md
  - .gitignore

markdown: kramdown
highlighter: rouge
