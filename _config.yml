title: Atlas
description: Research compiled on demand by Scout.
url: https://laoujin.github.io
baseurl: /Atlas

collections:
  research:
    output: true
    permalink: /research/:path/

defaults:
  - scope:
      path: ""
      type: research
    values:
      layout: research

exclude:
  - README.md
  - .gitignore

markdown: kramdown
highlighter: rouge
