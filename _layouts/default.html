<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>{% if page.title %}{{ page.title }} — {% endif %}{{ site.title }}</title>
  <link rel="icon" type="image/png" href="{{ '/assets/icon.png' | relative_url }}">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ '/assets/base.css' | relative_url }}">
</head>
<body>
  <header class="hero">
    <a href="{{ '/' | relative_url }}"><img src="{{ '/assets/logo.png' | relative_url }}" alt="" class="hero-logo" width="240" height="240"></a>
    <div class="hero-text">
      <h1><a href="{{ '/' | relative_url }}">Atlas</a></h1>
      <p class="hero-tagline">{{ site.description }}</p>
      <nav class="hero-links">
        <a href="https://github.com/Laoujin/Scout">Scout engine →</a>
        <a href="https://github.com/Laoujin/Atlas">Atlas source →</a>
      </nav>
    </div>
  </header>
  <main>
    {{ content }}
  </main>
  <footer>
    <p>Scout researches. Atlas remembers.</p>
  </footer>
</body>
</html>
